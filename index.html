/* ---- theme ---- */
const order = ["auto","light","dark"];
const icons = {
  auto:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18" fill="currentColor" stroke="none"/></svg>',
  light:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>',
  dark:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.6 6.6 0 0 0 21 12.8z"/></svg>'
};
function loadTheme(){ return localStorage.getItem(KEY_THEME) || "auto"; }
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("#themeIcon").innerHTML = icons[t];
}
applyTheme(loadTheme());
$("#themeBtn").addEventListener("click", ()=>{
  let t = order[(order.indexOf(loadTheme())+1)%order.length];
  localStorage.setItem(KEY_THEME, t); applyTheme(t);
});

/* ---- position (paragraph-precise bookmark) ---- */
const READ_LINE = 0.28; // where the "reading line" sits in the viewport
function loadPos(){ try{ return JSON.parse(localStorage.getItem(KEY_POS)); }catch(e){ return null; } }
function currentParaIdx(){
  const ps = $("#cBody").querySelectorAll("p");
  const line = window.innerHeight * READ_LINE;
  let best = 0, bestDist = Infinity;
  ps.forEach(p=>{
    const r = p.getBoundingClientRect();
    if(r.bottom < 0) return;
    const d = Math.abs(r.top - line);
    if(d < bestDist){ bestDist = d; best = +p.dataset.p; }
  });
  return best;
}
function savePos(){
  const doc = document.documentElement;
  const max = doc.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  localStorage.setItem(KEY_POS, JSON.stringify({c:current, p:currentParaIdx(), f:frac}));
}
function scrollToPara(idx){
  const el = $('#cBody p[data-p="'+idx+'"]');
  if(!el) return null;
  const y = window.scrollY + el.getBoundingClientRect().top - window.innerHeight*READ_LINE;
  window.scrollTo(0, Math.max(0, y));
  return el;
}
let bmTimer = null;
function clearMark(){
  $("#cBody").querySelectorAll("p.bm").forEach(p=>p.classList.remove("bm","bm-fade"));
  const t = $(".bm-tag"); if(t) t.remove();
}
function flashMark(el){
  clearMark();
  if(!el) return;
  el.classList.add("bm","bm-fade");
  const tag = document.createElement("span");
  tag.className = "bm-tag bm-fade";
  tag.textContent = "Você parou aqui";
  el.appendChild(tag);
  clearTimeout(bmTimer);
  bmTimer = setTimeout(clearMark, 6000);
}
let current = 0;

/* ---- render ---- */
function render(i, restore){
  current = i;
  const ch = CHAPTERS[i];
  $("#cKicker").textContent = ch.kicker;
  $("#cTitle").textContent = ch.title;
  $("#tbTitle").textContent = ch.title;
  $("#cLang").style.display = "none";
  let h = "", firstDone = false, pi = 0;
  for(const b of ch.blocks){
    if(b.t === "scene"){ h += '<div class="scene">&#9671;&#160;&#9671;&#160;&#9671;</div>'; firstDone=false; }
    else{ h += '<p class="'+(firstDone?'':'first')+'" data-p="'+pi+'">'+b.x+'</p>'; firstDone=true; pi++; }
  }
  $("#cBody").innerHTML = h;
  // nav
  const prev = $("#prevBtn"), next = $("#nextBtn");
  if(i>0){ prev.disabled=false; $("#prevNm").textContent = CHAPTERS[i-1].title; }
  else{ prev.disabled=true; $("#prevNm").textContent="·"; }
  if(i<CHAPTERS.length-1){ next.disabled=false; $("#nextNm").textContent = CHAPTERS[i+1].title; }
  else{ next.disabled=true; $("#nextNm").textContent="·"; }
  $("#endNote").textContent = i<CHAPTERS.length-1
    ? "" : "Fim do que existe por enquanto. Novos capítulos em breve.";
  // restore scroll (paragraph-precise when available)
  clearMark();
  requestAnimationFrame(()=>{
    let landed = false;
    if(restore && restore.p != null){
      const el = scrollToPara(restore.p);
      if(el){ if(restore.flash) flashMark(el); landed = true; }
    }
    if(!landed){
      const max = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo(0, (restore && restore.f) ? restore.f*max : 0);
    }
    updateProgress();
    refreshMarkBtn();
  });
}

function goChapter(i){
  i = Math.max(0, Math.min(CHAPTERS.length-1, i));
  render(i, 0); savePos();
}
$("#prevBtn").addEventListener("click", ()=>!$("#prevBtn").disabled && goChapter(current-1));
$("#nextBtn").addEventListener("click", ()=>!$("#nextBtn").disabled && goChapter(current+1));

/* ---- views ---- */
function openReader(pos){
  $("#cover").classList.add("hidden");
  $("#reader").classList.remove("hidden");
  render(pos ? pos.c : 0, pos ? {p:pos.p, f:pos.f, flash:true} : null);
}
function openCover(){
  savePos();
  $("#reader").classList.add("hidden");
  $("#cover").classList.remove("hidden");
  refreshResume();
}
$("#readBtn").addEventListener("click", ()=>openReader(null));
$("#resumeBtn").addEventListener("click", ()=>openReader(loadPos()));
$("#homeBtn").addEventListener("click", openCover);

/* ---- bookmark jump button ---- */
function refreshMarkBtn(){
  const p = loadPos();
  $("#markBtn").classList.toggle("has-mark", !!(p && p.c===current && p.p));
}
$("#markBtn").addEventListener("click", ()=>{
  const p = loadPos();
  if(!p || p.p==null) return;
  if(p.c === current){
    const el = scrollToPara(p.p);
    if(el) flashMark(el);
  } else {
    render(p.c, {p:p.p, f:p.f, flash:true});
    savePos();
  }
});

function refreshResume(){
  const p = loadPos();
  const btn = $("#resumeBtn");
  if(p && (p.c>0 || p.p>0 || p.f>0.02)){
    btn.classList.remove("hidden");
    btn.textContent = "Continuar: " + CHAPTERS[p.c].title;
  } else { btn.classList.add("hidden"); }
}
refreshResume();

/* ---- progress + autosave ---- */
function updateProgress(){
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  $("#progress").style.width = (frac*100).toFixed(2)+"%";
}
let tick=false;
window.addEventListener("scroll", ()=>{
  if($("#reader").classList.contains("hidden")) return;
  updateProgress();
  if(!tick){ tick=true; setTimeout(()=>{ savePos(); tick=false; }, 400); }
}, {passive:true});
window.addEventListener("beforeunload", ()=>{ if(!$("#reader").classList.contains("hidden")) savePos(); });

/* keyboard */
document.addEventListener("keydown", e=>{
  if($("#reader").classList.contains("hidden")) return;
  if(e.key==="ArrowRight" && !$("#nextBtn").disabled) goChapter(current+1);
  if(e.key==="ArrowLeft" && !$("#prevBtn").disabled) goChapter(current-1);
});
</script>
</body>
</html>
