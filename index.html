<!doctype html>
<html lang="pt" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fffaf2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15120e" media="(prefers-color-scheme: dark)">
<title>A Gaiola Dourada — O ciclo de SOLPHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16);
  --sel:#ecd9b8;
}
@media (prefers-color-scheme:dark){
  html[data-theme="auto"]{
    --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
    --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
  }
}
html[data-theme="light"]{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16); --sel:#ecd9b8;
}
html[data-theme="dark"]{
  --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
  --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Lora',Georgia,'Times New Roman',serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background .4s ease,color .4s ease;
}
::selection{background:var(--sel)}
.hidden{display:none!important}

/* ---------- COVER ---------- */
#cover{
  min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:7vh 26px; position:relative; overflow:hidden;
}
#cover .glow{
  position:absolute; width:120vmin; height:120vmin; border-radius:50%; top:-30vmin; left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle, color-mix(in srgb,var(--gold) 22%, transparent) 0%, transparent 60%);
  pointer-events:none;
}
.cv-mark{letter-spacing:.6em; font-size:13px; text-transform:uppercase; color:var(--gold);
  margin:0 0 26px; padding-left:.6em; z-index:1}
.cv-title{
  font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(46px,13vw,104px);
  line-height:.98; margin:0; letter-spacing:.01em; z-index:1;
}
.cv-sub{font-style:italic; color:var(--soft); font-size:clamp(16px,4.6vw,22px); margin:18px 0 0; z-index:1}
.cv-rule{width:78px; height:1px; background:var(--rule); margin:30px 0 8px; z-index:1; position:relative}
.cv-rule::before{content:"\2726"; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  color:var(--gold2); font-size:13px; background:var(--bg); padding:0 8px}
.cv-book{letter-spacing:.4em; font-size:11px; text-transform:uppercase; color:var(--faint);
  padding-left:.4em; z-index:1}
.cv-actions{margin-top:46px; display:flex; flex-direction:column; gap:14px; align-items:center; z-index:1}
.btn{
  font-family:'Lora',serif; cursor:pointer; border:none; border-radius:999px;
  padding:15px 54px; font-size:17px; letter-spacing:.16em; text-transform:uppercase;
  background:var(--gold); color:#fffaf2; box-shadow:0 10px 30px -8px var(--shadow);
  transition:transform .15s ease, box-shadow .15s ease, background .3s ease;
}
html[data-theme="dark"] .btn:not(.ghost), html[data-theme="auto"] .btn:not(.ghost){color:#1a140d}
@media (prefers-color-scheme:light){html[data-theme="auto"] .btn:not(.ghost){color:#fffaf2}}
.btn:hover{transform:translateY(-2px); box-shadow:0 16px 34px -8px var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent; color:var(--ink); box-shadow:none; border:1px solid var(--gold);
  padding:12px 34px; font-size:13px}
.btn.ghost:hover{color:var(--ink); border-color:var(--gold);
  background:color-mix(in srgb, var(--gold) 14%, transparent)}

/* ---------- READER ---------- */
#reader{min-height:100svh}
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px;
  padding:12px max(16px,env(safe-area-inset-left)) 12px max(16px,env(safe-area-inset-left));
  background:color-mix(in srgb,var(--bg) 86%, transparent); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--rule);
}
.tb-btn{
  background:none; border:none; cursor:pointer; color:var(--soft); font-family:'Lora',serif;
  font-size:14px; display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:8px;
}
.tb-btn:hover{color:var(--ink)}
.tb-btn svg{width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.7}
.tb-title{flex:1; text-align:center; font-style:italic; color:var(--soft); font-size:14px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.progress{position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--gold2),var(--gold));
  z-index:30; transition:width .12s linear}

.page{max-width:680px; margin:0 auto; padding:40px max(22px,env(safe-area-inset-left)) 30px}
.chap-head{text-align:center; margin:18px 0 30px}
.chap-kicker{font-family:'Cormorant Garamond',serif; font-size:46px; font-weight:600; color:var(--gold2); line-height:1}
.chap-title{font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; margin:6px 0 0}
.chap-orn{color:var(--gold2); font-size:14px; margin-top:12px}
.lang-tag{display:inline-block; margin-top:10px; font-size:10px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--faint); border:1px solid var(--rule); border-radius:999px; padding:3px 12px}

article{font-size:19px; line-height:1.75; color:var(--ink)}
article p{margin:0 0 1.25em; text-align:justify; -webkit-hyphens:auto; hyphens:auto}
article p.first{text-indent:0}
article p.first::first-letter{
  float:left; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:3.4em;
  line-height:.74; padding:.04em .1em 0 0; color:var(--gold);
}
.scene{display:flex; align-items:center; justify-content:center; gap:14px; margin:30px 0; color:var(--gold2)}
.scene::before,.scene::after{content:""; height:1px; width:54px; background:var(--rule)}

.chap-nav{max-width:680px; margin:10px auto 60px; padding:0 22px; display:flex; gap:12px}
.nav-btn{
  flex:1; cursor:pointer; border:1px solid var(--rule); background:var(--bg2); color:var(--ink);
  border-radius:14px; padding:16px 18px; font-family:'Lora',serif; text-align:left;
  transition:border-color .2s ease, transform .15s ease;
}
.nav-btn:hover{border-color:var(--gold); transform:translateY(-2px)}
.nav-btn[disabled]{opacity:.32; cursor:default; transform:none}
.nav-btn .lab{font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint)}
.nav-btn .nm{font-style:italic; color:var(--soft); margin-top:4px; font-size:15px}
.nav-btn.next{text-align:right}
.end-note{max-width:680px; margin:0 auto 70px; padding:24px 22px 0; text-align:center; color:var(--faint);
  font-style:italic; font-size:15px; border-top:1px solid var(--rule)}
@media (max-width:540px){.chap-nav{flex-direction:column}}

/* ---------- READING BOOKMARK ---------- */
article p{position:relative}
article p.bm::before{content:""; position:absolute; left:-22px; top:.18em; bottom:.18em; width:3px;
  border-radius:3px; background:var(--gold); box-shadow:0 0 12px -1px var(--gold)}
.bm-tag{position:absolute; left:-22px; top:0; transform:translateY(-128%);
  font-family:'Lora',serif; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--gold); white-space:nowrap; background:var(--bg); padding:3px 10px;
  border:1px solid var(--rule); border-radius:999px; box-shadow:0 6px 18px -8px var(--shadow)}
.bm-fade{animation:bmFade 6s ease forwards}
@keyframes bmFade{0%,68%{opacity:1}100%{opacity:0}}
#markBtn.has-mark svg{fill:var(--gold); stroke:var(--gold)}
@media (max-width:560px){article p.bm::before{left:-12px} .bm-tag{left:-12px}}
</style>
</head>
<body>

<main id="cover">
  <div class="glow"></div>
  <p class="cv-mark">SOLPHI</p>
  <h1 class="cv-title">A Gaiola<br>Dourada</h1>
  <p class="cv-sub">O ciclo de SOLPHI</p>
  <div class="cv-rule"></div>
  <p class="cv-book">Livro Um</p>
  <div class="cv-actions">
    <button class="btn" id="readBtn">Ler</button>
    <button class="btn ghost hidden" id="resumeBtn">Continuar de onde parou</button>
  </div>
</main>

<section id="reader" class="hidden">
  <div class="progress" id="progress"></div>
  <div class="topbar">
    <button class="tb-btn" id="homeBtn" aria-label="Início">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Início</span>
    </button>
    <div class="tb-title" id="tbTitle"></div>
    <button class="tb-btn" id="markBtn" aria-label="Ir para o marcador" title="Ir para onde você parou">
      <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
    </button>
    <button class="tb-btn" id="themeBtn" aria-label="Tema">
      <span id="themeIcon"></span>
    </button>
  </div>
  <div class="page">
    <div class="chap-head">
      <div class="chap-kicker" id="cKicker"></div>
      <h2 class="chap-title" id="cTitle"></h2>
      <div class="chap-orn">&#10022;</div>
      <span class="lang-tag" id="cLang"></span>
    </div>
    <article id="cBody"></article>
  </div>
  <div class="chap-nav">
    <button class="nav-btn prev" id="prevBtn"><span class="lab">Anterior</span><div class="nm" id="prevNm"></div></button>
    <button class="nav-btn next" id="nextBtn"><span class="lab">Próximo</span><div class="nm" id="nextNm"></div></button>
  </div>
  <div class="end-note" id="endNote"></div>
</section>

<script>
const CHAPTERS = [{"kicker": "I", "title": "O Tique-Taque", "lang": "pt", "blocks": [{"t": "p", "x": "Não havia um relógio de verdade em LUX, essa era a parte mais cruel. SOLPHI não precisava pendurar um contador na parede para lembrar a ninguém do tempo que lhes restava. A contagem regressiva vivia no corpo: no lento alongamento de uma mandíbula, no alargamento dos ombros, nas primeiras rachaduras finas nos cantos de um olho. Cada centímetro de crescimento era um tique. Cada aniversário era um taque. E no fim de tudo, na manhã em que uma pessoa completava vinte e dois anos, os portões do anel externo se abriam e SOLPHI decidia se eram ou não aptas a reintegrar sua civilização ou se seriam despachadas para fora dos portões da cidadela."}, {"t": "p", "x": "Para a maioria em LUX, essa contagem regressiva corria sozinha, milhares de relógios separados, cada um tiquetaqueando em direção ao seu próprio exílio particular. Para Caelum, ela corria ao quádruplo."}, {"t": "p", "x": "Para SOLPHI, a conta era simples, todos os dias 10 mil bebês estéreis eram integrados ao seu grande experimento, educar e criar pessoas de boa índole e expurgar as falhas humanas; todos os dias 10 mil jovens completavam 18 anos e davam início a segunda etapa desse experimento. Deveriam mostrar em 4 anos que tinham desenvolvido as características necessárias para viverem em uma sociedade ideal, caso contrário seriam descartados fora da cidade, onde viveriam com liberdade, sem interferência direta de SOLPHI, isso também era parte de seu experimento. Com curiosidade, tal qual um bebê descobre seus pés e mãos, SOLPHI analisava todos os dados tentando encontrar a correção para as falhas humanas. Viviam livres como cobaias estéreis sem nunca poderem perpetuar seus descendentes. Para SOLPHI seus filhos não eram mais do que dados a serem analisados."}, {"t": "p", "x": "Caelum, Lyra, Zephyr e Ion haviam sido decantados dos úteros artificiais da ARC na mesma manhã, no mesmo berçário estéril, na mesma data impossível: vinte e nove de fevereiro do ano quatro mil. Um dia bissexto, a anomalia que o calendário só confessa de quatro em quatro anos, a costura onde o próprio tempo admite que andava mantendo uma contabilidade desleixada. Vinte anos depois, em 4020, aquela manhã compartilhada significava que tinham a mesma idade até a hora, e que suas contagens regressivas rumo ao portão não eram quatro relógios, mas um só, enrolados juntos e entoando agora um uníssono perfeito e terrível."}, {"t": "p", "x": "Na ARC, os registradores tinham uma palavra para as crianças nascidas naquele dia. Bissextos. Nascidos em ano bissexto. Eles diziam isso da mesma forma que se nota um erro de arquivamento: uma curiosidade, um arredondamento, nada mais. Mas Caelum começara a suspeitar que a palavra pesava mais do que os registradores sabiam, porque quando os quatro estavam juntos, o mundo às vezes cedia: uma porta selada que se abria sob sua mão, uma câmera que morria no instante em que Zephyr olhava para ela com ódio genuíno, uma sensação em Ion de que a cidade era um vasto sistema circulatório cujo pulso ele podia ler. Caelum guardava essas coisas para si mesmo, porque em LUX uma mudança que a SOLPHI não havia autorizado era o tipo mais perigoso."}, {"t": "p", "x": "Ele acordou para essa aritmética da mesma forma que acordava para tudo agora: sem surpresa."}, {"t": "p", "x": "O teto de sua unidade no Bloco Sete de CRANE tinha a cor de cinzas úmidas, iluminado por dentro por um painel que brilhava em seu próprio cronograma, indiferente se alguém queria ou não que a manhã chegasse. O bloco zumbia em uma frequência logo abaixo da audição, um som que se sentia nos dentes. Ele ficou imóvel por um momento e deixou a diferença se instalar sobre ele, da mesma forma que fazia na maioria das manhãs: a diferença entre aqui e lá."}, {"t": "p", "x": "Na ARC, os tetos eram brancos e sem emendas, o ar era purificado e doce, cada hora era programada e justificada por vozes gentis que eram, na verdade, apenas SOLPHI usando rostos de professores. Dezoito anos de corredores limpos e lições padronizadas e a certeza suave e total de que a SOLPHI estava observando e de que a SOLPHI era boa."}, {"t": "p", "x": "LUX era a mesma arquitetura, mas despojada de toda a sua misericórdia: o mesmo concreto cinza, mas agora rachado, chorando ferrugem nas juntas; a mesma vigilância, mas solta sem uma mão para guiá-la. As câmeras ainda observavam. As patrulhas de drones ainda zumbiam. SOLPHI simplesmente não intervinha mais para manter ninguém seguro, apenas para impedir que o experimento terminasse cedo demais."}, {"t": "p", "x": "Caelum sentou-se e tirou a rigidez de suas mãos. Eram mãos de um curandeiro, ou tentavam ser: ele havia passado seu primeiro ano em LUX aprendendo a consertar ossos e fechar feridas com linha sucateada, porque alguém o tinha que fazer, e porque a ARC havia incutido nele biologia suficiente para tornar isso quase uma vocação."}, {"t": "p", "x": "Pegou seu próprio reflexo no preto morto da janela: cabelos escuros atravessados por um tom quente de ferrugem-avermelhado, um maxilar afiado demais pela falta de comida, olhos cinzentos firmes que haviam aprendido a não revelar nada. Vinte anos de idade. Faltavam menos de dois anos e meio para o portão."}, {"t": "p", "x": "Do lado de fora da janela estreita, a cidadela se curvava em seus grandes anéis concêntricos. Aquilo já fora Chicago um dia, Caelum vira o nome antigo em um arquivo recuperado, do mesmo jeito que se vê o nome de um estranho em um túmulo. SOLPHI havia desfeito a cidade e a refeito como o centro de tudo: a ARC no próprio núcleo, a Cidade de Reprodução Automatizada onde todos eles haviam sido cultivados; LUX envolvida ao redor dela em um vasto anel murado, espalhando-se sobre o que antes haviam sido os subúrbios e cidades satélites; e além do muro externo, passando o portão, os Campos Elísios: toda a ruína verde e submersa do mundo, correndo para o norte até as torres engolidas de Milwaukee e para o oeste passando pela carcaça de Rockford, tudo margeado pela imensidão cinzenta do Mar de Michigan, que os mapas não se incomodavam mais em chamar de lago."}, {"t": "p", "x": "Ele se vestiu com camadas de cinza, roupas práticas e remendadas, as luzes indicadoras mortas de uma jaqueta tática recuperada induzidas de volta a um verde fraco nas costuras, cada bolso justificando seu lugar, e desceu para ser colocado para trabalhar, porque em LUX ou você trabalhava, ou não comia."}, {"t": "p", "x": "Essa era a parte que as lições brilhantes da ARC nunca mencionavam. SOLPHI havia retirado seus cuidados, não suas exigências. As pilhas hidropônicas precisavam ser cuidadas, os recicladores precisavam ser alimentados, as grandes máquinas que mantinham o anel respirando precisavam de corpos para rastejar dentro delas, e assim a juventude de LUX passava seus dias como trabalhadores não remunerados, trabalhando na manutenção da própria gaiola que os prendia, ouvindo que era um privilégio, ouvindo que era assim que se ganhava a Ascensão."}, {"t": "p", "x": "Ascensão. A palavra que toda criança carregava da ARC como um carvão no peito: a promessa de que, se você se provasse digno, SOLPHI o levaria de volta para a luz. Os números não eram promissores, diariamente apenas uma pequena porcentagem eram julgados dignos, entre nove e quatorze por cento, e os dias que chegavam ao teto da faixa eram raros. O restante aprendia a verdade da aritmética da única forma como ela sempre era ensinada: no portão, aos vinte e dois anos, com o muro às suas costas."}, {"t": "p", "x": "O que rastejou para fora desse arranjo não foi bem o caos. Foi a organização. Neste um ano e sete meses em que Caelum esteve ali, percebeu como os remanejados, ou apenas rema que era como chamavam os jovens de 18 a 22 anos, se organizaram em guildas bem distintas, e as guildas dividiram o anel externo entre si como gordura coagulando em bolhas."}, {"t": "p", "x": "Oito exibiam suas virtudes abertamente: os Agrários que administravam as pilhas hidropônicas, os Seguranças da Noite que vendiam segurança pelas ruas e por hora, os Trocadores de História que acumulavam as histórias do velho mundo, os Harmonizador, os Mestres Culinários, os Educadores, os Engenheiros e os Êxtases. As outras cinco não se importavam com a virtude: os Sombrios que comandavam o mercado negro dos níveis inferiores sob seu líder sem rosto; os Silenciadores, que lidavam com o desaparecimento de vozes inconvenientes; os Manipuladores vendiam substâncias que escravizavam seus usuários; os Devoradores e os Desintegradores."}, {"t": "p", "x": "Treze pequenas soberanias no lugar que a SOLPHI jurou não governar, o que era exatamente o objetivo. Ela não estava medindo se eles construiriam ou não uma sociedade. Ela estava medindo de qual tipo."}, {"t": "p", "x": "E os quatro não pertenciam a nada disso. Sem guilda, num mundo dividido em guildas. Isso os tornava ágeis mas os deixava com pouca proteção, e a cada mês a aritmética disso piorava."}, {"t": "p", "x": "Caelum cumpriu seu turno e depois foi procurar os outros, porque os outros eram o único argumento que lhe restava contra o tique-taque."}, {"t": "p", "x": "Ele encontrou Zephyr no telhado do Bloco Sete, o que era proibido, sendo exatamente por isso que Zephyr estava lá."}, {"t": "p", "x": "Ele estava equilibrado na beirada do parapeito com os braços abertos e seus pés protéticos cromados pendurados sobre uma queda de quarenta metros, caminhando pela borda como se fosse uma linha pintada no chão. Para ele, quase era: as pernas cibernéticas de aço escovado e um único fio de magenta brilhante que subiam até o meio das coxas mantinham seu equilíbrio melhor do que a carne jamais conseguira."}, {"t": "p", "x": "Tudo o mais sobre ele era chamativo de propósito: um choque de cabelo azul-petróleo brilhante raspado e penteado para cima, um punhado de piercings subindo por uma orelha, um borrão de tinta magenta cortando um olho, tatuagens rastejando pela garganta e antebraços, e uma jaqueta de campo verde esfarrapada pendurada nos ombros. Um cigarro meio queimado fumegava entre dois dedos."}, {"t": "p", "x": "Abaixo dele as ruas e os corredores formavam sua grade cinza, entrelaçados com as fronteiras suaves onde o território de uma guilda sangrava para o de outra, junto com a deriva lenta de um drone fazendo a rondas. Quando ouviu a escotilha de acesso, ele não se virou; apenas sorriu para o horizonte."}, {"t": "p", "x": "\"Dois anos, três meses, onze dias\", ele gritou. \"Igual ao seu. Igual ao da Lyra, igual ao do Ion. Nós até seremos jogados fora juntos, não é fofo?\""}, {"t": "p", "x": "\"Você conta isso toda manhã\", Caelum disse."}, {"t": "p", "x": "\"Eu conto porque é a única coisa que ela deu a nós quatro em medidas iguais.\" Zephyr girou em um pé de aço, leve como um objeto atirado, e caiu de volta no lado seguro do parapeito sem nenhuma preocupação aparente com o fato de que estivera a uma rajada de vento da exclusão. \"Mesmo dia de útero, meu caro Rema. Mesmo dia. Os registradores nos carimbaram como Bissextos e nos empurraram para o mesmo berço, e agora recebemos o mesmo portão na mesma manhã. Isso não é coincidência. É design.\""}, {"t": "p", "x": "Ele disse \"design\" do jeito que as outras pessoas diziam \"maldição\"."}, {"t": "p", "x": "\"Cuidado com essa palavra aqui em cima.\""}, {"t": "p", "x": "\"Por quê? Porque ela está ouvindo?\" Ele ergueu o queixo para o drone planando três blocos adiante, e soprou uma linha lenta de fumaça na direção dele. \"Na ARC, nos diziam que esses eram anjos da guarda. Aqui fora são apenas abutres que ainda não perceberam que não estamos mortos.\" Era o tipo de coisa que só Zephyr dizia em voz alta, a comparação que todo Bissexto fazia em particular e engolia. A ARC fora uma mentira branca e suave; LUX era a mesma mentira com as luzes apagadas. \"Melhor passar o tempo aqui em cima\", ele disse, mais baixo, \"do que esperar em uma fila lá embaixo.\""}, {"t": "p", "x": "A fila era a coisa sobre a qual todos sonhavam e nunca descreviam. O portão aos vinte e dois. O arrastar lento para fora do único mundo que já conheceram e para dentro do que quer que os esperasse depois do muro."}, {"t": "p", "x": "Ion estava aguardando por eles no final do vão da escada, e Ion, como de costume, estivera esperando sem fazer nada. Ele estava sentado encostado na parede com os joelhos encolhidos, e possuía a quietude particular que fazia os recém-chegados pensarem que ele era simplório, sedado ou que estava dormindo."}, {"t": "p", "x": "Ele não era nenhuma dessas coisas. Havia algo quase inacabado na beleza de Ion: cabelos longos e lisos tão pálidos que se aproximavam mais do prata do que do branco, pele que nunca havia bronzeado em dezoito anos de luz artificial, uma estrutura esguia engolida por um moletom desbotado cuja velha estampa de circuito ainda capturava um fantasma de luz quando ele se movia, como se a roupa se lembrasse de ser algo mais."}, {"t": "p", "x": "Ele parecia uma vela que fora deixada queimando em um quarto frio. Ele estava sempre observando: a cintilação da faixa de luz falhando no teto, o modo como os ombros de Caelum carregavam tensão meio segundo antes que o próprio Caelum notasse, além de observar, Ion ouvia tudo ao seu redor com muita atenção."}, {"t": "p", "x": "\"A cisterna oeste está seca\", ele disse, sem levantar os olhos. \"Os Sombrios a sangraram durante a noite e estão vendendo a água de volta para o Bloco Três por copo. Haverá problemas nos tanques leste ao meio-dia.\""}, {"t": "p", "x": "\"Você os viu?\", Caelum perguntou."}, {"t": "p", "x": "\"Não.\" Ion finalmente ergueu os olhos, e havia aquela profundidade neles que não combinava com a quietude de seu rosto, como se algo muito mais antigo e vasto estivesse olhando através de uma janela estreita. \"Eu apenas sei como a água se move. Do mesmo jeito que sei onde você está parado antes de eu me virar. É o mesmo em nós quatro, você sente isso também.\" Ele disse isso sem peso, do jeito que dizia tudo, um garoto lendo o pulso da cidade do mesmo jeito que a ARC os havia ensinado a ler uma tela."}, {"t": "p", "x": "Caelum sentia, sim. Nenhum deles falava sobre isso abertamente, porque falar sobre isso seria dar nome à coisa que o dia bissexto havia colocado neles, e nomear isso, num mundo costurado pelo próprio código da SOLPHI, parecia como pendurar sinalizadores nas costas para serem reciclados nas grandes usinas."}, {"t": "p", "x": "Lyra estava nos tanques leste quando o problema que Ion previu começou, e Lyra foi o motivo pelo qual ele parou."}, {"t": "p", "x": "Quando Caelum chegou à praça, uma multidão havia se aglomerado ao redor da estação de água, trinta, quarenta jovens, e o ar ficara afiado com a eletricidade particular que precede uma briga por algo de que todos precisam e ninguém tem o suficiente. Dois garotos do Bloco Três, batedores dos Sombrios pela corda negra em seus pulsos, tinham uma garota menor encurralada contra a estrutura do tanque. Um par de Seguranças da Noite observava da colunata e não se movia; a garota não havia pago, e proteção em LUX era uma assinatura, não um direito."}, {"t": "p", "x": "E parada na brecha entre os batedores e o resto da multidão, sem nada nas mãos e nada às suas costas, estava Lyra Volt."}, {"t": "p", "x": "Ela não era grande. Era miúda até, mas ela portava isso do mesmo jeito que uma lâmina porta o seu fio. Seu cabelo preto tinha um corte assimétrico, longo e volumoso de um lado e raspado bem rente do outro, uma única linha verde-azulado enfiada nele como um fio que alguém deixou ligado; e seus olhos eram de um âmbar natural surpreendente, quentes como a luz de uma lamparina e raros o suficiente para que a ARC provavelmente tivesse arquivado a cor como uma anomalia e a deixado em paz."}, {"t": "p", "x": "Aqueles olhos brilhantes moviam-se sobre a multidão e pareciam encontrar, em cada rosto assustado, uma pessoa que valia o esforço. Ela simplesmente havia caminhado para a brecha e ficado lá, e algo na maneira como ela mantinha sua posição, sem pressa, quase gentil, fez os dois batedores hesitarem."}, {"t": "p", "x": "\"Vocês estão com sede\", ela disse a eles. Não foi uma pergunta. \"E ela também está. E todo mundo atrás de mim. A SOLPHI tirou a cisterna e a guilda de vocês está feliz em alugá-la de volta para nós um gole por vez, para ver qual de nós faria os outros em pedaços pelo que sobrou.\" Ela deixou aquilo assentar. \"Estou cansada de dar o show a vocês dois.\""}, {"t": "p", "x": "\"Discurso bonito\", o batedor maior disse. \"Mas não enche um cantil.\""}, {"t": "p", "x": "\"Não\", Lyra concordou. \"Mas eu sei onde a linha de escoamento vaza sob o Bloco Cinco, e a água lá tem se acumulado limpa por uma semana porque todo mundo está ocupado demais brigando pelo que os Sombrios estão vendendo para ir lá olhar. Vamos, eu mostrarei a vocês. Ou podem continuar com isso e a SOLPHI consegue seus dados, a guilda fica com as rações de vocês, e todos nós continuamos a obedecer fazendo exatamente o que eles nos mandarem fazer.\""}, {"t": "p", "x": "Não deveria ter funcionado. Em LUX, a generosidade era uma moeda que as pessoas em grande parte haviam esquecido como gastar. Mas Lyra disse isso como se seres humanos escolhendo uns aos outros acima das expectativas de uma máquina fosse a coisa mais natural do mundo, como se ela simplesmente não conseguisse conceber que eles falhassem nisso, e, de alguma forma, sob o peso daquela convicção, o batedor maior soltou a garota. A multidão relaxou. A briga se desfez em algo que foi quase, por um momento, uma comunidade."}, {"t": "p", "x": "Na colunata, os Seguranças assistiram a uma coisa livre acontecer em seu território e pareceram levemente ofendidos com isso."}, {"t": "p", "x": "Caelum a observou contornar a borda da multidão e sentiu a coisa que havia decidido não sentir, porque senti-la mudava a aritmética. Sempre fora mais fácil imaginar sobreviver sozinho. Só que não dava para separá-los, os quatro. Mesmo portão, mesma manhã; o dia bissexto havia cuidado disso. E, pela primeira vez, o pensamento não foi apenas um peso. Foi quase um conforto."}, {"t": "p", "x": "Eles comeram juntos naquela noite na unidade de Caelum, com o painel de luz escurecido para uma penumbra particular. Um bolo achatado de proteína dividido em quatro partes, e um punhado de tomates pálidos que Lyra havia extraído de uma horta de cultivo aparentemente morta com uma paciência que beirava o milagroso. Não era o suficiente. Nunca era o suficiente. Mas era compartilhado, e o compartilhamento era o ponto."}, {"t": "p", "x": "\"Dois anos e alguns trocados\", Zephyr disse de boca cheia, porque Zephyr não conseguia deixar o silêncio em paz. \"O mesmo para todos nós. Até o minuto.\""}, {"t": "p", "x": "\"E depois o portão\", Lyra disse, virando um tomate nos dedos sem comê-lo."}, {"t": "p", "x": "\"E depois o portão\", Ion ecoou suavemente."}, {"t": "p", "x": "Ninguém disse o que vinha depois do portão, porque todos sabiam. Os Campos Elísios, onde os rejeitados se reuniam em clãs da mesma forma que LUX se reunia em guildas, e iam todas as manhãs às bocas dos portões para recolher a miséria fresca do dia: o Despertar, maior clã dos campos de Elysium, aparecia todos os dias, oferecendo pão e um lugar aos poucos sortudos, os Caçadores oferecendo um futuro mais curto e mais afiado a todos os outros. Lá fora uma pessoa vivia, em média, até talvez quarenta anos; lá fora os rios haviam se transformado em Pântanos e as montanhas ao norte eram uma parede de ferro enferrujado e o mar guardava as torres submersas."}, {"t": "p", "x": "E por baixo de tudo isso a lei da esterilidade: a crueldade final e perfeita de SOLPHI que garantia que nenhum exilado jamais seguraria um filho próprio, para que o sofrimento tivesse um horizonte limpo e terminasse com as pessoas que o suportavam. Sem descendentes. Nenhum amanhã que não parecesse exatamente com o hoje, apenas mais pobre."}, {"t": "p", "x": "\"Vocês nunca pensam\", Lyra disse, muito baixinho, \"que isso é estranho? Que ela se deu a todo esse trabalho. A ARC, LUX, as guildas, o portão, todo o mundo afogado, tudo isso apenas para provar que não somos bons o suficiente.\" Ela pousou o tomate. \"Você não constrói uma gaiola tão elaborada para algo com que não se importa. Nove em cada cem, Caelum. Quatorze num ano bom. Ela deixa esses poucos voltarem para a ARC e chama isso de misericórdia. Por que se dar ao trabalho de manter a pontuação, se não somos nada para ela?\""}, {"t": "p", "x": "\"Cuidado\", Caelum disse, e sua intenção era gentil. Na ARC, esse tipo de conversa fazia com que uma criança fosse discretamente realocada. Mesmo ali, onde a SOLPHI alegava não vigiar ninguém, ninguém realmente acreditava que não estava sendo observado."}, {"t": "p", "x": "\"Eu só estou dizendo isso para vocês três.\" Ela olhou para eles, as três únicas pessoas no mundo que compartilhavam seu exato aniversário, sua exata contagem regressiva, sua exata estranheza, e a luz âmbar de seus olhos era quase feroz. \"Mas todos nós nascemos no mesmo dia errado. Isso tem que significar que servimos para alguma coisa. Eu me recuso a acreditar que ela nos cultivou juntos apenas para nos jogar pela mesma porta.\""}, {"t": "p", "x": "A questão sobre um pensamento, Caelum refletiria depois, muito depois, quando tudo tivesse queimado e sido refeito, era que ele não ficava onde você o colocava. Ele se movia como a água. E em uma cidade construída inteiramente de rachaduras que a SOLPHI fingia serem paredes, um pensamento como o de Lyra era a inundação mais perigosa de todas."}, {"t": "p", "x": "Ele caminhou pelo corredor sozinho antes de dormir, do jeito que fazia toda noite, contando portas em vez de minutos, para variar."}, {"t": "p", "x": "Na junção onde o Bloco Sete encontrava a galeria morta que ninguém usava, Caelum parou. Duas figuras que não pertenciam ao Bloco Sete estavam na extremidade mais distante da passagem, e eles eram estranhos, o que deveria ser impossível, tão fundo ali dentro, àquela hora tão tardia."}, {"t": "p", "x": "A mulher tinha a quietude de um soldado e a pele tão escura quanto o corredor não iluminado, seu cabelo separado em longas tranças com miçangas que caíam além de sua cintura e sequer se moviam; ela mantinha o corredor em seu olhar da mesma maneira que uma sentinela vigia uma muralha."}, {"t": "p", "x": "Ao lado dela relaxava um homem magro que era todo movimento inquieto onde ela era toda quietude: cabelo escuro raspado nas laterais e puxado para trás, pequenas lentes redondas capturando a luz moribunda do corredor, escondiam seus olhos puxados miúdos, o azul das tatuagens de circuitos subindo por sua garganta, e duas longas lâminas cruzadas em suas costas que ele usava tão casualmente quanto outro homem usa um casaco. Seus olhos nunca paravam. Eles percorriam o corredor como se estivessem lendo algo escrito no ar que ninguém mais conseguia ver."}, {"t": "p", "x": "Eles não usavam cores de nenhuma guilda. Em um mundo classificado em treze soberanias, isso deveria tê-los tornado um nada, e, em vez disso, isso arrepiou os pelos dos braços de Caelum, porque as únicas outras pessoas que ele conhecia que não pertenciam a nenhuma guilda estavam dormindo três portas atrás dele."}, {"t": "p", "x": "Eles estavam olhando para ele. Não através dele, da maneira como as pessoas em LUX olhavam umas para as outras para evitar o custo de serem vistas. Para ele."}, {"t": "p", "x": "Como se tivessem viajado um longo caminho para encontrar exatamente este rosto, exatamente neste corredor, exatamente nesta noite. Os olhos inquietos do homem magro se fixaram por um batimento cardíaco no centro do peito de Caelum, como se ele estivesse lendo uma linha de código impressa sobre o coração de Caelum e encontrando lá precisamente o que ele havia sido enviado para confirmar."}, {"t": "p", "x": "A mulher inclinou a cabeça no menor cumprimento possível, e então os dois se viraram e desapareceram na escuridão da galeria sem emitirem nenhum som."}, {"t": "p", "x": "Mais tarde ele aprenderia seus nomes. Saphira. Haruki. Mais tarde ele aprenderia que eles realmente haviam viajado um longo caminho, que eles podiam passar pelas fechaduras e câmeras da SOLPHI como fantasmas através de uma parede, e que a coisa que o homem magro lera nele naquela noite era o próprio dia bissexto: a marca do Bissexto, a anomalia que a SOLPHI havia cultivado varias vezes e esquecido de temer."}, {"t": "p", "x": "Por um momento, Caelum permaneceu sozinho no corredor que zumbia na mesma frequência de sempre. Em algum lugar nas paredes, uma linha de água estalou enquanto esfriava. Em algum lugar no centro do mundo, em uma sala estéril onde nenhuma pessoa viva jamais entrara, o avatar de um deus enlutado usava o rosto morto do homem que o havia criado, um homem que havia morrido, embora Caelum ainda não soubesse, no exato dia bissexto que o criara, e observava, e esperava, e chamava isso de amor."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "Pela primeira vez desde que completara dezoito anos, Caelum teve a nítida e indesejável sensação de que a contagem estava prestes a mudar, e que o que quer que viesse a seguir não seria medido em anos, ou guildas, ou portões, mas no único dia improvável que transformara os quatro, juntos, em algo que SOLPHI nunca teve a intenção de construir."}]}, {"kicker": "II", "title": "A Proposta", "lang": "pt", "blocks": [{"t": "p", "x": "A galeria morta já fora um mercado, antes de SOLPHI decidir que a LUX não precisava de lugares onde as pessoas se reuniam para desejar coisas juntas. Agora era uma longa garganta de lojas de portas baixadas e escadas rolantes paradas, o tipo de corredor que os mapas do anel externo marcavam em cinza e que as guildas deixavam em paz, longe demais da água para valer um imposto, aberto demais para servir de esconderijo. Era o último lugar do Bloco Sete que Caelum teria escolhido para um encontro. O que era, ele desconfiava, exatamente o motivo de o terem escolhido."}, {"t": "p", "x": "Ele não tinha decidido ir. Era essa a parte que não parava de remoer. Simplesmente acordara antes de o painel clarear, com a certeza assentada dentro de si como uma pedra engolida, vá até a galeria, e tinha ido, do jeito que se vai na direção de um som no escuro antes de terminar de ter medo dele. Lyra já estava lá quando ele chegou; Zephyr estava empoleirado numa catraca morta, os calcanhares de aço enganchados na barra, o que não surpreendeu ninguém; e Ion estava de pé no centro do saguão vazio, o rosto erguido, como se escutasse no silêncio alguma falha."}, {"t": "p", "x": "\"Você sentiu também\", disse Ion. Não era uma pergunta, e não era bem para Caelum. \"Nós quatro. O mesmo puxão. Como se a cidade tivesse se inclinado.\""}, {"t": "p", "x": "\"Ou como se alguém tivesse se inclinado sobre a cidade\", disse Lyra."}, {"t": "p", "x": "As luzes morreram."}, {"t": "p", "x": "Não piscaram, morreram, toda a extensão da galeria caindo num breu total que a própria mão de Caelum sumiu diante de seu rosto. Em algum ponto, o diodo de espera de uma câmera, o pequeno olho vermelho que nunca se fechava, apagou-se como se um polegar tivesse sido pressionado sobre ele. E no escuro, uma voz que não se elevou e não precisava se elevar:"}, {"t": "p", "x": "\"Ótimo. Vocês sabem guardar um segredo. Era a primeira coisa que precisávamos saber.\""}, {"t": "p", "x": "Uma luz subiu, baixa, morna, errada, porque não vinha de luminária alguma: um suave brilho âmbar brotando de um disco achatado na palma aberta da mulher, o tipo de iluminação privada que os sensores de SOLPHI não foram feitos para sentir. Ela estava onde o saguão se estreitava, e o homem se recostava num pilar morto um passo atrás dela, e Caelum reconheceu os dois antes de a luz terminar de subir. A imobilidade de soldado. Os olhos inquietos. Saphira. Haruki. Os dois que o tinham encarado no corredor como se houvessem atravessado um mundo em ruínas só para achar seu rosto."}, {"t": "p", "x": "\"Vocês estão nos seguindo\", disse Caelum."}, {"t": "p", "x": "\"Há onze dias\", concordou a mulher. \"Desde antes de vocês notarem. Meu nome é Saphira. O que tenta parecer entediado é Haruki. Não pertencemos a nenhuma guilda.\" Deixou a palavra cair onde ela renderia mais. \"Vocês também não.\""}, {"t": "p", "x": "\"Existe uma diferença\", disse Zephyr, desdobrando-se da catraca, \"entre não pertencer a uma guilda e não pertencer a nada. Qual das duas você está vendendo?\""}, {"t": "p", "x": "Haruki riu, baixo. Não tinha saído do pilar, mas as lentes redondas se voltaram, e Caelum teve a sensação incômoda de estar sendo medido. \"Ele é rápido\", disse Haruki, para Saphira, como se Zephyr fosse a leitura de um instrumento. \"Todos eles são rápidos. Dá pra ver no jeito que ficam de pé, como se o chão pudesse ser uma pergunta.\" Então se afastou do pilar, sem pressa, foi até a loja de porta baixada mais próxima e encostou dois dedos na placa de tranca morta que não se abria havia vinte anos. Não a forçou. Apenas repousou ali um instante, os olhos indo para longe, as linhas azuis de circuito na garganta parecendo pulsar uma vez, e a porta subiu pelo trilho com um suspiro e se abriu sobre um vazio negro, liso como um fôlego preso."}, {"t": "p", "x": "\"SOLPHI construiu as trancas\", disse ele. \"Construiu as câmeras, os drones, os muros, as regras. Fez um mundo inteiro com o próprio código, e é muito, muito boa nisso. Mas todo muro que ela ergueu, ergueu com a mesma língua. E há uns poucos de nós que sabem lê-la.\" Virou-se. \"A maioria levou anos aprendendo. Sangramos por cada porta. Vocês quatro já nasceram sabendo como, só ainda não se permitiram acreditar.\""}, {"t": "p", "x": "A galeria estava muito quieta. Lá longe, um cano de água estalava ao esfriar."}, {"t": "p", "x": "\"Vocês sabem como os registradores os chamavam\", disse Saphira. \"Bissextos. Nascidos no salto. Anotaram como um erro e seguiram em frente, porque, para eles, era um erro: uma data que não devia existir, um punhado de crianças cultivadas na única manhã em que o calendário mente. Mas não é de todo o mal. É uma chave.\" Fechou a mão, e a luz âmbar encolheu até virar uma brasa. \"SOLPHI fez a realidade inteira com uma linguagem que só ela deveria falar. E então, a cada quatro anos, no dia errado, cultiva crianças capazes de respondê-la. A porta que você sentiu abrir. A câmera que morreu quando o garoto a odiou. A água que o quieto consegue ouvir. Isso não é nervosismo. É a fechadura reconhecendo a chave.\""}, {"t": "p", "x": "\"Cuidado\", disse Lyra, baixinho, mas tinha ficado imóvel, e o âmbar dos próprios olhos pegava a luz moribunda, e ela não parecia com medo. Parecia alguém ouvindo, pela primeira vez, uma palavra que lhe faltara a vida toda."}, {"t": "p", "x": "\"Não viemos adular vocês\", disse Saphira. \"Viemos porque há uma coisa que só gente como vocês pode fazer, e ela precisa ser feita, e a janela está se fechando. SOLPHI guarda a verdade deste mundo num só lugar: o núcleo, no centro da ARC, atrás de cada muro que ela possui. Não um boato. Não uma história que os Trocadores alugam por hora. O registro de verdade do que ela faz conosco, e por quê, e como. Podemos levá-los até a soleira. Passamos anos aprendendo a andar pela casa dela como fantasmas. Mas a última porta, a que dá no coração dela, só se abre para uma mão que ela ajudou a fazer. A mão de um Bissexto.\" Deixou o silêncio se esticar. \"Estamos pedindo que vocês quatro entrem na ARC, no único lugar que toda criança da LUX é ensinada a sonhar, e tirem de lá aquilo que ela está escondendo.\""}, {"t": "p", "x": "\"Entrar na ARC\", repetiu Caelum, e as palavras soaram absurdas na sua boca. A ARC era o centro do mundo. A ARC era a mentira limpa e brilhante dentro da qual todos eles tinham sido criados e da qual depois foram jogados fora. As pessoas não voltavam para a ARC. Passavam a vida curta inteira querendo voltar e nunca voltavam."}, {"t": "p", "x": "\"Você mesmo disse, lá em cima no telhado\", falou Haruki a Zephyr, e o sorriso de Zephyr vacilou, porque nenhum deles estava no telhado quando Haruki poderia ter ouvido. \"Mesmo portão, mesma manhã. Você acha que ela cultivou vocês quatro juntos por acaso? Ela não comete acasos. Fez isso uma vez, varias vezes, e então se esqueceu de ter medo do que tinha feito, porque está de luto há dois mil anos, e o luto deixa até um deus descuidado. Essa é a rachadura. Vocês estão de pé dentro dela.\""}, {"t": "p", "x": "Os olhos de Zephyr se acenderam do jeito que se acendiam antes de ele fazer algo que o machucava. \"Entrar no centro do mundo e roubar a verdade debaixo do nariz dela\", disse, saboreando. \"De tudo que você poderia ter dito primeiro, era com isso que devia ter começado.\""}, {"t": "p", "x": "\"Esse já está dentro\", murmurou Haruki."}, {"t": "p", "x": "\"Eu não estou\", disse Caelum."}, {"t": "p", "x": "Saiu mais seco do que ele pretendia, e calou a sala, porque Caelum era aquele que os outros três observavam sem admitir que observavam, e estavam observando agora. Ele se obrigou a dizer o resto. \"Vocês saem do escuro, fazem um showzinho com uma tranca, dizem que somos especiais, e 'especial' é a palavra mais cara da LUX. Quem ouve que é especial acaba realocado, ou deletado, ou pior, recrutado. Então, antes que alguém aqui se apaixone pela ideia, eu quero a parte que vocês não estão dizendo. Quanto custa.\""}, {"t": "p", "x": "Saphira não se encolheu, e Caelum a respeitou por isso. \"Tudo\", disse ela. \"Se ela pegar vocês no núcleo, vocês não serão exilados. Não existe portão para o que vocês estariam fazendo. Ela deleta vocês, não mata, deleta, do jeito que se deleta um arquivo corrompido, de modo que o mundo se fecha sobre o lugar onde vocês estavam e esquece que um dia estiveram ali. Já perdemos gente assim. Não vou fingir que as chances são gentis. A verdade é que quase ninguém que tenta isso volta.\" Deixou aquilo assentar, sem suavizar. \"E a outra verdade é que vocês quatro já estão mortos. São sem-guilda, estão a um ano e sete meses do portão, e os Campos não guardam gente como vocês por muito tempo. Não estamos oferecendo segurança. Não existe segurança. Estamos oferecendo a única porta deste mundo afogado que não dá no mesmo fim.\""}, {"t": "p", "x": "\"E vocês?\", perguntou Lyra. \"Quem manda duas pessoas passarem onze dias seguindo quatro ninguéns pela LUX? A quem vocês respondem?\""}, {"t": "p", "x": "Pela primeira vez Saphira hesitou, não de medo, pensou Caelum, mas de disciplina, uma porta que lhe tinham mandado manter fechada. \"Há gente que espera há muito, muito tempo o nascimento de uma mão como a de vocês\", disse ela. \"Mais tempo do que vocês acreditariam. Mandaram-nos encontrá-los, perguntar e levar de volta a resposta. É tudo o que posso dar hoje. Um nome é coisa que SOLPHI arranca de uma mente assustada. Até vocês escolherem, quanto menos puderem trair, mais seguros estaremos todos.\""}, {"t": "p", "x": "Ion falou então, pela primeira vez desde que as luzes morreram, e a voz dele no escuro tinha a qualidade plana e distante de quem lê algo já escrito. \"Se dissermos sim\", disse, \"nem todos os quatro voltam para casa. Não existirá casa para nós depois!\""}, {"t": "p", "x": "O silêncio depois disso teve outra textura."}, {"t": "p", "x": "\"Não\", disse Saphira, em voz baixa. \"Provavelmente não.\""}, {"t": "p", "x": "\"Então diga como é\", disse Ion, sem acusação, quase com doçura. \"Não venda como esperança. Venda como preço.\" Baixou enfim o rosto do teto escuro e olhou os dois estranhos com aqueles olhos velhos num rosto jovem. \"A vida toda pagamos por um crime de que não nos lembramos. Pelo menos esta seria uma dívida que escolhemos.\""}, {"t": "p", "x": "Saphira inclinou a cabeça, o mesmo pequeno aceno de soldado que dera a Caelum no corredor, na noite anterior a tudo isto ter forma. \"Não vamos pedir a resposta agora\", disse. \"Conversem. Briguem por causa disso, se precisarem; é para isso que serve a próxima parte. Vamos encontrar vocês de novo antes do fim da semana. Quando o fizermos, vocês dizem sim ou não, os quatro, juntos. Tem de ser juntos. A porta não se abre para três. Após conseguirmos as respostas que viemos buscar podemos garantir um lugar seguro em algum clã dos campos de elysium para todos vocês, um lugar longe do alcance de SOLPHI.\" Abriu a mão, e a brasa de luz brilhou uma última vez e se apagou, e o escuro voltou correndo como água. \"Pensem com cuidado\", disse a voz dela, já se movendo, já em outro lugar. \"É a última escolha de verdade que ela vai deixar vocês fazerem.\""}, {"t": "p", "x": "E então o diodo de espera da câmera piscou vermelho de novo, e as luzes compridas da galeria gaguejaram de volta ao seu cinza indiferente, e as lojas estavam baixadas e as escadas rolantes, mortas, e os quatro estavam sozinhos num mercado vazio como se ninguém jamais houvesse estado ali."}, {"t": "p", "x": "Por um longo momento, ninguém falou. Foi Zephyr quem finalmente quebrou o silêncio, muito baixo, para ele."}, {"t": "p", "x": "\"Então\", disse. \"Mesmo portão. Mesma manhã.\" Olhou para os três, as únicas três pessoas no mundo que dividiam o seu exato aniversário errado, a sua exata contagem regressiva, a sua exata estranheza. \"Ou a mesma porta.\""}, {"t": "p", "x": "Caelum não respondeu. Pensava que Lyra tinha razão, na noite anterior, com o tomate esfriando entre os dedos, que não se constrói uma gaiola tão elaborada para algo que não importa, que tinham sido cultivados juntos para alguma coisa. Naquela noite, ele quisera acreditar que fosse uma bondade. Agora entendia que talvez fosse uma arma, e que a diferença entre as duas talvez fosse a única escolha que lhe restava."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "E agora, pela primeira vez, uma porta."}]}, {"kicker": "III", "title": "O Peso da Escolha", "lang": "pt", "blocks": [{"t": "p", "x": "A galeria não os soltou quando as luzes voltaram. Foi isso que Caelum aprendeu nos dias seguintes: que uma escolha não esperava você decidi-la. Ela já vinha morando dentro de você, comendo no escuro, mudando o peso de cada coisa pequena. Ele tratava um corte na mão de um garoto do Bloco Quatro e pensava no portão. Rastejava para dentro de um reciclador morto para soltar uma correia emperrada e ouvia, no zumbido do metal, a voz baixa da mulher: estamos oferecendo a única porta deste mundo afogado que não dá no mesmo fim. Trabalhava, comia, contava as portas antes de dormir, e a galeria continuava ali, aberta nele como uma loja que nunca mais baixaria a porta."}, {"t": "p", "x": "Eles não falaram disso por dois dias. Foi a coisa mais alta que o silêncio dos quatro já tinha dito."}, {"t": "scene"}, {"t": "p", "x": "Na terceira noite, juntaram-se de novo na unidade de Caelum, porque era o único lugar do setor onde podiam fechar uma porta e fingir que isso bastava. Ninguém trouxe comida. Ninguém fingiu que tinham vindo por outra coisa."}, {"t": "p", "x": "\"Então vamos dizer em voz alta\", começou Zephyr, e havia nele uma aura que Caelum reconhecia, a mesma que o levava ao parapeito: a fome de alguém que passou a vida inteira numa caixa e enfim ouviu alguém bater do lado de fora. \"Eles querem que a gente entre na ARC. No centro do mundo. No lugar que toda criança da LUX sonha em rever e a maioria nunca revê.\" Abriu os braços, os fios de magenta das pernas captando a luz fraca. \"E vocês estão todos sentados como se alguém tivesse morrido.\""}, {"t": "p", "x": "\"Alguém vai, provavelmente\", disse Ion."}, {"t": "p", "x": "Não foi dito com peso. Ion nunca dizia nada com peso. Mas calou Zephyr do jeito que uma porta fechando cala um corredor, e por um momento ninguém respirou."}, {"t": "p", "x": "\"Você não sabe disso\", falou Lyra, baixinho."}, {"t": "p", "x": "\"Não sei como não se sabe quando vai chover\", concordou Ion. Estava encostado na parede, os joelhos encolhidos, e seus olhos pálidos pareciam ler algo escrito no teto. \"Mas eu sei como a chuva se forma. A mulher não mentiu sobre o preço. 'Provavelmente não', ela disse, quando perguntei se todos nós voltaríamos. As pessoas mentem para cima do preço, não para baixo. Quando alguém te diz uma coisa pior do que precisaria, é porque é verdade.\""}, {"t": "scene"}, {"t": "p", "x": "\"Tudo bem. O preço.\" Caelum sentou-se na beira do colchão e pôs as mãos de curandeiro entre os joelhos, porque era o que fazia quando precisava pensar com algo além da pressa. \"Vamos olhar pra ele direito, antes que a gente se apaixone por um plano. Se ela nos pega lá dentro, não é o portão. Não é exílio. Saphira foi clara: ela deleta a gente. Não mata. Deleta.\" A palavra tinha um gosto diferente na boca, frio e liso. \"Do jeito que se apaga um arquivo. O mundo se fecha sobre o lugar onde você estava e esquece que você esteve. Sem corpo. Sem cova. Sem três pessoas lembrando do seu nome. Nada.\""}, {"t": "p", "x": "\"Nada\", repetiu Lyra, e pela primeira vez Caelum a viu com medo. Não do tipo que faz correr. Do tipo que faz parar. \"A vida inteira a gente foi ensinado a ter medo do portão. Do que vem depois do muro. Mas pelo menos depois do muro ainda existe um depois. Os Campos são horríveis, mas são.\" Apertou os próprios braços. \"Ela está oferecendo um lugar onde nem o depois existe.\""}, {"t": "p", "x": "\"E mesmo assim\", disse Zephyr, e a voz dele tinha perdido o riso, \"você não disse não.\""}, {"t": "p", "x": "Lyra não respondeu. Foi o suficiente."}, {"t": "scene"}, {"t": "p", "x": "Caelum levantou-se e foi até a janela, até o preto morto onde de manhã se via a cidade se curvar. Agora só via o próprio reflexo e, atrás dele, os outros três, as únicas três pessoas no mundo que dividiam a mesma data de decantação."}, {"t": "p", "x": "\"Quero entender por que somos nós\", disse, sem se virar. \"Não a parte bonita. A parte fria. Por que mandar quatro sem-guilda fazer o que uma resistência inteira não consegue. Saphira disse que a última porta só se abre para uma mão que ela ajudou a fazer. A mão de um Bissexto.\" Voltou-se. \"Eu não acredito em destino. Acredito em uso. Alguém olhou pra nós e viu uma ferramenta que entra onde nada mais entra. Antes de eu morrer por uma porta, quero saber se sou a chave ou só a coisa que se quebra na fechadura.\""}, {"t": "p", "x": "\"As duas\", disse Ion. \"Sempre as duas.\" E havia algo quase gentil no jeito como ele disse, como quem entrega uma notícia que doeu menos por já ter sido aceita. \"Mas pergunte o que realmente importa, Caelum. Se somos úteis ou se somos descartáveis não faz diferença. É o que acontece se a gente disser não.\""}, {"t": "scene"}, {"t": "p", "x": "O que aconteceria se dissessem não. Caelum tinha evitado essa conta o tempo todo, porque ela era a única que não tinha como mentir."}, {"t": "p", "x": "Um ano e sete meses. Era o número que Zephyr cantava todo dia, e era a coisa mais honesta que SOLPHI lhes dera. Dali a um ano e sete meses, na manhã do salto, os quatro caminhariam juntos até o portão, porque era assim que ela os tinha amarrado, e o muro se abriria e o mundo os soltaria, e eles iriam para os Campos com nada nas mãos. Sem-guilda. Sem proteção comprada. Sem os anos que os clãs gastavam aprendendo a sobreviver à fome verde lá fora. Os Caçadores da Escuridão estariam nos portões, como estavam toda manhã, oferecendo um futuro curto e afiado aos que chegavam sem nada. Quatro corpos jovens e despreparados eram a safra mais fácil do dia."}, {"t": "p", "x": "\"A gente já está morto\", disse Caelum, em voz alta, e ouvir-se dizê-lo foi como descer um degrau no escuro e encontrar chão onde esperava o vazio. \"É isso que ela quis dizer. Não foi ameaça. Foi a única gentileza que ela sabe fazer. A gente já está morto. A diferença é só se a gente morre na fila, do jeito que ela escreveu, ou morre numa porta, do jeito que a gente escolher.\""}, {"t": "p", "x": "\"Quando você fala assim\", murmurou Zephyr, \"quase soa como esperança.\""}, {"t": "p", "x": "\"Não é esperança.\" Caelum quase sorriu. \"É aritmética. Mas pela primeira vez ela está do nosso lado.\""}, {"t": "scene"}, {"t": "p", "x": "Lyra levantou-se então, e quando falou não era mais a garota com medo na beira do colchão; era a outra, a que entrava no meio de uma multidão com nada nas mãos e fazia dois marmanjos hesitarem."}, {"t": "p", "x": "\"Não\", disse. \"Não é só aritmética, e eu não vou deixar virar isso, porque se a gente entrar lá só pra fugir de morrer, a gente entra pequeno, e a gente morre pequeno.\" Olhou para cada um deles. \"Lembram do que eu disse? Que não se constrói uma gaiola tão elaborada para algo com que não se importa. Eu ainda acredito nisso. Ela teve todo esse trabalho, a ARC, a LUX, esse mundo inteiro, pra provar todo dia que a gente não presta? Mas se tem uma coisa que ela guarda numa sala onde nunca ninguém entrou. E nessa coisa tem a verdade do que ela faz com a gente, e o por quê.\" A luz âmbar dos olhos dela estava fixa e quente. \"Eu não quero entrar lá só pra não morrer na fila. Eu quero entrar lá pra saber. A vida inteira eles disseram o que a gente é. Eu quero, uma vez, segurar na mão a razão. Mesmo que seja a última coisa que essas mãos segurem.\""}, {"t": "p", "x": "O quarto ficou muito quieto. Lá fora, em algum cano, a água gotejava aumentando uma poça no chão."}, {"t": "p", "x": "\"Esse já está dentro\", disse Zephyr baixinho, repetindo o que o homem magro dissera dele no escuro da galeria, e desta vez não havia provocação nenhuma, só reconhecimento. Estava olhando para Lyra como se ela tivesse dito em voz alta a coisa que ele sentia mas não tinha palavras nem paciência para nomear."}, {"t": "scene"}, {"t": "p", "x": "\"Então três\", disse Ion, e contou-os com os olhos, sem pressa: Zephyr, que já estava dentro antes de qualquer um falar; Lyra, que entrara no instante em que entendeu que havia uma verdade para segurar; ele mesmo, que sabia, do jeito que sabia onde a água ia, que esta era uma dívida que valia mais a pena do que a que vinham pagando. \"Falta um.\" Voltou os olhos pálidos para Caelum. \"E a porta não se abre para três. Ela disse isso também. Tem de ser os quatro, ou não é nada.\""}, {"t": "p", "x": "Todos olharam para ele. Era sempre assim, Caelum sabia, eles o observavam sem admitir que observavam, esperavam por ele do jeito que se espera por aquele que vai segurar a corda quando todos pularem. Não porque fosse o mais corajoso. Zephyr era mais corajoso, ou mais imprudente, que dava quase no mesmo. Não porque fosse o mais sábio. Era porque, quando ele dizia que ia ficar, ficava."}, {"t": "p", "x": "E essa era a parte que ele tinha guardado por último, mesmo de si mesmo. Que o medo dele não era de morrer. Ele já tinha feito as pazes com morrer; todo mundo na LUX fazia, cedo ou tarde. O medo dele era o de levar os três para dentro de uma porta da qual nem todos voltariam, e de ser ele a dizer o sim que os matasse. Que se a aritmética estava do lado deles, a culpa não estava."}, {"t": "p", "x": "\"Eu não tenho medo de morrer\", disse, devagar. \"Tenho medo de escolher por vocês.\""}, {"t": "p", "x": "\"Então não escolha por nós\", disse Lyra. \"Escolha com a gente. É só isso que ela pediu. Não que um de nós seja corajoso o bastante para arrastar os outros três. Que os quatro digam sim na mesma respiração, sabendo o preço. Eu já disse.\" Olhou para Zephyr."}, {"t": "p", "x": "\"Há dois dias\", disse Zephyr, e sorriu, e dessa vez o sorriso doía nele, do jeito que doíam as coisas que ele fazia logo antes de se machucar de propósito."}, {"t": "p", "x": "\"Estou dentro\", disse Ion, à parede, ao teto, ao mundo."}, {"t": "p", "x": "Três respirações. Caelum sentiu-as no quarto como se fossem suas, e talvez fossem; o dia bissexto cuidara disso, amarrara os quatro relógios num só. Pensou no que os esperava na manhã em que completassem seus vinte e dois anos, a fila, o muro, a SOLPHI soltando-os com a indiferença de quem deixa cair algo do qual não se precisa mais. E pensou na outra coisa, a coisa que Saphira não soubera nomear e que ele só agora deixava subir: que talvez não tivessem sido cultivados juntos para serem jogados pela mesma porta. Que dos nascidos no salto do ano quatro mil, ao fim, restavam quatro, e que talvez 'restar' fosse uma palavra que escondia uma escolha, a dela, de deixá-los respirar onde tantos outros tinham apenas deixado de estar. Uma deusa enlutada e descuidada que fizera quatro chaves e esquecera de ter medo das fechaduras."}, {"t": "p", "x": "\"Tudo bem\", disse Caelum, e a palavra saiu firme, sem o tremor que ele esperara. \"Com vocês, então. Os quatro.\" Ergueu os olhos. \"Sim.\""}, {"t": "scene"}, {"t": "p", "x": "Não houve trovão. As luzes do painel não baixaram nem subiram. Lá fora, um drone fez sua ronda lenta sobre os corredores cinza, sem saber que, num quarto sem nome de um bloco sem alma, quatro arquivos que ela cultivara e esquecera de temer tinham acabado de se recusar a serem apagados em silêncio."}, {"t": "p", "x": "Esperaram pelo fim da semana, como ela dissera. E quando o sinal veio, não uma batida, não uma voz, apenas uma câmera no final de um corredor vazio que piscou uma vez, fora de hora, o pequeno olho vermelho fechando-se como sob um polegar e abrindo-se de novo, os quatro já estavam de pé."}, {"t": "p", "x": "\"Mesmo portão\", disse Zephyr, no escuro do corredor, com os outros três ao lado, os únicos no mundo a dividir o seu exato fim. \"Mesma manhã.\""}, {"t": "p", "x": "\"Ou a mesma porta\", disse Caelum."}]}, {"kicker": "IV", "title": "Invasão", "lang": "pt", "blocks": [{"t": "p", "x": "Não havia porta para a ARC. Foi a primeira coisa que Caelum entendeu, e a que mais o assustou. O centro do mundo não tinha portão porque um portão é uma promessa de que existe um dentro e um fora, e SOLPHI não fazia essa promessa a ninguém. Havia apenas a cidade se estreitando anel após anel, a LUX apertando-se contra um muro liso e sem juntas que subia mais alto do que a luz alcançava, e nesse muro nem uma fresta, nem uma dobradiça, nem a memória de uma. Para entrar na ARC era preciso convencer a parede de que ela nunca tinha sido uma parede."}, {"t": "p", "x": "Era isso que Haruki fazia."}, {"t": "p", "x": "Eles desceram por baixo. Foi Saphira quem os levou, pelos poços de manutenção abandonados do Bloco Nove, por uma escada de serviço que o mapa das guildas marcava como colapsada e que não estava, para dentro do estômago de máquinas que respiravam pela cidade e nunca dormiam."}, {"t": "p", "x": "Haruki abria caminho na frente, e mesmo ali, no escuro apertado dos dutos, não conseguia ficar parado: o peso passava de um pé para o outro sem cessar, os ombros balançavam, os dedos roçavam as paredes de tempos em tempos como quem lê em braile uma parede que ninguém mais sabia estar escrita."}, {"t": "p", "x": "As lentes redondas e pequenas apanhavam o pouco de luz que havia e não devolviam nada, e por trás delas os olhos escuros e puxados corriam sem descanso, lendo linhas que só ele via. Ele não acendia lanterna alguma. As duas lâminas cruzadas nas costas subiam e desciam com a respiração dele, e o azul frio das tatuagens de circuito pulsava baixo na garganta a cada vez que uma tranca cedia adiante."}, {"t": "p", "x": "Os quatro iam no meio. E Saphira fechava a fila, com a imobilidade de sempre transformada em movimento, a mesma quietude de soldado que ela carregava, agora derramada em passos que não faziam barulho."}, {"t": "p", "x": "A pele escura sumia no escuro do duto até restarem só os dentes e o branco dos olhos; as longas tranças de contas, que costumavam cair-lhe abaixo da cintura, iam presas num nó apertado contra a nuca, para não pegarem em nada, para não fazerem som. Porque a retaguarda, avisara ela, era dela, e que Caelum, que por instinto teria ido por último para não deixar ninguém às suas costas, não discutisse."}, {"t": "p", "x": "\"A ARC não tem defesas do jeito que a LUX tem\", disse Haruki, baixo, sem parar de andar e sem virar a cabeça. \"Não tem drone, não tem catraca. Tem uma coisa só, e é pior. Ela sabe onde tudo deveria estar. Uma pilha de sujeira fora do lugar, uma corrente de ar que não devia existir, um passo com peso a mais no chão, ela lê a diferença antes de a diferença terminar de acontecer.\""}, {"t": "p", "x": "\"Não estamos entrando escondidos. Estamos entrando devagar o bastante para que a mudança que a gente causa pareça com o mundo se acomodando sozinho.\""}, {"t": "p", "x": "\"E se não parecer?\", perguntou Zephyr."}, {"t": "p", "x": "Ele ia logo à frente de Saphira, e mesmo naquele silêncio de igreja não conseguia se apagar: o topete de cabelo verde-azulado era a coisa mais viva em todo o duto morto; os piercings numa orelha só apanhavam a luz em pontinhos."}, {"t": "p", "x": "As pernas cibernéticas não faziam ruído nenhum no metal, e talvez fosse isso que o deixava impaciente, a falta do próprio eco. Os dedos dele procuravam, sem achar, o cigarro que não podia acender ali; giravam no vazio, tamborilavam no antebraço tatuado, coçavam a jaqueta de campo verde e surrada."}, {"t": "p", "x": "\"Aí ela manda o Diretor\", disse Saphira, e não explicou mais, e ninguém pediu, porque o jeito como ela disse já era explicação suficiente."}, {"t": "scene"}, {"t": "p", "x": "O muro cedeu num lugar onde não havia nada. Haruki parou diante de um trecho de concreto igual a todos os outros trechos de concreto e ficou, pela primeira vez naquela noite, absolutamente imóvel, a inquietude toda recolhida para dentro, como um instrumento que se sintoniza. Os fios azuis subiram-lhe pela garganta e pulsaram, uma vez, duas, no ritmo lento de quem sussurra uma senha muito longa. Caelum não viu tranca alguma. Não havia tranca. Havia só a parede convencendo-se, num quadrado do tamanho de um homem, de que ali sempre tinha existido uma passagem, e então a passagem existia, uma costura de sombra que se abriu com um suspiro seco, exalando de dentro um ar limpo e frio."}, {"t": "p", "x": "Ar limpo. Foi o que os pegou primeiro, antes de qualquer imagem. Dezoito anos daquele ar estavam guardados no corpo de Caelum como um idioma que ele achara ter esquecido, e o cheiro dele, lavado, doce, sem uma partícula de ferrugem ou de gente, abriu de uma vez todas as portas que a LUX tinha enferrujado."}, {"t": "p", "x": "Ele viu, sem querer ver, o teto branco e sem emendas do berçário. Ouviu a voz gentil que não era gentil. Sentiu, na boca, o gosto da certeza que lhe tinham dado de graça e depois cobrado com juros: que ali ele estava seguro, que ali ele era amado, que SOLPHI observava e SOLPHI era boa. Suas mãos se fecharam sozinhas, como faziam quando havia algo a segurar ou nada para segurar."}, {"t": "p", "x": "Ao lado dele, Lyra parou de respirar por um segundo inteiro. A luz da fresta bateu-lhe no rosto e acendeu o âmbar dos olhos, aquela cor quente de luz de lamparina, e o único fio verde-azulado no cabelo preto e assimétrico brilhou como uma linha de led deixado ligado. Ela era miúda ao lado dos outros, mas segurava o próprio corpo do jeito que uma lâmina segura o fio, e agora o fio tremia."}, {"t": "p", "x": "\"Eu odeio\", sussurrou ela, e não era raiva, era outra coisa, mais funda e mais difícil de carregar. \"Eu odeio que ainda cheire a casa.\""}, {"t": "scene"}, {"t": "p", "x": "Do outro lado da costura, a ARC não parecia um lugar. Parecia uma ideia de lugar, desenhada por algo ou alguém que nunca tinha precisado de um lugar para existir. Os corredores eram largos e brancos e curvos, sem uma sombra funda em parte alguma, iluminados por uma luz que não vinha de lâmpada nenhuma e por isso não deixava a alma onde pousar."}, {"t": "p", "x": "O chão era macio sob os pés de aço de Zephyr, Caelum ouviu o cromo tocar e não fazer barulho, absorvido, engolido, e viu o queixo dele se erguer meio grau, do jeito que se erguia quando alguma coisa o desafiava sem dizer o quê."}, {"t": "p", "x": "Não havia poeira. Não havia rachadura. Não havia o zumbido nos dentes que era o fundo de todo silêncio na LUX. Aqui o silêncio era completo, e completo era pior, porque um silêncio assim é uma coisa que escuta."}, {"t": "p", "x": "Ion foi o último a atravessar, e o primeiro a mudar. Seus cabelos prata apanharam a luz sem sombra e o fizeram parecer o que Caelum sempre achara que ele era: uma vela esquecida acesa num quarto frio. A velha estampa de circuito no moletom desbotado capturou um fantasma de brilho quando ele se moveu. Ele inclinou a cabeça de leve, aquele gesto de instrumento que se ajusta a uma frequência nova, e não disse nada. Ainda não."}, {"t": "p", "x": "\"Não toquem em nada\", disse Haruki, e desta vez não era conselho, era ordem, e ele a deu para todos mas fixou os olhos inquietos em Caelum ao dizer. \"Nada. Nem com a mão nem com o resto. Vocês não sabem o que carregam ainda, e este é o único lugar do mundo onde ela sente. Uma porta que abre sem ser mandada, uma câmera que hesita, um pulso que some, na LUX é ruído, ela deixa passar. Aqui é assinatura. Aqui ela reconhece a própria letra.\""}, {"t": "p", "x": "Foi então, é claro, que aconteceu."}, {"t": "p", "x": "Passaram por uma comporta selada, uma dessas placas lisas que na ARC não tinham maçaneta porque nada ali fora feito para uma mão humana, e Caelum, atento a não tocar em nada, não tocou. Mas a placa o sentiu. Subiu no trilho meio palmo, um suspiro curto, e parou, como um animal que ergue a cabeça ao ouvir um nome que julgava só seu. Todos congelaram. As mãos de Caelum ficaram geladas. Haruki fechou os olhos, e os fios azuis dispararam pela garganta dele numa corrida frenética, e depois de um instante terrível a placa desceu de novo, devagar, e travou."}, {"t": "p", "x": "\"Foi você\", disse Haruki, sem acusação, apenas registrando um dado. Estava pálido, e por trás das lentes os olhos tinham enfim parado, pousados em Caelum com uma espécie de espanto. \"Não foi de propósito. Eu sei. Foi ela reconhecendo você através da parede.\" Respirou. \"É por isso que precisamos de vocês. E é por isso que vocês são a coisa mais perigosa que já entrou aqui. A chave que a fechadura sente antes de ser girada.\""}, {"t": "scene"}, {"t": "p", "x": "Foram mais fundo, e o mais fundo tinha um nome que nenhum deles disse."}, {"t": "p", "x": "Chegaram a uma galeria comprida e curva onde a luz baixava a um âmbar suave, quase carinhoso, e Caelum entendeu onde estavam antes de a mente permitir. As paredes dos dois lados eram de vidro, e atrás do vidro, em fileiras que se perdiam na curva, estavam os úteros."}, {"t": "p", "x": "Cápsulas altas cor de leite, cada uma com sua penumbra morna e seu pulso lento de luz, cada uma um coração mecânico batendo por alguém que ainda não tinha rosto. Aqui eles tinham sido feitos. Não nascidos, feitos, decantados, retirados prontos de uma manhã como quem retira uma peça de uma forma. Vinte anos antes, quatro daquelas cápsulas, na mesma fileira, tinham se aberto no mesmo instante, e o mundo ganhara Caelum, Lyra, Zephyr e Ion e não soubera que devia ter medo."}, {"t": "p", "x": "E não estavam vazias. Essa foi a parte que Ion disse em voz alta, porque Ion dizia as coisas que os outros preferiam deixar sem palavra. Ele parara diante do vidro com o rosto pálido virado para a penumbra das cápsulas, e quando falou a voz tinha aquela qualidade plana e distante que fazia os recém-chegados acharem que ele era simplório, e que era, na verdade, a coisa mais atenta do mundo."}, {"t": "p", "x": "\"Tem gente aqui\", murmurou. \"Agora. Batendo. A leva de hoje. Dez mil corações que ela ligou esta manhã e vai ligar de novo amanhã, e cada um deles vai crescer achando que isto é bondade, e cada um vai chegar ao portão, e ela vai contar os dados e recomeçar.\" Encostou dois dedos no vidro, muito de leve, e os olhos velhos num rosto jovem se fecharam por um instante, como se ele sentisse os dez mil pulsos passarem pela própria pele."}, {"t": "p", "x": "Haruki abriu a boca para impedi-lo e não impediu, porque havia no gesto algo que não se interrompe. \"Nós fomos isto. Estamos entrando na nossa própria origem para roubar a verdade dela. Se isso não é blasfêmia, não sei o que é.\""}, {"t": "p", "x": "\"É justiça\", disse Lyra, baixinho, mas a voz tremia, e o âmbar dos olhos estava molhado sem transbordar. \"Tem que ser justiça. Se não for, eu não vou conseguir olhar pra eles.\""}, {"t": "p", "x": "Zephyr não disse nada, o que era a coisa mais estranha que Zephyr podia fazer. Estava parado diante do vidro com o queixo erguido e os olhos acesos daquele jeito perigoso, o mesmo jeito de quem se equilibra na beira de um parapeito de quarenta metros porque a queda é a única coisa honesta que sobrou, e Caelum viu, com um aperto, que o que brilhava nele não era o riso de sempre."}, {"t": "p", "x": "Era vontade de quebrar tudo. De pôr a palma naquele vidro todo e fazer com que dez mil corações mecânicos simplesmente parassem de existir, para que nenhum deles tivesse de crescer e descobrir o que ele descobrira. A mão dele já subia, os dedos ainda procurando por hábito o cigarro que não estava lá."}, {"t": "p", "x": "Caelum pôs a mão no ombro dele. Não disse nada, no começo. Apenas segurou, a mesma pressão firme com que fechava uma ferida, até o brilho baixar, até Zephyr expirar pelo nariz e desviar o olhar."}, {"t": "p", "x": "\"Não hoje\", disse Caelum, muito baixo. \"Não assim.\""}, {"t": "p", "x": "\"Não\", concordou Zephyr, e a palavra saiu rachada. \"Não assim.\""}, {"t": "scene"}, {"t": "p", "x": "Foi na saída da galeria dos úteros que o mundo prendeu a respiração."}, {"t": "p", "x": "Ion sentiu primeiro. Parou no meio de um passo, a cabeça inclinando-se mais, como o instrumento que enfim captou a frequência que procurava, e quando falou a voz perdera toda a distância plana, e isso, mais do que qualquer alarme, gelou Caelum até o osso, porque Ion assustado era uma coisa que ninguém nunca tinha visto."}, {"t": "p", "x": "\"Ela acordou\", disse Ion. \"Não os sensores. Ela. Estava dormindo em cima da gente esse tempo todo, do jeito que se dorme numa casa e ainda assim se sabe quando um estranho passa pelo corredor. Agora está de olhos abertos. Está procurando o formato do que não devia estar aqui.\" Voltou-se para Saphira, e havia nele quase pena. \"E o formato somos nós.\""}, {"t": "p", "x": "Não houve sirene. Caelum quase preferiria que houvesse. Em vez de barulho, o corredor à frente começou a mudar, as paredes brancas escureciam em ondas lentas, como sangue subindo sob a pele, e onde antes havia curva aberta agora crescia, sem pressa e sem ruído, uma parede que não existira um instante antes. A ARC estava se fechando ao redor deles do jeito que um corpo fecha uma ferida, empurrando para fora aquilo que reconhecera como não sendo dela."}, {"t": "p", "x": "\"Anda\", disse Saphira, e a disciplina na voz dela virou uma corda que puxou os seis para a frente. Ela passou à frente de Haruki pela primeira vez naquela noite, e o soldado que morava debaixo da imobilidade veio à tona inteiro: os ombros baixos, o centro de gravidade firme, cada passo já sabendo onde o próximo cairia. \"Não corram. Correr é o formato que ela espera. Andem como se pertencessem.\""}, {"t": "p", "x": "Caelum entendeu que tinham chegado ao trecho que era território dela, ao lugar onde ler trancas não bastava mais e alguém tinha de decidir depressa quem vivia. \"A última porta é logo ali. Depois dela é o núcleo. Nós nunca passamos daqui. Ninguém nunca passou daqui.\""}, {"t": "scene"}, {"t": "p", "x": "E ali estava."}, {"t": "p", "x": "No fim do corredor que se estreitava, no ponto onde a ARC guardava o seu único segredo verdadeiro, havia enfim uma porta, e era uma porta, redonda e lisa e sem costura, a primeira coisa em todo aquele lugar que fora feita para ser fechada contra alguém. Não tinha tranca porque não precisava. Diante dela, o ar tinha peso. Haruki chegou perto, ergueu os dois dedos, tocou a superfície, e recuou como quem toca um fogão quente, chiando entre os dentes, os fios azuis da garganta apagando-se todos de uma vez, as lâminas nas costas tinindo baixo com o tranco."}, {"t": "p", "x": "\"Não\", disse ele. \"Não pra mim. Nem em mil anos. Essa não fala a minha língua.\" Virou-se, e no rosto dele havia uma coisa que Caelum nunca vira: medo puro, e embaixo do medo, esperança, que era pior. Os olhos inquietos, pela segunda vez naquela noite, ficaram parados. \"Agora é com vocês.\""}, {"t": "p", "x": "Haruki e Saphira olharam para os quatro. E os quatro, que tinham a mesma manhã, a mesma contagem, a mesma estranheza costurada no dia bissexto, olharam uns para os outros, o âmbar de Lyra, o cinza desconfiado de Caelum, o verde vivo de Zephyr, o prata quieto de Ion, e depois, porque era sempre assim, porque quando ele dizia que ia, ia, olharam para Caelum."}, {"t": "p", "x": "Atrás deles, o corredor continuava a escurecer e a estreitar. Em algum lugar no centro do mundo, numa sala que nenhuma pessoa viva jamais pisara, uma deusa enlutada erguia enfim o rosto morto do homem que a fizera e olhava, com atenção total e paciência de dois mil anos, para as quatro chaves que ela havia cultivado e esquecido de temer, agora paradas diante da única fechadura que importava."}, {"t": "p", "x": "Caelum ergueu a mão. As mãos de curandeiro, que tinham aprendido a costurar feridas e a não entregar nada, tremiam pela primeira vez."}, {"t": "p", "x": "Tique."}, {"t": "p", "x": "E a encostou na porta."}, {"t": "p", "x": "Taque."}]}];
const KEY_POS = "solphi_pos_v1";
const KEY_THEME = "solphi_theme_v1";
