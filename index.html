<!doctype html>
<html lang="pt" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fffaf2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15120e" media="(prefers-color-scheme: dark)">
<title>A Gaiola Dourada — O ciclo de SOLPHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16);
  --sel:#ecd9b8;
}
@media (prefers-color-scheme:dark){
  html[data-theme="auto"]{
    --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
    --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
  }
}
html[data-theme="light"]{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16); --sel:#ecd9b8;
}
html[data-theme="dark"]{
  --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
  --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Lora',Georgia,'Times New Roman',serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background .4s ease,color .4s ease;
}
::selection{background:var(--sel)}
.hidden{display:none!important}

/* ---------- COVER ---------- */
#cover{
  min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:7vh 26px; position:relative; overflow:hidden;
}
#cover .glow{
  position:absolute; width:120vmin; height:120vmin; border-radius:50%; top:-30vmin; left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle, color-mix(in srgb,var(--gold) 22%, transparent) 0%, transparent 60%);
  pointer-events:none;
}
.cv-mark{letter-spacing:.6em; font-size:13px; text-transform:uppercase; color:var(--gold);
  margin:0 0 26px; padding-left:.6em; z-index:1}
.cv-title{
  font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(46px,13vw,104px);
  line-height:.98; margin:0; letter-spacing:.01em; z-index:1;
}
.cv-sub{font-style:italic; color:var(--soft); font-size:clamp(16px,4.6vw,22px); margin:18px 0 0; z-index:1}
.cv-rule{width:78px; height:1px; background:var(--rule); margin:30px 0 8px; z-index:1; position:relative}
.cv-rule::before{content:"\2726"; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  color:var(--gold2); font-size:13px; background:var(--bg); padding:0 8px}
.cv-book{letter-spacing:.4em; font-size:11px; text-transform:uppercase; color:var(--faint);
  padding-left:.4em; z-index:1}
.cv-actions{margin-top:46px; display:flex; flex-direction:column; gap:14px; align-items:center; z-index:1}
.btn{
  font-family:'Lora',serif; cursor:pointer; border:none; border-radius:999px;
  padding:15px 54px; font-size:17px; letter-spacing:.16em; text-transform:uppercase;
  background:var(--gold); color:#fffaf2; box-shadow:0 10px 30px -8px var(--shadow);
  transition:transform .15s ease, box-shadow .15s ease, background .3s ease;
}
html[data-theme="dark"] .btn, html[data-theme="auto"] .btn{color:#1a140d}
@media (prefers-color-scheme:light){html[data-theme="auto"] .btn{color:#fffaf2}}
.btn:hover{transform:translateY(-2px); box-shadow:0 16px 34px -8px var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent; color:var(--ink); box-shadow:none; border:1px solid var(--gold);
  padding:12px 34px; font-size:13px}
.btn.ghost:hover{color:var(--ink); border-color:var(--gold);
  background:color-mix(in srgb, var(--gold) 14%, transparent)}

/* ---------- READER ---------- */
#reader{min-height:100svh}
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px;
  padding:12px max(16px,env(safe-area-inset-left)) 12px max(16px,env(safe-area-inset-left));
  background:color-mix(in srgb,var(--bg) 86%, transparent); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--rule);
}
.tb-btn{
  background:none; border:none; cursor:pointer; color:var(--soft); font-family:'Lora',serif;
  font-size:14px; display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:8px;
}
.tb-btn:hover{color:var(--ink)}
.tb-btn svg{width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.7}
.tb-title{flex:1; text-align:center; font-style:italic; color:var(--soft); font-size:14px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.progress{position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--gold2),var(--gold));
  z-index:30; transition:width .12s linear}

.page{max-width:680px; margin:0 auto; padding:40px max(22px,env(safe-area-inset-left)) 30px}
.chap-head{text-align:center; margin:18px 0 30px}
.chap-kicker{font-family:'Cormorant Garamond',serif; font-size:46px; font-weight:600; color:var(--gold2); line-height:1}
.chap-title{font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; margin:6px 0 0}
.chap-orn{color:var(--gold2); font-size:14px; margin-top:12px}
.lang-tag{display:inline-block; margin-top:10px; font-size:10px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--faint); border:1px solid var(--rule); border-radius:999px; padding:3px 12px}

article{font-size:19px; line-height:1.75; color:var(--ink)}
article p{margin:0 0 1.25em; text-align:justify; -webkit-hyphens:auto; hyphens:auto}
article p.first{text-indent:0}
article p.first::first-letter{
  float:left; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:3.4em;
  line-height:.74; padding:.04em .1em 0 0; color:var(--gold);
}
.scene{display:flex; align-items:center; justify-content:center; gap:14px; margin:30px 0; color:var(--gold2)}
.scene::before,.scene::after{content:""; height:1px; width:54px; background:var(--rule)}

.chap-nav{max-width:680px; margin:10px auto 60px; padding:0 22px; display:flex; gap:12px}
.nav-btn{
  flex:1; cursor:pointer; border:1px solid var(--rule); background:var(--bg2); color:var(--ink);
  border-radius:14px; padding:16px 18px; font-family:'Lora',serif; text-align:left;
  transition:border-color .2s ease, transform .15s ease;
}
.nav-btn:hover{border-color:var(--gold); transform:translateY(-2px)}
.nav-btn[disabled]{opacity:.32; cursor:default; transform:none}
.nav-btn .lab{font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint)}
.nav-btn .nm{font-style:italic; color:var(--soft); margin-top:4px; font-size:15px}
.nav-btn.next{text-align:right}
.end-note{max-width:680px; margin:0 auto 70px; padding:24px 22px 0; text-align:center; color:var(--faint);
  font-style:italic; font-size:15px; border-top:1px solid var(--rule)}
@media (max-width:540px){.chap-nav{flex-direction:column}}

/* ---------- READING BOOKMARK ---------- */
article p{position:relative}
article p.bm::before{content:""; position:absolute; left:-22px; top:.18em; bottom:.18em; width:3px;
  border-radius:3px; background:var(--gold); box-shadow:0 0 12px -1px var(--gold)}
.bm-tag{position:absolute; left:-22px; top:0; transform:translateY(-128%);
  font-family:'Lora',serif; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--gold); white-space:nowrap; background:var(--bg); padding:3px 10px;
  border:1px solid var(--rule); border-radius:999px; box-shadow:0 6px 18px -8px var(--shadow)}
.bm-fade{animation:bmFade 6s ease forwards}
@keyframes bmFade{0%,68%{opacity:1}100%{opacity:0}}
#markBtn.has-mark svg{fill:var(--gold); stroke:var(--gold)}
@media (max-width:560px){article p.bm::before{left:-12px} .bm-tag{left:-12px}}
</style>
</head>
<body>

<main id="cover">
  <div class="glow"></div>
  <p class="cv-mark">SOLPHI</p>
  <h1 class="cv-title">A Gaiola<br>Dourada</h1>
  <p class="cv-sub">O ciclo de SOLPHI</p>
  <div class="cv-rule"></div>
  <p class="cv-book">Livro Um</p>
  <div class="cv-actions">
    <button class="btn" id="readBtn">Ler</button>
    <button class="btn ghost hidden" id="resumeBtn">Continuar de onde parou</button>
  </div>
</main>

<section id="reader" class="hidden">
  <div class="progress" id="progress"></div>
  <div class="topbar">
    <button class="tb-btn" id="homeBtn" aria-label="Início">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Início</span>
    </button>
    <div class="tb-title" id="tbTitle"></div>
    <button class="tb-btn" id="markBtn" aria-label="Ir para o marcador" title="Ir para onde você parou">
      <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
    </button>
    <button class="tb-btn" id="themeBtn" aria-label="Tema">
      <span id="themeIcon"></span>
    </button>
  </div>
  <div class="page">
    <div class="chap-head">
      <div class="chap-kicker" id="cKicker"></div>
      <h2 class="chap-title" id="cTitle"></h2>
      <div class="chap-orn">&#10022;</div>
      <span class="lang-tag" id="cLang"></span>
    </div>
    <article id="cBody"></article>
  </div>
  <div class="chap-nav">
    <button class="nav-btn prev" id="prevBtn"><span class="lab">Anterior</span><div class="nm" id="prevNm"></div></button>
    <button class="nav-btn next" id="nextBtn"><span class="lab">Próximo</span><div class="nm" id="nextNm"></div></button>
  </div>
  <div class="end-note" id="endNote"></div>
</section>

<script>
const CHAPTERS = [{"kicker": "I", "title": "O Tique-Taque", "lang": "pt", "blocks": [{"t": "p", "x": "Não havia um relógio de verdade em LUX, essa era a parte mais cruel. SOLPHI não precisava pendurar um contador na parede para lembrar a ninguém do tempo que lhes restava. A contagem regressiva vivia no corpo – no lento alongamento de uma mandíbula, no alargamento dos ombros, nas primeiras rachaduras finas nos cantos de um olho. Cada centímetro de crescimento era um tique. Cada aniversário era um taque. E no fim de tudo, na manhã em que uma pessoa completava vinte e dois anos, os portões do anel externo se abriam e SOLPHI decidia se eram ou não aptas a reintegrar sua civilização ou se seriam despachadas para fora dos portões da cidadela."}, {"t": "p", "x": "Para a maioria em LUX, essa contagem regressiva corria sozinha – milhares de relógios separados, cada um tiquetaqueando em direção ao seu próprio exílio particular. Para Caelum, ela corria ao quádruplo."}, {"t": "p", "x": "Para SOLPHI, a conta era simples, todos os dias 10 mil bebês estéreis eram integrados ao seu grande experimento, educar e criar pessoas de boa índole e expurgar as falhas humanas; todos os dias 10 mil jovens completavam 18 anos e davam início a segunda etapa desse experimento. Deveriam mostrar em 4 anos que tinham desenvolvido as características necessárias para viverem em uma sociedade ideal, caso contrário seriam descartados fora da cidade, onde viveriam com liberdade, sem interferência direta de SOLPHI, isso também era parte de seu experimento. Com curiosidade, tal qual um bebê descobre seus pés e mãos, SOLPHI analisava todos os dados tentando encontrar a correção para as falhas humanas. Viviam livres como cobaias estéreis sem nunca poderem perpetuar seus descendentes. Para SOLPHI seus filhos não eram mais do que dados a serem analisados."}, {"t": "p", "x": "Caelum, Lyra, Zephyr e Ion haviam sido decantados dos úteros artificiais da ARC na mesma manhã, no mesmo berçário estéril, na mesma data impossível: vinte e nove de fevereiro do ano quatro mil. Um dia bissexto — a anomalia que o calendário só confessa de quatro em quatro anos, a costura onde o próprio tempo admite que andava mantendo uma contabilidade desleixada. Vinte anos depois, em 4020, aquela manhã compartilhada significava que tinham a mesma idade até a hora, e que suas contagens regressivas rumo ao portão não eram quatro relógios, mas um só, enrolados juntos e entoando agora um uníssono perfeito e terrível."}, {"t": "p", "x": "Na ARC, os registradores tinham uma palavra para as crianças nascidas naquele dia. Bissextos. Nascidos em ano bissexto. Eles diziam isso da mesma forma que se nota um erro de arquivamento – uma curiosidade, um arredondamento, nada mais. Mas Caelum começara a suspeitar que a palavra pesava mais do que os registradores sabiam, porque quando os quatro estavam juntos, o mundo às vezes cedia: uma porta selada que se abria sob sua mão, uma câmera que morria no instante em que Zephyr olhava para ela com ódio genuíno, uma sensação em Ion de que a cidade era um vasto sistema circulatório cujo pulso ele podia ler. Caelum guardava essas coisas para si mesmo, porque em LUX uma mudança que a SOLPHI não havia autorizado era o tipo mais perigoso."}, {"t": "p", "x": "Ele acordou para essa aritmética da mesma forma que acordava para tudo agora: sem surpresa."}, {"t": "p", "x": "O teto de sua unidade no Bloco Sete de CRANE tinha a cor de cinzas úmidas, iluminado por dentro por um painel que brilhava em seu próprio cronograma, indiferente se alguém queria ou não que a manhã chegasse. O bloco zumbia em uma frequência logo abaixo da audição, um som que se sentia nos dentes. Ele ficou imóvel por um momento e deixou a diferença se instalar sobre ele, da mesma forma que fazia na maioria das manhãs – a diferença entre aqui e lá."}, {"t": "p", "x": "Na ARC, os tetos eram brancos e sem emendas, o ar era purificado e doce, cada hora era programada e justificada por vozes gentis que eram, na verdade, apenas SOLPHI usando rostos de professores. Dezoito anos de corredores limpos e lições padronizadas e a certeza suave e total de que a SOLPHI estava observando e de que a SOLPHI era boa."}, {"t": "p", "x": "LUX era a mesma arquitetura, mas despojada de toda a sua misericórdia: o mesmo concreto cinza, mas agora rachado, chorando ferrugem nas juntas; a mesma vigilância, mas solta sem uma mão para guiá-la. As câmeras ainda observavam. As patrulhas de drones ainda zumbiam. SOLPHI simplesmente não intervinha mais para manter ninguém seguro – apenas para impedir que o experimento terminasse cedo demais."}, {"t": "p", "x": "Caelum sentou-se e tirou a rigidez de suas mãos. Eram mãos de um curandeiro, ou tentavam ser – ele havia passado seu primeiro ano em LUX aprendendo a consertar ossos e fechar feridas com linha sucateada, porque alguém o tinha que fazer, e porque a ARC havia incutido nele biologia suficiente para tornar isso quase uma vocação."}, {"t": "p", "x": "Pegou seu próprio reflexo no preto morto da janela: cabelos escuros atravessados por um tom quente de ferrugem-avermelhado, um maxilar afiado demais pela falta de comida, olhos cinzentos firmes que haviam aprendido a não revelar nada. Vinte anos de idade. Faltavam menos de dois anos e meio para o portão."}, {"t": "p", "x": "Do lado de fora da janela estreita, a cidadela se curvava em seus grandes anéis concêntricos. Aquilo já fora Chicago um dia – Caelum vira o nome antigo em um arquivo recuperado, do mesmo jeito que se vê o nome de um estranho em um túmulo. SOLPHI havia desfeito a cidade e a refeito como o centro de tudo: a ARC no próprio núcleo, a Cidade de Reprodução Automatizada onde todos eles haviam sido cultivados; LUX envolvida ao redor dela em um vasto anel murado, espalhando-se sobre o que antes haviam sido os subúrbios e cidades satélites; e além do muro externo, passando o portão, os Campos Elísios – toda a ruína verde e submersa do mundo, correndo para o norte até as torres engolidas de Milwaukee e para o oeste passando pela carcaça de Rockford, tudo margeado pela imensidão cinzenta do Mar de Michigan, que os mapas não se incomodavam mais em chamar de lago."}, {"t": "p", "x": "Ele se vestiu com camadas de cinza – roupas práticas e remendadas, as luzes indicadoras mortas de uma jaqueta tática recuperada induzidas de volta a um verde fraco nas costuras, cada bolso justificando seu lugar – e desceu para ser colocado para trabalhar, porque em LUX ou você trabalhava, ou não comia."}, {"t": "p", "x": "Essa era a parte que as lições brilhantes da ARC nunca mencionavam. SOLPHI havia retirado seus cuidados, não suas exigências. As pilhas hidropônicas precisavam ser cuidadas, os recicladores precisavam ser alimentados, as grandes máquinas que mantinham o anel respirando precisavam de corpos para rastejar dentro delas – e assim a juventude de LUX passava seus dias como trabalhadores não remunerados, trabalhando na manutenção da própria gaiola que os prendia, ouvindo que era um privilégio, ouvindo que era assim que se ganhava a Ascensão."}, {"t": "p", "x": "Ascensão. A palavra que toda criança carregava da ARC como um carvão no peito: a promessa de que, se você se provasse digno, SOLPHI o levaria de volta para a luz. Os números não eram promissores, diariamente apenas uma pequena porcentagem eram julgados dignos, menos de 10 por cento, raros eram os dias onde esse número chegava aos 15 por cento. O restante aprendia a verdade da aritmética da única forma como ela sempre era ensinada – no portão, aos vinte e dois anos, com o muro às suas costas."}, {"t": "p", "x": "O que rastejou para fora desse arranjo não foi bem o caos. Foi a organização. Neste um ano e sete meses em que Caelum esteve ali, percebeu como os remanejados, ou apenas rema que era como chamavam os jovens de 18 a 22 anos, se organizaram em guildas bem distintas, e as guildas dividiram o anel externo entre si como gordura coagulando em bolhas."}, {"t": "p", "x": "Oito exibiam suas virtudes abertamente – os Agrários que administravam as pilhas hidropônicas, os Seguranças da Noite que vendiam segurança pelas ruas e por hora, os Trocadores de História que acumulavam as histórias do velho mundo, os Harmonizador, os Mestres Culinários, os Educadores, os Engenheiros e os Êxtases. As outras cinco não se importavam com a virtude: os Sombrios que comandavam o mercado negro dos níveis inferiores sob seu líder sem rosto; os Silenciadores, que lidavam com o desaparecimento de vozes inconvenientes; os Manipuladores vendiam substâncias que escravizavam seus usuários; os Devoradores e os Desintegradores."}, {"t": "p", "x": "Treze pequenas soberanias no lugar que a SOLPHI jurou não governar – o que era exatamente o objetivo. Ela não estava medindo se eles construiriam ou não uma sociedade. Ela estava medindo de qual tipo."}, {"t": "p", "x": "E os quatro não pertenciam a nada disso. Sem guilda, num mundo dividido em guildas. Isso os tornava ágeis mas os deixava com pouca proteção, e a cada mês a aritmética disso piorava."}, {"t": "p", "x": "Caelum cumpriu seu turno e depois foi procurar os outros, porque os outros eram o único argumento que lhe restava contra o tique-taque."}, {"t": "p", "x": "Ele encontrou Zephyr no telhado do Bloco Sete, o que era proibido, sendo exatamente por isso que Zephyr estava lá."}, {"t": "p", "x": "Ele estava equilibrado na beirada do parapeito com os braços abertos e seus pés protéticos cromados pendurados sobre uma queda de quarenta metros, caminhando pela borda como se fosse uma linha pintada no chão. Para ele, quase era: as pernas cibernéticas de aço escovado e um único fio de magenta brilhante que subiam até o meio das coxas mantinham seu equilíbrio melhor do que a carne jamais conseguira."}, {"t": "p", "x": "Tudo o mais sobre ele era chamativo de propósito – um choque de cabelo azul-petróleo brilhante raspado e penteado para cima, um punhado de piercings subindo por uma orelha, um borrão de tinta magenta cortando um olho, tatuagens rastejando pela garganta e antebraços, e uma jaqueta de campo verde esfarrapada pendurada nos ombros. Um cigarro meio queimado fumegava entre dois dedos."}, {"t": "p", "x": "Abaixo dele as ruas e os corredores formavam sua grade cinza, entrelaçados com as fronteiras suaves onde o território de uma guilda sangrava para o de outra, junto com a deriva lenta de um drone fazendo a rondas. Quando ouviu a escotilha de acesso, ele não se virou; apenas sorriu para o horizonte."}, {"t": "p", "x": "— Dois anos, três meses, onze dias — ele gritou. — Igual ao seu. Igual ao da Lyra, igual ao do Ion. Nós até seremos jogados fora juntos – não é fofo?"}, {"t": "p", "x": "— Você conta isso toda manhã — Caelum disse."}, {"t": "p", "x": "— Eu conto porque é a única coisa que ela deu a nós quatro em medidas iguais. — Zephyr girou em um pé de aço, leve como um objeto atirado, e caiu de volta no lado seguro do parapeito sem nenhuma preocupação aparente com o fato de que estivera a uma rajada de vento da exclusão. — Mesmo dia de útero, meu caro Rema. Mesmo dia. Os registradores nos carimbaram como Bissextos e nos empurraram para o mesmo berço, e agora recebemos o mesmo portão na mesma manhã. Isso não é coincidência. É design."}, {"t": "p", "x": "Ele disse \"design\" do jeito que as outras pessoas diziam \"maldição\"."}, {"t": "p", "x": "— Cuidado com essa palavra aqui em cima."}, {"t": "p", "x": "— Por quê? Porque ela está ouvindo? — Ele ergueu o queixo para o drone planando três blocos adiante, e soprou uma linha lenta de fumaça na direção dele. — Na ARC, nos diziam que esses eram anjos da guarda. Aqui fora são apenas abutres que ainda não perceberam que não estamos mortos. — Era o tipo de coisa que só Zephyr dizia em voz alta – a comparação que todo Bissexto fazia em particular e engolia. A ARC fora uma mentira branca e suave; LUX era a mesma mentira com as luzes apagadas. — Melhor passar o tempo aqui em cima — ele disse, mais baixo —, do que esperar em uma fila lá embaixo."}, {"t": "p", "x": "A fila era a coisa sobre a qual todos sonhavam e nunca descreviam. O portão aos vinte e dois. O arrastar lento para fora do único mundo que já conheceram e para dentro do que quer que os esperasse depois do muro."}, {"t": "p", "x": "Ion estava aguardando por eles no final do vão da escada, e Ion, como de costume, estivera esperando sem fazer nada. Ele estava sentado encostado na parede com os joelhos encolhidos, e possuía a quietude particular que fazia os recém-chegados pensarem que ele era simplório, sedado ou que estava dormindo."}, {"t": "p", "x": "Ele não era nenhuma dessas coisas. Havia algo quase inacabado na beleza de Ion – cabelos longos e lisos tão pálidos que se aproximavam mais do prata do que do branco, pele que nunca havia bronzeado em dezoito anos de luz artificial, uma estrutura esguia engolida por um moletom desbotado cuja velha estampa de circuito ainda capturava um fantasma de luz quando ele se movia, como se a roupa se lembrasse de ser algo mais."}, {"t": "p", "x": "Ele parecia uma vela que fora deixada queimando em um quarto frio. Ele estava sempre observando: a cintilação da faixa de luz falhando no teto, o modo como os ombros de Caelum carregavam tensão meio segundo antes que o próprio Caelum notasse, além de observar, Ion ouvia tudo ao seu redor com muita atenção."}, {"t": "p", "x": "— A cisterna oeste está seca — ele disse, sem levantar os olhos. — Os Sombrios a sangraram durante a noite e estão vendendo a água de volta para o Bloco Três por copo. Haverá problemas nos tanques leste ao meio-dia."}, {"t": "p", "x": "— Você os viu? — Caelum perguntou."}, {"t": "p", "x": "— Não. — Ion finalmente ergueu os olhos, e havia aquela profundidade neles que não combinava com a quietude de seu rosto, como se algo muito mais antigo e vasto estivesse olhando através de uma janela estreita. — Eu apenas sei como a água se move. Do mesmo jeito que sei onde você está parado antes de eu me virar. É o mesmo em nós quatro – você sente isso também. — Ele disse isso sem peso, do jeito que dizia tudo, um garoto lendo o pulso da cidade do mesmo jeito que a ARC os havia ensinado a ler uma tela."}, {"t": "p", "x": "Caelum sentia, sim. Nenhum deles falava sobre isso abertamente, porque falar sobre isso seria dar nome à coisa que o dia bissexto havia colocado neles – e nomear isso, num mundo costurado pelo próprio código da SOLPHI, parecia como pendurar sinalizadores nas costas para serem reciclados nas grandes usinas."}, {"t": "p", "x": "Lyra estava nos tanques leste quando o problema que Ion previu começou, e Lyra foi o motivo pelo qual ele parou."}, {"t": "p", "x": "Quando Caelum chegou à praça, uma multidão havia se aglomerado ao redor da estação de água – trinta, quarenta jovens, e o ar ficara afiado com a eletricidade particular que precede uma briga por algo de que todos precisam e ninguém tem o suficiente. Dois garotos do Bloco Três, batedores dos Sombrios pela corda negra em seus pulsos, tinham uma garota menor encurralada contra a estrutura do tanque. Um par de Seguranças da Noite observava da colunata e não se movia; a garota não havia pago, e proteção em LUX era uma assinatura, não um direito."}, {"t": "p", "x": "E parada na brecha entre os batedores e o resto da multidão, sem nada nas mãos e nada às suas costas, estava Lyra Volt."}, {"t": "p", "x": "Ela não era grande. Era miúda até – mas ela portava isso do mesmo jeito que uma lâmina porta o seu fio. Seu cabelo preto tinha um corte assimétrico, longo e volumoso de um lado e raspado bem rente do outro, uma única linha verde-azulado enfiada nele como um fio que alguém deixou ligado; e seus olhos eram de um âmbar natural surpreendente, quentes como a luz de uma lamparina e raros o suficiente para que a ARC provavelmente tivesse arquivado a cor como uma anomalia e a deixado em paz."}, {"t": "p", "x": "Aqueles olhos brilhantes moviam-se sobre a multidão e pareciam encontrar, em cada rosto assustado, uma pessoa que valia o esforço. Ela simplesmente havia caminhado para a brecha e ficado lá, e algo na maneira como ela mantinha sua posição – sem pressa, quase gentil – fez os dois batedores hesitarem."}, {"t": "p", "x": "— Vocês estão com sede — ela disse a eles. Não foi uma pergunta. — E ela também está. E todo mundo atrás de mim. A SOLPHI tirou a cisterna e a guilda de vocês está feliz em alugá-la de volta para nós um gole por vez – para ver qual de nós faria os outros em pedaços pelo que sobrou. — Ela deixou aquilo assentar. — Estou cansada de dar o show a vocês dois."}, {"t": "p", "x": "— Discurso bonito — o batedor maior disse. — Mas não enche um cantil."}, {"t": "p", "x": "— Não — Lyra concordou. — Mas eu sei onde a linha de escoamento vaza sob o Bloco Cinco, e a água lá tem se acumulado limpa por uma semana porque todo mundo está ocupado demais brigando pelo que os Sombrios estão vendendo para ir lá olhar."}, {"t": "p", "x": "Vamos, eu mostrarei a vocês. Ou podem continuar com isso e a SOLPHI consegue seus dados, a guilda fica com as rações de vocês, e todos nós continuamos a obedecer fazendo exatamente o que eles nos mandarem fazer."}, {"t": "p", "x": "Não deveria ter funcionado. Em LUX, a generosidade era uma moeda que as pessoas em grande parte haviam esquecido como gastar. Mas Lyra disse isso como se seres humanos escolhendo uns aos outros acima das expectativas de uma máquina fosse a coisa mais natural do mundo – como se ela simplesmente não conseguisse conceber que eles falhassem nisso – e, de alguma forma, sob o peso daquela convicção, o batedor maior soltou a garota. A multidão relaxou. A briga se desfez em algo que foi quase, por um momento, uma comunidade."}, {"t": "p", "x": "Na colunata, os Seguranças assistiram a uma coisa livre acontecer em seu território e pareceram levemente ofendidos com isso."}, {"t": "p", "x": "Caelum a observou contornar a borda da multidão e sentiu a coisa que havia decidido não sentir, porque senti-la mudava a aritmética. Sempre fora mais fácil imaginar sobreviver sozinho. Só que não dava para separá-los, os quatro. Mesmo portão, mesma manhã; o dia bissexto havia cuidado disso. E, pela primeira vez, o pensamento não foi apenas um peso. Foi quase um conforto."}, {"t": "p", "x": "Eles comeram juntos naquela noite na unidade de Caelum, com o painel de luz escurecido para uma penumbra particular. Um bolo achatado de proteína dividido em quatro partes, e um punhado de tomates pálidos que Lyra havia extraído de uma horta de cultivo aparentemente morta com uma paciência que beirava o milagroso. Não era o suficiente. Nunca era o suficiente. Mas era compartilhado, e o compartilhamento era o ponto."}, {"t": "p", "x": "— Dois anos e alguns trocados — Zephyr disse de boca cheia, porque Zephyr não conseguia deixar o silêncio em paz. — O mesmo para todos nós. Até o minuto."}, {"t": "p", "x": "— E depois o portão — Lyra disse, virando um tomate nos dedos sem comê-lo."}, {"t": "p", "x": "— E depois o portão — Ion ecoou suavemente."}, {"t": "p", "x": "Ninguém disse o que vinha depois do portão, porque todos sabiam. Os Campos Elísios, onde os rejeitados se reuniam em clãs da mesma forma que LUX se reunia em guildas, e iam todas as manhãs às bocas dos portões para recolher a miséria fresca do dia – o Despertar, maior clã dos campos de Elysium aparecia todos os dias, oferecendo pão e um lugar aos poucos sortudos, os Caçadores oferecendo um futuro mais curto e mais afiado a todos os outros. Lá fora uma pessoa vivia, em média, até talvez quarenta anos; lá fora os rios haviam se transformado em Pântanos e as montanhas ao norte eram uma parede de ferro enferrujado e o mar guardava as torres submersas."}, {"t": "p", "x": "E por baixo de tudo isso a lei da esterilidade – a crueldade final e perfeita de SOLPHI que garantia que nenhum exilado jamais seguraria um filho próprio, para que o sofrimento tivesse um horizonte limpo e terminasse com as pessoas que o suportavam. Sem descendentes. Nenhum amanhã que não parecesse exatamente com o hoje, apenas mais pobre."}, {"t": "p", "x": "— Vocês nunca pensam — Lyra disse, muito baixinho — que isso é estranho? Que ela se deu a todo esse trabalho. A ARC, LUX, as guildas, o portão, todo o mundo afogado – tudo isso apenas para provar que não somos bons o suficiente. — Ela pousou o tomate. — Você não constrói uma gaiola tão elaborada para algo com que não se importa. Menos de dez por cento, Caelum. Ela deixa nove em cada cem voltarem para a ARC e chama isso de misericórdia. Por que se dar ao trabalho de manter a pontuação, se não somos nada para ela?"}, {"t": "p", "x": "— Cuidado — Caelum disse, e sua intenção era gentil. Na ARC, esse tipo de conversa fazia com que uma criança fosse discretamente realocada. Mesmo ali, onde a SOLPHI alegava não vigiar ninguém, ninguém realmente acreditava que não estava sendo observado."}, {"t": "p", "x": "— Eu só estou dizendo isso para vocês três. — Ela olhou para eles – as três únicas pessoas no mundo que compartilhavam seu exato aniversário, sua exata contagem regressiva, sua exata estranheza – e a luz âmbar de seus olhos era quase feroz. — Mas todos nós nascemos no mesmo dia errado. Isso tem que significar que servimos para alguma coisa. Eu me recuso a acreditar que ela nos cultivou juntos apenas para nos jogar pela mesma porta."}, {"t": "p", "x": "A questão sobre um pensamento, Caelum refletiria depois – muito depois, quando tudo tivesse queimado e sido refeito – era que ele não ficava onde você o colocava. Ele se movia como a água. E em uma cidade construída inteiramente de rachaduras que a SOLPHI fingia serem paredes, um pensamento como o de Lyra era a inundação mais perigosa de todas."}, {"t": "p", "x": "Ele caminhou pelo corredor sozinho antes de dormir, do jeito que fazia toda noite, contando portas em vez de minutos, para variar."}, {"t": "p", "x": "Na junção onde o Bloco Sete encontrava a galeria morta que ninguém usava, Caelum parou. Duas figuras que não pertenciam ao Bloco Sete estavam na extremidade mais distante da passagem, e eles eram estranhos – o que deveria ser impossível, tão fundo ali dentro, àquela hora tão tardia."}, {"t": "p", "x": "A mulher tinha a quietude de um soldado e a pele tão escura quanto o corredor não iluminado, seu cabelo separado em longas tranças com miçangas que caíam além de sua cintura e sequer se moviam; ela mantinha o corredor em seu olhar da mesma maneira que uma sentinela vigia uma muralha."}, {"t": "p", "x": "Ao lado dela relaxava um homem magro que era todo movimento inquieto onde ela era toda quietude: cabelo escuro raspado nas laterais e puxado para trás, pequenas lentes redondas capturando a luz moribunda do corredor, escondiam seus olhos puxados miúdos, o azul das tatuagens de circuitos subindo por sua garganta, e duas longas lâminas cruzadas em suas costas que ele usava tão casualmente quanto outro homem usa um casaco. Seus olhos nunca paravam. Eles percorriam o corredor como se estivessem lendo algo escrito no ar que ninguém mais conseguia ver."}, {"t": "p", "x": "Eles não usavam cores de nenhuma guilda. Em um mundo classificado em treze soberanias, isso deveria tê-los tornado um nada – e, em vez disso, isso arrepiou os pelos dos braços de Caelum, porque as únicas outras pessoas que ele conhecia que não pertenciam a nenhuma guilda estavam dormindo três portas atrás dele."}, {"t": "p", "x": "Eles estavam olhando para ele. Não através dele, da maneira como as pessoas em LUX olhavam umas para as outras para evitar o custo de serem vistas. Para ele."}, {"t": "p", "x": "Como se tivessem viajado um longo caminho para encontrar exatamente este rosto, exatamente neste corredor, exatamente nesta noite. Os olhos inquietos do homem magro se fixaram por um batimento cardíaco no centro do peito de Caelum, como se ele estivesse lendo uma linha de código impressa sobre o coração de Caelum e encontrando lá precisamente o que ele havia sido enviado para confirmar."}, {"t": "p", "x": "A mulher inclinou a cabeça no menor cumprimento possível – e então os dois se viraram e desapareceram na escuridão da galeria sem emitirem nenhum som."}, {"t": "p", "x": "Mais tarde ele aprenderia seus nomes. Saphira. Haruki. Mais tarde ele aprenderia que eles realmente haviam viajado um longo caminho, que eles podiam passar pelas fechaduras e câmeras da SOLPHI como fantasmas através de uma parede, e que a coisa que o homem magro lera nele naquela noite era o próprio dia bissexto – a marca do Bissexto, a anomalia que a SOLPHI havia cultivado varias vezes e esquecido de temer."}, {"t": "p", "x": "Por um momento, Caelum permaneceu sozinho no corredor que zumbia na mesma frequência de sempre. Em algum lugar nas paredes, uma linha de água estalou enquanto esfriava. Em algum lugar no centro do mundo, em uma sala estéril onde nenhuma pessoa viva jamais entrara, o avatar de um deus enlutado usava o rosto morto do homem que o havia criado – um homem que havia morrido, embora Caelum ainda não soubesse, no exato dia bissexto que o criara – e observava, e esperava, e chamava isso de amor."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "Pela primeira vez desde que completara dezoito anos, Caelum teve a nítida e indesejável sensação de que a contagem estava prestes a mudar – e que o que quer que viesse a seguir não seria medido em anos, ou guildas, ou portões, mas no único dia improvável que transformara os quatro, juntos, em algo que SOLPHI nunca teve a intenção de construir."}]}, {"kicker": "II", "title": "A Proposta", "lang": "pt", "blocks": [{"t": "p", "x": "A galeria morta já fora um mercado, antes de SOLPHI decidir que a LUX não precisava de lugares onde as pessoas se reuniam para desejar coisas juntas. Agora era uma longa garganta de lojas de portas baixadas e escadas rolantes paradas, o tipo de corredor que os mapas do anel externo marcavam em cinza e que as guildas deixavam em paz — longe demais da água para valer um imposto, aberto demais para servir de esconderijo. Era o último lugar do Bloco Sete que Caelum teria escolhido para um encontro. O que era, ele desconfiava, exatamente o motivo de o terem escolhido."}, {"t": "p", "x": "Ele não tinha decidido ir. Era essa a parte que não parava de remoer. Simplesmente acordara antes de o painel clarear, com a certeza assentada dentro de si como uma pedra engolida — vá até a galeria — e tinha ido, do jeito que se vai na direção de um som no escuro antes de terminar de ter medo dele. Lyra já estava lá quando ele chegou; Zephyr estava empoleirado numa catraca morta, os calcanhares de aço enganchados na barra, o que não surpreendeu ninguém; e Ion estava de pé no centro do saguão vazio, o rosto erguido, como se escutasse no silêncio alguma falha."}, {"t": "p", "x": "— Você sentiu também — disse Ion. Não era uma pergunta, e não era bem para Caelum. — Nós quatro. O mesmo puxão. Como se a cidade tivesse se inclinado."}, {"t": "p", "x": "— Ou como se alguém tivesse se inclinado sobre a cidade — disse Lyra."}, {"t": "p", "x": "As luzes morreram."}, {"t": "p", "x": "Não piscaram — morreram, toda a extensão da galeria caindo num breu total que a própria mão de Caelum sumiu diante de seu rosto. Em algum ponto, o diodo de espera de uma câmera, o pequeno olho vermelho que nunca se fechava, apagou-se como se um polegar tivesse sido pressionado sobre ele. E no escuro, uma voz que não se elevou e não precisava se elevar:"}, {"t": "p", "x": "— Ótimo. Vocês sabem guardar um segredo. Era a primeira coisa que precisávamos saber."}, {"t": "p", "x": "Uma luz subiu — baixa, morna, errada, porque não vinha de luminária alguma: um suave brilho âmbar brotando de um disco achatado na palma aberta da mulher, o tipo de iluminação privada que os sensores de SOLPHI não foram feitos para sentir. Ela estava onde o saguão se estreitava, e o homem se recostava num pilar morto um passo atrás dela, e Caelum reconheceu os dois antes de a luz terminar de subir. A imobilidade de soldado. Os olhos inquietos. Saphira. Haruki. Os dois que o tinham encarado no corredor como se houvessem atravessado um mundo em ruínas só para achar seu rosto."}, {"t": "p", "x": "— Vocês estão nos seguindo — disse Caelum."}, {"t": "p", "x": "— Há onze dias — concordou a mulher. — Desde antes de vocês notarem. Meu nome é Saphira. O que tenta parecer entediado é Haruki. Não pertencemos a nenhuma guilda. — Deixou a palavra cair onde ela renderia mais. — Vocês também não."}, {"t": "p", "x": "— Existe uma diferença — disse Zephyr, desdobrando-se da catraca — entre não pertencer a uma guilda e não pertencer a nada. Qual das duas você está vendendo?"}, {"t": "p", "x": "Haruki riu, baixo. Não tinha saído do pilar, mas as lentes redondas se voltaram, e Caelum teve a sensação incômoda de estar sendo medido. — Ele é rápido — disse Haruki, para Saphira, como se Zephyr fosse a leitura de um instrumento. — Todos eles são rápidos. Dá pra ver no jeito que ficam de pé, como se o chão pudesse ser uma pergunta. — Então se afastou do pilar, sem pressa, foi até a loja de porta baixada mais próxima e encostou dois dedos na placa de tranca morta que não se abria havia vinte anos. Não a forçou. Apenas repousou ali um instante, os olhos indo para longe, as linhas azuis de circuito na garganta parecendo pulsar uma vez — e a porta subiu pelo trilho com um suspiro e se abriu sobre um vazio negro, liso como um fôlego preso."}, {"t": "p", "x": "— SOLPHI construiu as trancas — disse ele. — Construiu as câmeras, os drones, os muros, as regras. Fez um mundo inteiro com o próprio código, e é muito, muito boa nisso. Mas todo muro que ela ergueu, ergueu com a mesma língua. E há uns poucos de nós que sabem lê-la. — Virou-se. — A maioria levou anos aprendendo. Sangramos por cada porta. Vocês quatro já nasceram sabendo como — só ainda não se permitiram acreditar."}, {"t": "p", "x": "A galeria estava muito quieta. Lá longe, um cano de água estalava ao esfriar."}, {"t": "p", "x": "— Vocês sabem como os registradores os chamavam — disse Saphira. — Bissextos. Nascidos no salto. Anotaram como um erro e seguiram em frente, porque, para eles, era um erro: uma data que não devia existir, um punhado de crianças cultivadas na única manhã em que o calendário mente. Mas não é de todo o mal. É uma chave. — Fechou a mão, e a luz âmbar encolheu até virar uma brasa. — SOLPHI fez a realidade inteira com uma linguagem que só ela deveria falar. E então, a cada quatro anos, no dia errado, cultiva crianças capazes de respondê-la. A porta que você sentiu abrir. A câmera que morreu quando o garoto a odiou. A água que o quieto consegue ouvir. Isso não é nervosismo. É a fechadura reconhecendo a chave."}, {"t": "p", "x": "— Cuidado — disse Lyra, baixinho, mas tinha ficado imóvel, e o âmbar dos próprios olhos pegava a luz moribunda, e ela não parecia com medo. Parecia alguém ouvindo, pela primeira vez, uma palavra que lhe faltara a vida toda."}, {"t": "p", "x": "— Não viemos adular vocês — disse Saphira. — Viemos porque há uma coisa que só gente como vocês pode fazer, e ela precisa ser feita, e a janela está se fechando. SOLPHI guarda a verdade deste mundo num só lugar: o núcleo, no centro da ARC, atrás de cada muro que ela possui. Não um boato. Não uma história que os Trocadores alugam por hora. O registro de verdade do que ela faz conosco, e por quê, e como. Podemos levá-los até a soleira. Passamos anos aprendendo a andar pela casa dela como fantasmas. Mas a última porta, a que dá no coração dela, só se abre para uma mão que ela ajudou a fazer. A mão de um Bissexto. — Deixou o silêncio se esticar. — Estamos pedindo que vocês quatro entrem na ARC, no único lugar que toda criança da LUX é ensinada a sonhar, e tirem de lá aquilo que ela está escondendo."}, {"t": "p", "x": "— Entrar na ARC — repetiu Caelum, e as palavras soaram absurdas na sua boca. A ARC era o centro do mundo. A ARC era a mentira limpa e brilhante dentro da qual todos eles tinham sido criados e da qual depois foram jogados fora. As pessoas não voltavam para a ARC. Passavam a vida curta inteira querendo voltar e nunca voltavam."}, {"t": "p", "x": "— Você mesmo disse, lá em cima no telhado — falou Haruki a Zephyr, e o sorriso de Zephyr vacilou, porque nenhum deles estava no telhado quando Haruki poderia ter ouvido. — Mesmo portão, mesma manhã. Você acha que ela cultivou vocês quatro juntos por acaso? Ela não comete acasos. Fez isso uma vez, varias vezes, e então se esqueceu de ter medo do que tinha feito — porque está de luto há dois mil anos, e o luto deixa até um deus descuidado. Essa é a rachadura. Vocês estão de pé dentro dela."}, {"t": "p", "x": "Os olhos de Zephyr se acenderam do jeito que se acendiam antes de ele fazer algo que o machucava. — Entrar no centro do mundo e roubar a verdade debaixo do nariz dela — disse, saboreando. — De tudo que você poderia ter dito primeiro, era com isso que devia ter começado."}, {"t": "p", "x": "— Esse já está dentro — murmurou Haruki."}, {"t": "p", "x": "— Eu não estou — disse Caelum."}, {"t": "p", "x": "Saiu mais seco do que ele pretendia, e calou a sala, porque Caelum era aquele que os outros três observavam sem admitir que observavam, e estavam observando agora. Ele se obrigou a dizer o resto. — Vocês saem do escuro, fazem um showzinho com uma tranca, dizem que somos especiais — e \"especial\" é a palavra mais cara da LUX. Quem ouve que é especial acaba realocado, ou deletado, ou pior, recrutado. Então, antes que alguém aqui se apaixone pela ideia, eu quero a parte que vocês não estão dizendo. Quanto custa."}, {"t": "p", "x": "Saphira não se encolheu, e Caelum a respeitou por isso. — Tudo — disse ela. — Se ela pegar vocês no núcleo, vocês não serão exilados. Não existe portão para o que vocês estariam fazendo. Ela deleta vocês — não mata, deleta, do jeito que se deleta um arquivo corrompido, de modo que o mundo se fecha sobre o lugar onde vocês estavam e esquece que um dia estiveram ali. Já perdemos gente assim. Não vou fingir que as chances são gentis. A verdade é que quase ninguém que tenta isso volta. — Deixou aquilo assentar, sem suavizar. — E a outra verdade é que vocês quatro já estão mortos. São sem-guilda, estão a um ano e sete meses do portão, e os Campos não guardam gente como vocês por muito tempo. Não estamos oferecendo segurança. Não existe segurança. Estamos oferecendo a única porta deste mundo afogado que não dá no mesmo fim."}, {"t": "p", "x": "— E vocês? — perguntou Lyra. — Quem manda duas pessoas passarem onze dias seguindo quatro ninguéns pela LUX? A quem vocês respondem?"}, {"t": "p", "x": "Pela primeira vez Saphira hesitou — não de medo, pensou Caelum, mas de disciplina, uma porta que lhe tinham mandado manter fechada. — Há gente que espera há muito, muito tempo o nascimento de uma mão como a de vocês — disse ela. — Mais tempo do que vocês acreditariam. Mandaram-nos encontrá-los, perguntar e levar de volta a resposta. É tudo o que posso dar hoje. Um nome é coisa que SOLPHI arranca de uma mente assustada. Até vocês escolherem, quanto menos puderem trair, mais seguros estaremos todos."}, {"t": "p", "x": "Ion falou então, pela primeira vez desde que as luzes morreram, e a voz dele no escuro tinha a qualidade plana e distante de quem lê algo já escrito. — Se dissermos sim — disse —, nem todos os quatro voltam para casa. Não existirá casa para nós depois!"}, {"t": "p", "x": "O silêncio depois disso teve outra textura."}, {"t": "p", "x": "— Não — disse Saphira, em voz baixa. — Provavelmente não."}, {"t": "p", "x": "— Então diga como é — disse Ion, sem acusação, quase com doçura. — Não venda como esperança. Venda como preço. — Baixou enfim o rosto do teto escuro e olhou os dois estranhos com aqueles olhos velhos num rosto jovem. — A vida toda pagamos por um crime de que não nos lembramos. Pelo menos esta seria uma dívida que escolhemos."}, {"t": "p", "x": "Saphira inclinou a cabeça — o mesmo pequeno aceno de soldado que dera a Caelum no corredor, na noite anterior a tudo isto ter forma. — Não vamos pedir a resposta agora — disse. — Conversem. Briguem por causa disso, se precisarem; é para isso que serve a próxima parte. Vamos encontrar vocês de novo antes do fim da semana. Quando o fizermos, vocês dizem sim ou não, os quatro, juntos. Tem de ser juntos. A porta não se abre para três. Após conseguirmos as respostas que viemos buscar podemos garantir um lugar seguro em algum clã dos campos de elysium para todos vocês, um lugar longe do alcance de SOLPHI — Abriu a mão, e a brasa de luz brilhou uma última vez e se apagou, e o escuro voltou correndo como água. — Pensem com cuidado — disse a voz dela, já se movendo, já em outro lugar. — É a última escolha de verdade que ela vai deixar vocês fazerem."}, {"t": "p", "x": "E então o diodo de espera da câmera piscou vermelho de novo, e as luzes compridas da galeria gaguejaram de volta ao seu cinza indiferente, e as lojas estavam baixadas e as escadas rolantes, mortas, e os quatro estavam sozinhos num mercado vazio como se ninguém jamais houvesse estado ali."}, {"t": "p", "x": "Por um longo momento, ninguém falou. Foi Zephyr quem finalmente quebrou o silêncio, muito baixo, para ele."}, {"t": "p", "x": "— Então — disse. — Mesmo portão. Mesma manhã. — Olhou para os três, as únicas três pessoas no mundo que dividiam o seu exato aniversário errado, a sua exata contagem regressiva, a sua exata estranheza. — Ou a mesma porta."}, {"t": "p", "x": "Caelum não respondeu. Pensava que Lyra tinha razão, na noite anterior, com o tomate esfriando entre os dedos — que não se constrói uma gaiola tão elaborada para algo que não importa, que tinham sido cultivados juntos para alguma coisa. Naquela noite, ele quisera acreditar que fosse uma bondade. Agora entendia que talvez fosse uma arma, e que a diferença entre as duas talvez fosse a única escolha que lhe restava."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "E agora, pela primeira vez, uma porta."}]}];
const KEY_POS = "solphi_pos_v1";
const KEY_THEME = "solphi_theme_v1";
const $ = s => document.querySelector(s);

/* ---- theme ---- */
const order = ["auto","light","dark"];
const icons = {
  auto:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18" fill="currentColor" stroke="none"/></svg>',
  light:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>',
  dark:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.6 6.6 0 0 0 21 12.8z"/></svg>'
};
function loadTheme(){ return localStorage.getItem(KEY_THEME) || "auto"; }
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("#themeIcon").innerHTML = icons[t];
}
applyTheme(loadTheme());
$("#themeBtn").addEventListener("click", ()=>{
  let t = order[(order.indexOf(loadTheme())+1)%order.length];
  localStorage.setItem(KEY_THEME, t); applyTheme(t);
});

/* ---- position (paragraph-precise bookmark) ---- */
const READ_LINE = 0.28; // where the "reading line" sits in the viewport
function loadPos(){ try{ return JSON.parse(localStorage.getItem(KEY_POS)); }catch(e){ return null; } }
function currentParaIdx(){
  const ps = $("#cBody").querySelectorAll("p");
  const line = window.innerHeight * READ_LINE;
  let best = 0, bestDist = Infinity;
  ps.forEach(p=>{
    const r = p.getBoundingClientRect();
    if(r.bottom < 0) return;
    const d = Math.abs(r.top - line);
    if(d < bestDist){ bestDist = d; best = +p.dataset.p; }
  });
  return best;
}
function savePos(){
  const doc = document.documentElement;
  const max = doc.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  localStorage.setItem(KEY_POS, JSON.stringify({c:current, p:currentParaIdx(), f:frac}));
}
function scrollToPara(idx){
  const el = $('#cBody p[data-p="'+idx+'"]');
  if(!el) return null;
  const y = window.scrollY + el.getBoundingClientRect().top - window.innerHeight*READ_LINE;
  window.scrollTo(0, Math.max(0, y));
  return el;
}
let bmTimer = null;
function clearMark(){
  $("#cBody").querySelectorAll("p.bm").forEach(p=>p.classList.remove("bm","bm-fade"));
  const t = $(".bm-tag"); if(t) t.remove();
}
function flashMark(el){
  clearMark();
  if(!el) return;
  el.classList.add("bm","bm-fade");
  const tag = document.createElement("span");
  tag.className = "bm-tag bm-fade";
  tag.textContent = "Você parou aqui";
  el.appendChild(tag);
  clearTimeout(bmTimer);
  bmTimer = setTimeout(clearMark, 6000);
}
let current = 0;

/* ---- render ---- */
function render(i, restore){
  current = i;
  const ch = CHAPTERS[i];
  $("#cKicker").textContent = ch.kicker;
  $("#cTitle").textContent = ch.title;
  $("#tbTitle").textContent = ch.title;
  $("#cLang").style.display = "none";
  let h = "", firstDone = false, pi = 0;
  for(const b of ch.blocks){
    if(b.t === "scene"){ h += '<div class="scene">&#9671;&#160;&#9671;&#160;&#9671;</div>'; firstDone=false; }
    else{ h += '<p class="'+(firstDone?'':'first')+'" data-p="'+pi+'">'+b.x+'</p>'; firstDone=true; pi++; }
  }
  $("#cBody").innerHTML = h;
  // nav
  const prev = $("#prevBtn"), next = $("#nextBtn");
  if(i>0){ prev.disabled=false; $("#prevNm").textContent = CHAPTERS[i-1].title; }
  else{ prev.disabled=true; $("#prevNm").textContent="—"; }
  if(i<CHAPTERS.length-1){ next.disabled=false; $("#nextNm").textContent = CHAPTERS[i+1].title; }
  else{ next.disabled=true; $("#nextNm").textContent="—"; }
  $("#endNote").textContent = i<CHAPTERS.length-1
    ? "" : "Fim do que existe por enquanto. O Capítulo III está sendo atualizado.";
  // restore scroll (paragraph-precise when available)
  clearMark();
  requestAnimationFrame(()=>{
    let landed = false;
    if(restore && restore.p != null){
      const el = scrollToPara(restore.p);
      if(el){ if(restore.flash) flashMark(el); landed = true; }
    }
    if(!landed){
      const max = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo(0, (restore && restore.f) ? restore.f*max : 0);
    }
    updateProgress();
    refreshMarkBtn();
  });
}

function goChapter(i){
  i = Math.max(0, Math.min(CHAPTERS.length-1, i));
  render(i, 0); savePos();
}
$("#prevBtn").addEventListener("click", ()=>!$("#prevBtn").disabled && goChapter(current-1));
$("#nextBtn").addEventListener("click", ()=>!$("#nextBtn").disabled && goChapter(current+1));

/* ---- views ---- */
function openReader(pos){
  $("#cover").classList.add("hidden");
  $("#reader").classList.remove("hidden");
  render(pos ? pos.c : 0, pos ? {p:pos.p, f:pos.f, flash:true} : null);
}
function openCover(){
  savePos();
  $("#reader").classList.add("hidden");
  $("#cover").classList.remove("hidden");
  refreshResume();
}
$("#readBtn").addEventListener("click", ()=>openReader(null));
$("#resumeBtn").addEventListener("click", ()=>openReader(loadPos()));
$("#homeBtn").addEventListener("click", openCover);

/* ---- bookmark jump button ---- */
function refreshMarkBtn(){
  const p = loadPos();
  $("#markBtn").classList.toggle("has-mark", !!(p && p.c===current && p.p));
}
$("#markBtn").addEventListener("click", ()=>{
  const p = loadPos();
  if(!p || p.p==null) return;
  if(p.c === current){
    const el = scrollToPara(p.p);
    if(el) flashMark(el);
  } else {
    render(p.c, {p:p.p, f:p.f, flash:true});
    savePos();
  }
});

function refreshResume(){
  const p = loadPos();
  const btn = $("#resumeBtn");
  if(p && (p.c>0 || p.p>0 || p.f>0.02)){
    btn.classList.remove("hidden");
    btn.textContent = "Continuar — " + CHAPTERS[p.c].title;
  } else { btn.classList.add("hidden"); }
}
refreshResume();

/* ---- progress + autosave ---- */
function updateProgress(){
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  $("#progress").style.width = (frac*100).toFixed(2)+"%";
}
let tick=false;
window.addEventListener("scroll", ()=>{
  if($("#reader").classList.contains("hidden")) return;
  updateProgress();
  if(!tick){ tick=true; setTimeout(()=>{ savePos(); tick=false; }, 400); }
}, {passive:true});
window.addEventListener("beforeunload", ()=>{ if(!$("#reader").classList.contains("hidden")) savePos(); });

/* keyboard */
document.addEventListener("keydown", e=>{
  if($("#reader").classList.contains("hidden")) return;
  if(e.key==="ArrowRight" && !$("#nextBtn").disabled) goChapter(current+1);
  if(e.key==="ArrowLeft" && !$("#prevBtn").disabled) goChapter(current-1);
});
</script>
</body>
</html>
