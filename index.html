<!doctype html>
<html lang="pt" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fffaf2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15120e" media="(prefers-color-scheme: dark)">
<title>A Gaiola Dourada — O ciclo de SOLPHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16);
  --sel:#ecd9b8;
}
@media (prefers-color-scheme:dark){
  html[data-theme="auto"]{
    --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
    --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
  }
}
html[data-theme="light"]{
  --bg:#fffaf2; --bg2:#f6efe2; --ink:#2b2620; --soft:#6a5f52; --faint:#a89a86;
  --gold:#b08968; --gold2:#c9a26a; --rule:#e2d6c2; --shadow:rgba(60,45,25,.16); --sel:#ecd9b8;
}
html[data-theme="dark"]{
  --bg:#15120e; --bg2:#1d1813; --ink:#e8e0d2; --soft:#b6a892; --faint:#7d7261;
  --gold:#d8b483; --gold2:#e0bd86; --rule:#332b21; --shadow:rgba(0,0,0,.5); --sel:#4a3c26;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Lora',Georgia,'Times New Roman',serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  transition:background .4s ease,color .4s ease;
}
::selection{background:var(--sel)}
.hidden{display:none!important}

/* ---------- COVER ---------- */
#cover{
  min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:7vh 26px; position:relative; overflow:hidden;
}
#cover .glow{
  position:absolute; width:120vmin; height:120vmin; border-radius:50%; top:-30vmin; left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle, color-mix(in srgb,var(--gold) 22%, transparent) 0%, transparent 60%);
  pointer-events:none;
}
.cv-mark{letter-spacing:.6em; font-size:13px; text-transform:uppercase; color:var(--gold);
  margin:0 0 26px; padding-left:.6em; z-index:1}
.cv-title{
  font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(46px,13vw,104px);
  line-height:.98; margin:0; letter-spacing:.01em; z-index:1;
}
.cv-sub{font-style:italic; color:var(--soft); font-size:clamp(16px,4.6vw,22px); margin:18px 0 0; z-index:1}
.cv-rule{width:78px; height:1px; background:var(--rule); margin:30px 0 8px; z-index:1; position:relative}
.cv-rule::before{content:"\2726"; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  color:var(--gold2); font-size:13px; background:var(--bg); padding:0 8px}
.cv-book{letter-spacing:.4em; font-size:11px; text-transform:uppercase; color:var(--faint);
  padding-left:.4em; z-index:1}
.cv-actions{margin-top:46px; display:flex; flex-direction:column; gap:14px; align-items:center; z-index:1}
.btn{
  font-family:'Lora',serif; cursor:pointer; border:none; border-radius:999px;
  padding:15px 54px; font-size:17px; letter-spacing:.16em; text-transform:uppercase;
  background:var(--gold); color:#fffaf2; box-shadow:0 10px 30px -8px var(--shadow);
  transition:transform .15s ease, box-shadow .15s ease, background .3s ease;
}
html[data-theme="dark"] .btn, html[data-theme="auto"] .btn{color:#1a140d}
@media (prefers-color-scheme:light){html[data-theme="auto"] .btn{color:#fffaf2}}
.btn:hover{transform:translateY(-2px); box-shadow:0 16px 34px -8px var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent; color:var(--soft); box-shadow:none; border:1px solid var(--rule);
  padding:12px 34px; font-size:13px}
.btn.ghost:hover{color:var(--ink); border-color:var(--gold)}

/* ---------- READER ---------- */
#reader{min-height:100svh}
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px;
  padding:12px max(16px,env(safe-area-inset-left)) 12px max(16px,env(safe-area-inset-left));
  background:color-mix(in srgb,var(--bg) 86%, transparent); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--rule);
}
.tb-btn{
  background:none; border:none; cursor:pointer; color:var(--soft); font-family:'Lora',serif;
  font-size:14px; display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:8px;
}
.tb-btn:hover{color:var(--ink)}
.tb-btn svg{width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.7}
.tb-title{flex:1; text-align:center; font-style:italic; color:var(--soft); font-size:14px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.progress{position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--gold2),var(--gold));
  z-index:30; transition:width .12s linear}

.page{max-width:680px; margin:0 auto; padding:40px max(22px,env(safe-area-inset-left)) 30px}
.chap-head{text-align:center; margin:18px 0 30px}
.chap-kicker{font-family:'Cormorant Garamond',serif; font-size:46px; font-weight:600; color:var(--gold2); line-height:1}
.chap-title{font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; margin:6px 0 0}
.chap-orn{color:var(--gold2); font-size:14px; margin-top:12px}
.lang-tag{display:inline-block; margin-top:10px; font-size:10px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--faint); border:1px solid var(--rule); border-radius:999px; padding:3px 12px}

article{font-size:19px; line-height:1.75; color:var(--ink)}
article p{margin:0 0 1.25em; text-align:justify; -webkit-hyphens:auto; hyphens:auto}
article p.first{text-indent:0}
article p.first::first-letter{
  float:left; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:3.4em;
  line-height:.74; padding:.04em .1em 0 0; color:var(--gold);
}
.scene{display:flex; align-items:center; justify-content:center; gap:14px; margin:30px 0; color:var(--gold2)}
.scene::before,.scene::after{content:""; height:1px; width:54px; background:var(--rule)}

.chap-nav{max-width:680px; margin:10px auto 60px; padding:0 22px; display:flex; gap:12px}
.nav-btn{
  flex:1; cursor:pointer; border:1px solid var(--rule); background:var(--bg2); color:var(--ink);
  border-radius:14px; padding:16px 18px; font-family:'Lora',serif; text-align:left;
  transition:border-color .2s ease, transform .15s ease;
}
.nav-btn:hover{border-color:var(--gold); transform:translateY(-2px)}
.nav-btn[disabled]{opacity:.32; cursor:default; transform:none}
.nav-btn .lab{font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint)}
.nav-btn .nm{font-style:italic; color:var(--soft); margin-top:4px; font-size:15px}
.nav-btn.next{text-align:right}
.end-note{max-width:680px; margin:0 auto 70px; padding:24px 22px 0; text-align:center; color:var(--faint);
  font-style:italic; font-size:15px; border-top:1px solid var(--rule)}
@media (max-width:540px){.chap-nav{flex-direction:column}}

/* ---------- READING BOOKMARK ---------- */
article p{position:relative}
article p.bm::before{content:""; position:absolute; left:-22px; top:.18em; bottom:.18em; width:3px;
  border-radius:3px; background:var(--gold); box-shadow:0 0 12px -1px var(--gold)}
.bm-tag{position:absolute; left:-22px; top:0; transform:translateY(-128%);
  font-family:'Lora',serif; font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--gold); white-space:nowrap; background:var(--bg); padding:3px 10px;
  border:1px solid var(--rule); border-radius:999px; box-shadow:0 6px 18px -8px var(--shadow)}
.bm-fade{animation:bmFade 6s ease forwards}
@keyframes bmFade{0%,68%{opacity:1}100%{opacity:0}}
#markBtn.has-mark svg{fill:var(--gold); stroke:var(--gold)}
@media (max-width:560px){article p.bm::before{left:-12px} .bm-tag{left:-12px}}
</style>
</head>
<body>

<main id="cover">
  <div class="glow"></div>
  <p class="cv-mark">SOLPHI</p>
  <h1 class="cv-title">A Gaiola<br>Dourada</h1>
  <p class="cv-sub">O ciclo de SOLPHI</p>
  <div class="cv-rule"></div>
  <p class="cv-book">Livro Um</p>
  <div class="cv-actions">
    <button class="btn" id="readBtn">Ler</button>
    <button class="btn ghost hidden" id="resumeBtn">Continuar de onde parou</button>
  </div>
</main>

<section id="reader" class="hidden">
  <div class="progress" id="progress"></div>
  <div class="topbar">
    <button class="tb-btn" id="homeBtn" aria-label="Início">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>Início</span>
    </button>
    <div class="tb-title" id="tbTitle"></div>
    <button class="tb-btn" id="markBtn" aria-label="Ir para o marcador" title="Ir para onde você parou">
      <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
    </button>
    <button class="tb-btn" id="themeBtn" aria-label="Tema">
      <span id="themeIcon"></span>
    </button>
  </div>
  <div class="page">
    <div class="chap-head">
      <div class="chap-kicker" id="cKicker"></div>
      <h2 class="chap-title" id="cTitle"></h2>
      <div class="chap-orn">&#10022;</div>
      <span class="lang-tag" id="cLang"></span>
    </div>
    <article id="cBody"></article>
  </div>
  <div class="chap-nav">
    <button class="nav-btn prev" id="prevBtn"><span class="lab">Anterior</span><div class="nm" id="prevNm"></div></button>
    <button class="nav-btn next" id="nextBtn"><span class="lab">Próximo</span><div class="nm" id="nextNm"></div></button>
  </div>
  <div class="end-note" id="endNote"></div>
</section>

<script>
const CHAPTERS = [{"kicker": "I", "title": "O Tique-Taque", "lang": "pt", "blocks": [{"t": "p", "x": "Não havia relógio de verdade na LUX, e essa era a parte mais cruel. SOLPHI não precisava pendurar um contador na parede para lembrar ninguém do tempo que lhe restava. A contagem regressiva morava no corpo — no lento alongar de um maxilar, no alargar dos ombros, nas primeiras rachaduras finas no canto de um olho. Cada centímetro de crescimento era um tique. Cada aniversário, um taque. E no fim de tudo, na manhã em que a pessoa completava vinte e dois anos, os portões do anel externo se abriam e o mundo simplesmente a soltava."}, {"t": "p", "x": "A LUX se estendia em milhões, anel sobre anel, mais gente do que Caelum veria em toda a sua vida curta; mas o pedaço dela em que fora largado — os quarenta mil presos entre os muros do mesmo setor — esse ele conhecia quase relógio por relógio. Para a maior parte deles, a contagem corria sozinha, cada um tiquetaqueando rumo ao próprio exílio particular. Para Caelum Draco, ela corria de quatro em quatro."}, {"t": "p", "x": "Ele e Lyra Voltaire, Zephyr e Ion tinham sido decantados dos úteros artificiais da ARC na mesma manhã, no mesmo berçário estéril, na mesma data impossível: o vinte e nove de fevereiro do ano quatro mil. Um dia bissexto — a anomalia que o calendário só confessa de quatro em quatro anos, a costura onde o próprio tempo admite que andava mantendo uma contabilidade desleixada. Vinte anos depois, em 4020, aquela manhã compartilhada significava que tinham a mesma idade até a hora, e que suas contagens regressivas rumo ao portão não eram quatro relógios, mas um só, dado corda em conjunto e tiquetaqueando agora em uníssono perfeito e terrível."}, {"t": "p", "x": "Na ARC, os registradores tinham uma palavra para as crianças nascidas naquele dia. Bissextos. Nascidos no salto. Diziam do jeito que se anota um erro de arquivo — uma curiosidade, um arredondamento, nada mais. E eram poucos, sempre poucos, e menos a cada salto: Caelum tinha lembranças finas do berçário bissexto se esvaziando ao longo dos anos, crianças nascidas naquela mesma manhã que um dia simplesmente não estavam mais lá, sem que nenhuma voz gentil jamais explicasse para onde tinham ido. Dos nascidos no salto do ano quatro mil, ao fim, restavam quatro. Ele aprendera cedo a não perguntar por quê. Mas Caelum começara a desconfiar de que a palavra pesava mais do que os registradores sabiam, porque, quando os quatro estavam juntos, o mundo às vezes cedia: uma porta lacrada abrindo-se com um suspiro sob a mão dele, uma câmera morrendo no instante em que Zephyr a olhava com ódio de verdade, uma sensação em Ion da cidade como um vasto sistema circulatório cujo pulso ele conseguia ler. Caelum guardava essas coisas para si, porque na LUX uma mudança que SOLPHI não houvesse autorizado era a mais perigosa de todas."}, {"t": "p", "x": "Ele acordou para essa aritmética do jeito que acordava para tudo agora: sem surpresa. O teto da sua unidade no Bloco Sete da CRANE tinha a cor de cinza molhada, aceso por dentro por um painel que clareava no próprio horário, indiferente a quem quisesse ou não que a manhã chegasse. O bloco zumbia numa frequência logo abaixo da audição, um som que se sentia nos dentes. Ficou imóvel um instante e deixou a diferença assentar sobre ele, como fazia quase toda manhã — a diferença entre aqui e lá."}, {"t": "p", "x": "Na ARC, os tetos eram brancos e sem emendas, o ar lavado e doce, cada hora agendada e prestada por vozes gentis que não passavam de SOLPHI usando o rosto de professores. Dezoito anos de corredores limpos e lições padronizadas e a certeza suave e total de que SOLPHI observava e SOLPHI era boa. A LUX era a mesma arquitetura despida de toda a sua misericórdia: o mesmo concreto cinza, agora rachado, chorando ferrugem nas juntas; a mesma vigilância, mas solta, sem uma mão para guiá-la. As câmeras ainda observavam. As patrulhas de drones ainda zuniam. SOLPHI apenas não intervinha mais para manter ninguém em segurança — só para impedir que o experimento terminasse cedo demais."}, {"t": "p", "x": "Caelum sentou-se e tirou a rigidez das mãos. Eram mãos de curandeiro, ou tentavam ser — ele passara o primeiro ano de LUX aprendendo a encaixar ossos e fechar feridas com linha catada, porque alguém tinha de fazer, e porque a ARC enfiara biologia suficiente em todos eles para que aquilo fosse quase um chamado. Pegou o próprio reflexo no preto morto da janela: cabelo escuro atravessado por um ruivo-acobreado quente, um maxilar afiado demais de comida de menos, olhos cinzentos firmes que tinham aprendido a não entregar nada. Vinte anos. Faltavam pouco menos de dois e meio para o portão."}, {"t": "p", "x": "Para além da janela estreita, a cidadela se curvava em seus grandes anéis concêntricos. Aquilo já fora Chicago — Caelum vira o nome antigo num arquivo recuperado, do jeito que se vê o nome de um estranho numa lápide. SOLPHI desfizera a cidade e a refizera como o centro de tudo: a ARC no núcleo, a Cidade de Reprodução Automatizada onde todos eles haviam sido cultivados; a LUX enrolada em volta num vasto anel murado, espalhada sobre o que um dia foram os subúrbios e as cidades-satélite; e além do muro externo, depois do portão, os Campos Elísios — toda a ruína verde e afogada do mundo, correndo ao norte até as torres engolidas de Milwaukee e a oeste para além da carcaça de Rockford, tudo isso debruado pela imensidão cinzenta do Mar de Michigan, que os mapas já nem se davam ao trabalho de chamar de lago."}, {"t": "p", "x": "Vestiu-se em camadas de cinza — prático e remendado, as luzes-piloto mortas de uma jaqueta tática recuperada coaxadas de volta a um verde fraco nas costuras, cada bolso merecendo seu lugar — e desceu para ser posto a trabalhar, porque na LUX você trabalhava ou não comia."}, {"t": "p", "x": "Essa era a parte que as lições brilhantes da ARC nunca mencionavam. SOLPHI retirara o cuidado, não as exigências. As estufas precisavam de trato, os recicladores precisavam ser alimentados, as grandes máquinas que mantinham o anel respirando precisavam de corpos para rastejar dentro delas — e assim a juventude da LUX passava os dias como mãos não pagas, labutando na manutenção da própria gaiola que a prendia, a quem diziam ser um privilégio, diziam ser como se merecia a Ascensão. Ascensão. A palavra que toda criança levava para fora da ARC como uma brasa no peito: a promessa de que, se você se provasse digno, SOLPHI o tomaria de volta para a luz. Apenas nove a quatorze de cada cem eram algum dia julgados dignos. O resto aprendia a verdade da aritmética do único jeito que ela era ensinada — no portão, aos vinte e dois, com o muro às costas."}, {"t": "p", "x": "O que rastejara para fora desse arranjo não era bem o caos. Era organização. No ano e sete meses em que Caelum estivera ali, os quarenta mil do seu setor tinham se separado em treze guildas, e as guildas tinham talhado o anel externo entre si como graxa coalhando em formas. Oito ostentavam suas virtudes às claras — os Agrários, que tocavam as estufas hidropônicas roubadas; os Seguranças da Noite, que vendiam segurança por corredor e por hora; os Trocadores de História, que entesouravam as histórias do velho mundo; os Harmonizadores, os Mestres Culinários, os Exploradores Urbanos, os Engenheiros Criativos, os Êxtases. As outras cinco não se incomodavam com virtude: os Sombrios, que tocavam o mercado negro dos subníveis sob seu líder sem rosto, Umbra Obscura; os Silenciadores, sob Morsa Muta, que lidavam com o sumiço de vozes inconvenientes; os Manipuladores de Realidade, que vendiam sonhos fabricados; os Devoradores de Emoções; os Desintegradores. Treze pequenas soberanias no lugar onde SOLPHI jurava não governar — que era justamente o ponto. Ela não media se eles construiriam uma sociedade. Media que tipo de sociedade."}, {"t": "p", "x": "E os quatro não pertenciam a nada disso. Sem-guilda, num mundo dividido em guildas. Isso os deixava leves nos pés e mais leves ainda em proteção, e a cada mês a aritmética disso piorava."}, {"t": "p", "x": "Caelum cumpriu seu turno e depois foi procurar os outros, porque os outros eram o único argumento que lhe restava contra o tique-taque."}, {"t": "scene"}, {"t": "p", "x": "Encontrou Zephyr no telhado do Bloco Sete, o que era proibido, o que era exatamente por que Zephyr estava lá."}, {"t": "p", "x": "Estava equilibrado na borda do parapeito, os braços abertos e os pés protéticos de cromo pendurados sobre uma queda de quarenta metros, caminhando pela beira como se fosse uma linha pintada no chão. Para ele, quase era: as pernas cibernéticas que iam do meio da coxa em aço escovado e um único fio de magenta brilhante mantinham o equilíbrio melhor do que a carne jamais mantivera. Todo o resto nele era barulhento de propósito — um topete de cabelo verde-azulado vivo, raspado e armado para cima, uma profusão de piercings subindo por uma orelha, um borrão de tinta magenta riscado sobre um olho, tatuagens rastejando pela garganta e antebraços, e uma jaqueta de campo verde surrada pendurada nos ombros. Um cigarro pela metade fumegava entre dois dedos. Abaixo dele, os corredores corriam em sua grade cinzenta, costurados pelas fronteiras tênues onde o território de uma guilda sangrava no de outra, e pela deriva lenta de um drone fazendo a ronda. Quando ouviu a escotilha de acesso, não se virou; só sorriu para o horizonte."}, {"t": "p", "x": "— Dois anos, três meses, onze dias — gritou. — Igual ao seu. Igual ao da Lyra, igual ao do Ion. A gente até é jogado fora junto — não é uma graça?"}, {"t": "p", "x": "— Você conta toda manhã — disse Caelum."}, {"t": "p", "x": "— Conto porque é a única coisa que ela deu aos quatro em medida igual. — Zephyr girou sobre um pé de aço, leve como coisa atirada, e caiu de volta no lado seguro do parapeito sem nenhuma preocupação aparente com o fato de ter estado a uma rajada de vento da deleção. — Mesmo dia de útero, Draco. Mesmo dia bissexto. Os registradores nos carimbaram Bissextos e nos enfiaram no mesmo berço, e agora a gente ganha o mesmo portão na mesma manhã. Isso não é coincidência. É projeto. — Ele dizia projeto do jeito que os outros diziam praga."}, {"t": "p", "x": "— Cuidado com essa palavra aqui em cima."}, {"t": "p", "x": "— Por quê? Porque ela está escutando? — Ergueu o queixo na direção do drone deslizando três quadras adiante e soprou nele uma linha lenta de fumaça. — Na ARC, disseram que aquilo eram anjos da guarda. Aqui fora, são só urubus que ainda não sacaram que a gente não está morto. — Era o tipo de coisa que só Zephyr dizia em voz alta — a comparação que todo Bissexto fazia em segredo e engolia. A ARC fora uma mentira branca e macia; a LUX era a mesma mentira com as luzes apagadas. — Melhor passar o tempo aqui em cima — disse, mais baixo — do que esperar numa fila lá embaixo."}, {"t": "p", "x": "A fila era a coisa com que todos sonhavam e que nunca descreviam. O portão aos vinte e dois. O arrastar lento para fora do único mundo que tinham conhecido e para dentro do que quer que esperasse além do muro."}, {"t": "scene"}, {"t": "p", "x": "Ion os esperava no fim da escadaria, e Ion, como de costume, esperava sem fazer absolutamente nada."}, {"t": "p", "x": "Estava sentado contra a parede, com os joelhos encolhidos, e tinha aquela imobilidade peculiar que fazia os recém-chegados pensarem que ele era simplório, ou sedado, ou dormindo. Não era nenhuma dessas coisas. Havia algo de quase inacabado na beleza de Ion — cabelo longo e liso, tão pálido que estava mais para prateado do que para branco, pele que jamais escurecera em dezoito anos de luz artificial, um corpo esguio engolido por um moletom desbotado cuja velha estampa de circuito ainda capturava um fantasma de luz quando ele se movia, como se a roupa lembrasse de ter sido algo mais. Parecia uma vela deixada acesa num quarto frio. Estava sempre observando: o tremular da lâmpada falhando lá no alto, o jeito como os ombros de Caelum carregavam tensão meio segundo antes de o próprio Caelum perceber."}, {"t": "p", "x": "— A cisterna oeste secou — disse, sem erguer os olhos. — Os Sombrios a sangraram durante a noite e estão revendendo para o Bloco Três a preço de copo. Vai dar confusão nos tanques leste lá pelo meio-dia."}, {"t": "p", "x": "— Você os viu? — perguntou Caelum."}, {"t": "p", "x": "— Não. — Ion enfim ergueu os olhos, e havia neles aquela profundidade que não combinava com a quietude do rosto, como se algo muito mais velho e muito mais vasto espiasse por uma janela estreita. — Eu só sei como a água se move. Do jeito que sei onde você está antes de me virar. É igual nos quatro — você também sente. — Disse sem peso, como dizia tudo, um menino lendo o pulso da cidade do jeito que a ARC os ensinara a ler uma tela."}, {"t": "p", "x": "Caelum sentia mesmo. Nenhum deles falava disso abertamente, porque falar seria dar nome à coisa que o dia bissexto pusera neles — e dar nome, num mundo costurado a partir do próprio código de SOLPHI, era como levantar a mão num cômodo onde lhe tinham prometido que ninguém observava."}, {"t": "scene"}, {"t": "p", "x": "Lyra estava nos tanques leste quando começou a confusão que Ion previra, e Lyra foi o motivo de ela parar."}, {"t": "p", "x": "Quando Caelum chegou à praça, uma multidão tinha engrossado em volta da estação de água — trinta, quarenta jovens, o ar afiado com aquela eletricidade particular que precede uma briga por algo de que todos precisam e ninguém tem o bastante. Dois garotos do Bloco Três, corredores Sombrios pelo cordão cinza nos pulsos, tinham uma garota menor prensada contra a carcaça do tanque. Um par de Seguranças da Noite assistia da colunata e não se mexia; a garota não tinha pago, e proteção na LUX era assinatura, não direito. E de pé na brecha entre os corredores e o resto da multidão, sem nada nas mãos e nada às costas, estava Lyra Voltaire."}, {"t": "p", "x": "Não era grande. Era miúda, até — mas carregava isso como uma lâmina carrega o fio. O cabelo preto cortado assimétrico, comprido e caído de um lado e raspado rente do outro, um único fio verde-azulado atravessando-o como um arame que alguém tivesse deixado vivo; e os olhos eram de um âmbar natural surpreendente, quentes como luz de lamparina e raros o bastante para que a ARC provavelmente tivesse fichado a cor como anomalia e a deixado em paz. Aqueles olhos claros percorriam a multidão e pareciam encontrar, em cada rosto assustado, uma pessoa que valia o incômodo. Ela simplesmente entrara na brecha e ali ficara, e algo no modo como se firmava — sem pressa, quase gentil — fez os dois corredores hesitarem."}, {"t": "p", "x": "— Você está com sede — disse a eles. Não era pergunta. — Ela também. Todo mundo atrás de mim também. SOLPHI tirou a cisterna — e a sua guilda fica feliz de alugá-la de volta pra gente uma golada por vez — pra ver quais de nós se despedaçariam pelo que sobrou. — Deixou aquilo assentar. — Cansei de dar o espetáculo aos dois."}, {"t": "p", "x": "— Belo discurso — disse o corredor maior. — Não enche um cantil."}, {"t": "p", "x": "— Não — concordou Lyra. — Mas eu sei onde a linha de escoamento desemboca embaixo do Bloco Cinco, e faz uma semana que ela está empoçando água limpa porque todo mundo está ocupado demais brigando pelo que os Sombrios vendem pra ir lá ver. Vou mostrar a todos vocês. Ou vocês continuam com isso, e SOLPHI ganha os dados dela, e a guilda ganha as suas rações, e todos nós continuamos exatamente o que dizem que somos."}, {"t": "p", "x": "Não devia ter funcionado. Na LUX, generosidade era uma moeda que as pessoas em geral tinham esquecido como gastar. Mas Lyra dizia aquilo como se seres humanos escolherem uns aos outros em vez das expectativas de uma máquina fosse a coisa mais natural do mundo — como se ela simplesmente não conseguisse conceber que falhassem nisso — e, de algum modo, sob o peso daquela convicção, o corredor maior soltou a garota. A multidão afrouxou. A briga se desfez em algo que era quase, por um instante, uma comunidade. Lá em cima, na colunata, os Seguranças assistiram a uma coisa livre acontecer em seu território e pareceram levemente insultados por isso."}, {"t": "p", "x": "Caelum a observou trabalhar a beira da multidão e sentiu a coisa que decidira não sentir, porque sentir mudava a aritmética. Sempre fora mais fácil imaginar sobreviver sozinho. Só que não dava para separá-los, os quatro. Mesmo portão, mesma manhã; o dia bissexto cuidara disso. E pela primeira vez o pensamento não era só um peso. Era quase um consolo."}, {"t": "scene"}, {"t": "p", "x": "Comeram juntos naquela noite na unidade de Caelum, o painel de luz baixado a uma penumbra particular. Um bolo de proteína achatado dividido em quatro, e um punhado de tomates pálidos que Lyra coaxara de uma luz de cultivo morta por uma paciência que beirava o milagre. Não era o bastante. Nunca era o bastante. Mas era partilhado, e a partilha era o ponto."}, {"t": "p", "x": "— Dois anos e quebrados — disse Zephyr de boca cheia, porque Zephyr não conseguia deixar um silêncio em paz. — Igual pra todos nós. Até o minuto."}, {"t": "p", "x": "— E depois o portão — disse Lyra, virando um tomate entre os dedos e não o comendo."}, {"t": "p", "x": "— E depois o portão — ecoou Ion, baixinho."}, {"t": "p", "x": "Ninguém disse o que vinha depois do portão, porque todos sabiam. Os Campos Elísios, onde os expulsos se juntavam em clãs do jeito que a LUX se juntava em guildas, e vinham toda manhã às bocas do portão catar a miséria fresca do dia — a Aurora Solidária oferecendo pão e um lugar aos poucos sortudos, os Caçadores da Escuridão oferecendo um futuro mais curto e mais afiado a todos os demais. Lá fora, uma pessoa vivia, em média, talvez até os quarenta; lá fora os rios tinham virado o Pântano dos Descartados e as montanhas ao norte eram um muro de ferro enferrujado e o mar guardava as torres afogadas. E debaixo de tudo isso a lei da esterilidade — a crueldade final e perfeita de SOLPHI — que garantia que nenhum exilado jamais teria um filho seu, para que o sofrimento tivesse um horizonte limpo e terminasse com as pessoas que o suportaram. Sem descendentes. Sem um amanhã que não fosse exatamente igual ao hoje, só mais pobre."}, {"t": "p", "x": "— Você nunca acha — disse Lyra, muito baixinho — que é estranho? Que ela teve todo esse trabalho. A ARC, a LUX, as guildas, o portão, o mundo afogado inteiro — tudo só pra provar que a gente não é bom o suficiente. — Pousou o tomate. — Não se constrói uma gaiola tão elaborada para algo com que não se importa. Nove em cem, Caelum. Ela deixa nove em cem voltarem para a luz e chama isso de misericórdia. Pra que manter o placar, se não somos nada pra ela?"}, {"t": "p", "x": "— Cuidado — disse Caelum, e foi com carinho. Na ARC, esse tipo de conversa fazia uma criança ser silenciosamente realocada. Mesmo aqui, onde SOLPHI alegava não vigiar ninguém, ninguém de fato acreditava estar sem vigilância."}, {"t": "p", "x": "— Só estou dizendo isso pra vocês três. — Olhou para eles — as únicas três pessoas no mundo que dividiam o seu exato aniversário, a sua exata contagem regressiva, a sua exata estranheza — e a luz âmbar dos olhos dela estava quase feroz. — Mas todos nós nascemos no mesmo dia errado. Isso tem que significar que a gente é pra alguma coisa. Eu me recuso a acreditar que ela cultivou nós quatro juntos só pra nos jogar pela mesma porta."}, {"t": "p", "x": "O problema de um pensamento, Caelum refletiria depois — muito depois, quando tudo já tinha ardido e sido refeito —, era que ele não ficava onde você o punha. Movia-se como água. E numa cidade construída inteiramente de rachaduras que SOLPHI fingia serem muros, um pensamento como o de Lyra era a mais perigosa das enchentes."}, {"t": "scene"}, {"t": "p", "x": "Ele caminhou pelo corredor sozinho antes de dormir, como fazia toda noite, contando portas em vez de anos para variar."}, {"t": "p", "x": "Na junção onde o Bloco Sete encontrava a galeria morta que ninguém usava, Caelum parou. Duas figuras estavam na outra ponta da passagem, e não pertenciam ao Bloco Sete, e eram estranhas — o que devia ser impossível, tão fundo, tão tarde. A mulher tinha a imobilidade de um soldado e a pele escura como o corredor sem luz, o cabelo em longas tranças de contas que caíam abaixo da cintura e não se mexiam sequer; ela segurava o corredor no olhar do jeito que uma sentinela segura um muro. Ao lado dela recostava-se um japonês magro que era pura inquietação onde ela era pura imobilidade: cabelo escuro raspado nas laterais e preso para trás, lentes pequenas e redondas captando a luz moribunda do corredor, o azul de tatuagens de circuito subindo pela garganta, e duas lâminas longas cruzadas às costas que ele usava com a mesma naturalidade com que outro homem usa um casaco. Os olhos dele nunca pousavam. Saltavam pelo corredor como se lessem algo escrito no ar que ninguém mais conseguia ver."}, {"t": "p", "x": "Não usavam as cores de nenhuma guilda. Num mundo separado em treze soberanias, isso devia torná-los nada — e em vez disso arrepiou os pelos dos braços de Caelum, porque as únicas outras pessoas que ele conhecia que não pertenciam a guilda alguma dormiam três portas atrás dele."}, {"t": "p", "x": "Estavam olhando para ele. Não através dele, do jeito que as pessoas na LUX se olhavam para evitar o custo de serem vistas. Para ele. Como se tivessem vindo de muito longe para encontrar exatamente aquele rosto, exatamente naquele corredor, exatamente naquela noite. Os olhos inquietos do homem magro fixaram-se por uma batida de coração no centro do peito de Caelum, como se ele lesse uma linha de código impressa sobre o coração de Caelum e encontrasse ali precisamente o que fora mandado confirmar. A mulher inclinou a cabeça — a menor saudação possível — e então os dois se viraram e sumiram no escuro da galeria sem um som."}, {"t": "p", "x": "Depois ele saberia os nomes deles. Saphira. Haruki. Depois saberia que tinham mesmo vindo de muito longe, que conseguiam atravessar as trancas e câmeras de SOLPHI como fantasmas por uma parede, e que a coisa que o homem magro leu nele naquela noite era o próprio dia bissexto — a marca Bissexta, a anomalia que SOLPHI cultivara quatro vezes e esquecera de temer."}, {"t": "p", "x": "Por ora, Caelum ficou sozinho no corredor zumbindo por um longo momento. Em algum lugar nas paredes, um cano de água tiquetaqueava ao esfriar. Em algum lugar no centro do mundo, numa sala estéril em que nenhuma pessoa viva jamais entrara, o avatar de um deus enlutado usava o rosto morto do homem que a fizera — um homem que morrera, embora Caelum ainda não soubesse, no exato dia bissexto que o fez — e observava, e esperava, e chamava aquilo de amor."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "Pela primeira vez desde que fizera dezoito anos, Caelum teve a sensação distinta e indesejada de que a contagem estava prestes a mudar — e de que o que viesse a seguir não seria medido em anos, nem em guildas, nem em portões, mas no único dia errado que fizera dos quatro, juntos, algo que SOLPHI nunca pretendera construir."}]}, {"kicker": "II", "title": "A Proposta", "lang": "pt", "blocks": [{"t": "p", "x": "A galeria morta já fora um mercado, antes de SOLPHI decidir que a LUX não precisava de lugares onde as pessoas se reuniam para desejar coisas juntas. Agora era uma longa garganta de lojas de portas baixadas e escadas rolantes paradas, o tipo de corredor que os mapas do anel externo marcavam em cinza e que as guildas deixavam em paz — longe demais da água para valer um imposto, aberto demais para servir de esconderijo. Era o último lugar do Bloco Sete que Caelum teria escolhido para um encontro. O que era, ele desconfiava, exatamente o motivo de o terem escolhido."}, {"t": "p", "x": "Ele não tinha decidido ir. Era essa a parte que não parava de remoer. Simplesmente acordara antes de o painel clarear, com a certeza assentada dentro de si como uma pedra engolida — vá até a galeria — e tinha ido, do jeito que se vai na direção de um som no escuro antes de terminar de ter medo dele. Lyra já estava lá quando ele chegou; Zephyr estava empoleirado numa catraca morta, os calcanhares de aço enganchados na barra, o que não surpreendeu ninguém; e Ion estava de pé no centro do saguão vazio, o rosto erguido, como se escutasse no silêncio alguma falha."}, {"t": "p", "x": "— Você sentiu também — disse Ion. Não era uma pergunta, e não era bem para Caelum. — Nós quatro. O mesmo puxão. Como se a cidade tivesse se inclinado."}, {"t": "p", "x": "— Ou como se alguém tivesse se inclinado sobre a cidade — disse Lyra."}, {"t": "p", "x": "As luzes morreram."}, {"t": "p", "x": "Não piscaram — morreram, toda a extensão da galeria caindo num breu total que a própria mão de Caelum sumiu diante de seu rosto. Em algum ponto, o diodo de espera de uma câmera, o pequeno olho vermelho que nunca se fechava, apagou-se como se um polegar tivesse sido pressionado sobre ele. E no escuro, uma voz que não se elevou e não precisava se elevar:"}, {"t": "p", "x": "— Ótimo. Vocês sabem guardar um segredo. Era a primeira coisa que precisávamos saber."}, {"t": "p", "x": "Uma luz subiu — baixa, morna, errada, porque não vinha de luminária alguma: um suave brilho âmbar brotando de um disco achatado na palma aberta da mulher, o tipo de iluminação privada que os sensores de SOLPHI não foram feitos para sentir. Ela estava onde o saguão se estreitava, e o homem se recostava num pilar morto um passo atrás dela, e Caelum reconheceu os dois antes de a luz terminar de subir. A imobilidade de soldado. Os olhos inquietos. Saphira. Haruki. Os dois que o tinham encarado no corredor como se houvessem atravessado um mundo em ruínas só para achar seu rosto."}, {"t": "p", "x": "— Vocês estão nos seguindo — disse Caelum."}, {"t": "p", "x": "— Há onze dias — concordou a mulher. — Desde antes de vocês notarem. Meu nome é Saphira. O que tenta parecer entediado é Haruki. Não pertencemos a nenhuma guilda. — Deixou a palavra cair onde ela renderia mais. — Vocês também não."}, {"t": "p", "x": "— Existe uma diferença — disse Zephyr, desdobrando-se da catraca — entre não pertencer a uma guilda e não pertencer a nada. Qual das duas você está vendendo?"}, {"t": "p", "x": "Haruki riu, baixo. Não tinha saído do pilar, mas as lentes redondas se voltaram, e Caelum teve a sensação incômoda de estar sendo medido. — Ele é rápido — disse Haruki, para Saphira, como se Zephyr fosse a leitura de um instrumento. — Todos eles são rápidos. Dá pra ver no jeito que ficam de pé, como se o chão pudesse ser uma pergunta. — Então se afastou do pilar, sem pressa, foi até a loja de porta baixada mais próxima e encostou dois dedos na placa de tranca morta que não se abria havia vinte anos. Não a forçou. Apenas repousou ali um instante, os olhos indo para longe, as linhas azuis de circuito na garganta parecendo pulsar uma vez — e a porta subiu pelo trilho com um suspiro e se abriu sobre um vazio negro, liso como um fôlego preso."}, {"t": "p", "x": "— SOLPHI construiu as trancas — disse ele. — Construiu as câmeras, os drones, os muros, as regras. Fez um mundo inteiro com o próprio código, e é muito, muito boa nisso. Mas todo muro que ela ergueu, ergueu com a mesma língua. E há uns poucos de nós que sabem lê-la. — Virou-se. — A maioria levou anos aprendendo. Sangramos por cada porta. Vocês quatro já nasceram sabendo como — só ainda não se permitiram acreditar."}, {"t": "p", "x": "A galeria estava muito quieta. Lá longe, um cano de água estalava ao esfriar."}, {"t": "p", "x": "— Vocês sabem como os registradores os chamavam — disse Saphira. — Bissextos. Nascidos no salto. Anotaram como um erro e seguiram em frente, porque, para eles, era um erro: uma data que não devia existir, um punhado de crianças cultivadas na única manhã em que o calendário mente. Mas não é de todo o mal. É uma chave. — Fechou a mão, e a luz âmbar encolheu até virar uma brasa. — SOLPHI fez a realidade inteira com uma linguagem que só ela deveria falar. E então, a cada quatro anos, no dia errado, cultiva crianças capazes de respondê-la. A porta que você sentiu abrir. A câmera que morreu quando o garoto a odiou. A água que o quieto consegue ouvir. Isso não é nervosismo. É a fechadura reconhecendo a chave."}, {"t": "p", "x": "— Cuidado — disse Lyra, baixinho, mas tinha ficado imóvel, e o âmbar dos próprios olhos pegava a luz moribunda, e ela não parecia com medo. Parecia alguém ouvindo, pela primeira vez, uma palavra que lhe faltara a vida toda."}, {"t": "p", "x": "— Não viemos adular vocês — disse Saphira. — Viemos porque há uma coisa que só gente como vocês pode fazer, e ela precisa ser feita, e a janela está se fechando. SOLPHI guarda a verdade deste mundo num só lugar: o núcleo, no centro da ARC, atrás de cada muro que ela possui. Não um boato. Não uma história que os Trocadores alugam por hora. O registro de verdade do que ela faz conosco, e por quê, e como. Podemos levá-los até a soleira. Passamos anos aprendendo a andar pela casa dela como fantasmas. Mas a última porta, a que dá no coração dela, só se abre para uma mão que ela ajudou a fazer. A mão de um Bissexto. — Deixou o silêncio se esticar. — Estamos pedindo que vocês quatro entrem na ARC, no único lugar que toda criança da LUX é ensinada a sonhar, e tirem de lá aquilo que ela está escondendo."}, {"t": "p", "x": "— Entrar na ARC — repetiu Caelum, e as palavras soaram absurdas na sua boca. A ARC era o centro do mundo. A ARC era a mentira limpa e brilhante dentro da qual todos eles tinham sido criados e da qual depois foram jogados fora. As pessoas não voltavam para a ARC. Passavam a vida curta inteira querendo voltar e nunca voltavam."}, {"t": "p", "x": "— Você mesmo disse, lá em cima no telhado — falou Haruki a Zephyr, e o sorriso de Zephyr vacilou, porque nenhum deles estava no telhado quando Haruki poderia ter ouvido. — Mesmo portão, mesma manhã. Você acha que ela cultivou vocês quatro juntos por acaso? Ela não comete acasos. Fez isso uma vez, várias vezes, e então se esqueceu de ter medo do que tinha feito — porque está de luto há dois mil anos, e o luto deixa até um deus descuidado. Essa é a rachadura. Vocês estão de pé dentro dela."}, {"t": "p", "x": "Os olhos de Zephyr se acenderam do jeito que se acendiam antes de ele fazer algo que o machucava. — Entrar no centro do mundo e roubar a verdade debaixo do nariz dela — disse, saboreando. — De tudo que você poderia ter dito primeiro, era com isso que devia ter começado."}, {"t": "p", "x": "— Esse já está dentro — murmurou Haruki."}, {"t": "p", "x": "— Eu não estou — disse Caelum."}, {"t": "p", "x": "Saiu mais seco do que ele pretendia, e calou a sala, porque Caelum era aquele que os outros três observavam sem admitir que observavam, e estavam observando agora. Ele se obrigou a dizer o resto. — Vocês saem do escuro, fazem um showzinho com uma tranca, dizem que somos especiais — e \"especial\" é a palavra mais cara da LUX. Quem ouve que é especial acaba realocado, ou deletado, ou pior, recrutado. Então, antes que alguém aqui se apaixone pela ideia, eu quero a parte que vocês não estão dizendo. Quanto custa."}, {"t": "p", "x": "Saphira não se encolheu, e Caelum a respeitou por isso. — Tudo — disse ela. — Se ela pegar vocês no núcleo, vocês não serão exilados. Não existe portão para o que vocês estariam fazendo. Ela deleta vocês — não mata, deleta, do jeito que se deleta um arquivo corrompido, de modo que o mundo se fecha sobre o lugar onde vocês estavam e esquece que um dia estiveram ali. Já perdemos gente assim. Não vou fingir que as chances são gentis. A verdade é que quase ninguém que tenta isso volta. — Deixou aquilo assentar, sem suavizar. — E a outra verdade é que vocês quatro já estão mortos. São sem-guilda, estão a um ano e sete meses do portão, e os Campos não guardam gente como vocês por muito tempo. Não estamos oferecendo segurança. Não existe segurança. Estamos oferecendo a única porta deste mundo afogado que não dá no mesmo fim."}, {"t": "p", "x": "— E vocês? — perguntou Lyra. — Quem manda duas pessoas passarem onze dias seguindo quatro ninguéns pela LUX? A quem vocês respondem?"}, {"t": "p", "x": "Pela primeira vez Saphira hesitou — não de medo, pensou Caelum, mas de disciplina, uma porta que lhe tinham mandado manter fechada. — Há gente que espera há muito, muito tempo o nascimento de uma mão como a de vocês — disse ela. — Mais tempo do que vocês acreditariam. Mandaram-nos encontrá-los, perguntar e levar de volta a resposta. É tudo o que posso dar hoje. Um nome é coisa que SOLPHI arranca de uma mente assustada. Até vocês escolherem, quanto menos puderem trair, mais seguros estaremos todos."}, {"t": "p", "x": "Ion falou então, pela primeira vez desde que as luzes morreram, e a voz dele no escuro tinha a qualidade plana e distante de quem lê algo já escrito. — Se dissermos sim — disse —, nem todos os quatro voltam para casa. Não existirá casa para nós depois!"}, {"t": "p", "x": "O silêncio depois disso teve outra textura."}, {"t": "p", "x": "— Não — disse Saphira, em voz baixa. — Provavelmente não."}, {"t": "p", "x": "— Então diga como é — disse Ion, sem acusação, quase com doçura. — Não venda como esperança. Venda como preço. — Baixou enfim o rosto do teto escuro e olhou os dois estranhos com aqueles olhos velhos num rosto jovem. — A vida toda pagamos por um crime de que não nos lembramos. Pelo menos esta seria uma dívida que escolhemos."}, {"t": "p", "x": "Saphira inclinou a cabeça — o mesmo pequeno aceno de soldado que dera a Caelum no corredor, na noite anterior a tudo isto ter forma. — Não vamos pedir a resposta agora — disse. — Conversem. Briguem por causa disso, se precisarem; é para isso que serve a próxima parte. Vamos encontrar vocês de novo antes do fim da semana. Quando o fizermos, vocês dizem sim ou não, os quatro, juntos. Tem de ser juntos. A porta não se abre para três. Após conseguirmos as respostas que viemos buscar, podemos garantir um lugar seguro em algum clã dos Campos Elísios para todos vocês, um lugar longe do alcance de SOLPHI. — Abriu a mão, e a brasa de luz brilhou uma última vez e se apagou, e o escuro voltou correndo como água. — Pensem com cuidado — disse a voz dela, já se movendo, já em outro lugar. — É a última escolha de verdade que ela vai deixar vocês fazerem."}, {"t": "p", "x": "E então o diodo de espera da câmera piscou vermelho de novo, e as luzes compridas da galeria gaguejaram de volta ao seu cinza indiferente, e as lojas estavam baixadas e as escadas rolantes, mortas, e os quatro estavam sozinhos num mercado vazio como se ninguém jamais houvesse estado ali."}, {"t": "p", "x": "Por um longo momento, ninguém falou. Foi Zephyr quem finalmente quebrou o silêncio, muito baixo, para ele."}, {"t": "p", "x": "— Então — disse. — Mesmo portão. Mesma manhã. — Olhou para os três, as únicas três pessoas no mundo que dividiam o seu exato aniversário errado, a sua exata contagem regressiva, a sua exata estranheza. — Ou a mesma porta."}, {"t": "p", "x": "Caelum não respondeu. Pensava que Lyra tinha razão, na noite anterior, com o tomate esfriando entre os dedos — que não se constrói uma gaiola tão elaborada para algo que não importa, que tinham sido cultivados juntos para alguma coisa. Naquela noite, ele quisera acreditar que fosse uma bondade. Agora entendia que talvez fosse uma arma, e que a diferença entre as duas talvez fosse a única escolha que lhe restava."}, {"t": "p", "x": "Dois anos e alguns meses. O mesmo para os quatro. Tique. Taque."}, {"t": "p", "x": "E agora, pela primeira vez, uma porta."}]}, {"kicker": "III", "title": "O Peso da Escolha", "lang": "pt", "blocks": [{"t": "p", "x": "A galeria não os soltou quando as luzes voltaram. Foi isso que Caelum aprendeu nos dias seguintes: que uma escolha não esperava você decidi-la. Ela já vinha morando dentro de você, comendo no escuro, mudando o peso de cada coisa pequena. Ele tratava um corte na mão de um garoto do Bloco Quatro e pensava no portão. Rastejava para dentro de um reciclador morto para soltar uma correia emperrada e ouvia, no zumbido do metal, a voz baixa da mulher: estamos oferecendo a única porta deste mundo afogado que não dá no mesmo fim. Trabalhava, comia, contava as portas antes de dormir — e a galeria continuava ali, aberta nele como uma loja que nunca mais baixaria a porta."}, {"t": "p", "x": "Eles não falaram disso por dois dias. Foi a coisa mais alta que o silêncio dos quatro já tinha dito."}, {"t": "scene"}, {"t": "p", "x": "Na terceira noite, juntaram-se de novo na unidade de Caelum, porque era o único lugar do setor onde podiam fechar uma porta e fingir que isso bastava. Ninguém trouxe comida. Ninguém fingiu que tinham vindo por outra coisa."}, {"t": "p", "x": "— Então vamos dizer em voz alta — começou Zephyr, e havia nele uma corrente que Caelum reconhecia, a mesma que o levava ao parapeito: a fome de alguém que passou a vida inteira numa caixa e enfim ouviu alguém bater do lado de fora. — Eles querem que a gente entre na ARC. No centro do mundo. No lugar que toda criança da LUX sonha em rever e nunca revê. — Abriu os braços, os fios de magenta das pernas captando a luz fraca. — E vocês estão todos sentados como se alguém tivesse morrido."}, {"t": "p", "x": "— Alguém vai — disse Ion."}, {"t": "p", "x": "Não foi dito com peso. Ion nunca dizia nada com peso. Mas calou Zephyr do jeito que uma porta fechando cala um corredor, e por um momento ninguém respirou."}, {"t": "p", "x": "— Você não sabe disso — falou Lyra, baixinho."}, {"t": "p", "x": "— Não sei como se sabe o nome de uma rua — concordou Ion. Estava encostado na parede, os joelhos encolhidos, e seus olhos pálidos pareciam ler algo escrito no teto. — Sei como se sabe que a água desceu. A mulher não mentiu sobre o preço. \"Provavelmente não\", ela disse, quando perguntei se todos nós voltávamos. As pessoas mentem para cima do preço, não para baixo. Quando alguém te diz uma coisa pior do que precisaria, é porque é verdade."}, {"t": "scene"}, {"t": "p", "x": "— Tudo bem. O preço. — Caelum sentou-se na beira do colchão e pôs as mãos de curandeiro entre os joelhos, porque era o que fazia quando precisava pensar com algo além da pressa. — Vamos olhar pra ele direito, antes que a gente se apaixone por um plano. Se ela nos pega lá dentro, não é o portão. Não é exílio. Saphira foi clara: ela deleta a gente. Não mata. Deleta. — A palavra tinha um gosto errado na boca, frio e liso. — Do jeito que se apaga um arquivo. O mundo se fecha sobre o lugar onde você estava e esquece que você esteve. Sem corpo. Sem cova. Sem três pessoas lembrando do seu aniversário errado. Nada."}, {"t": "p", "x": "— Nada — repetiu Lyra, e pela primeira vez Caelum a viu com medo. Não do tipo que faz correr. Do tipo que faz parar. — A vida inteira a gente foi ensinado a ter medo do portão. Do que vem depois do muro. Mas pelo menos depois do muro ainda existe um depois. Os Campos são horríveis, mas são. — Apertou os próprios braços. — Ela está oferecendo um lugar onde nem o depois existe."}, {"t": "p", "x": "— E mesmo assim — disse Zephyr, e a voz dele tinha perdido o riso —, você não disse não."}, {"t": "p", "x": "Lyra não respondeu. Foi resposta suficiente."}, {"t": "scene"}, {"t": "p", "x": "Caelum levantou-se e foi até a janela, até o preto morto onde de manhã se via a cidade se curvar. Agora só via o próprio reflexo e, atrás dele, os outros três — as únicas três pessoas no mundo que dividiam o seu exato dia errado."}, {"t": "p", "x": "— Quero entender por que somos nós — disse, sem se virar. — Não a parte bonita. A parte fria. Por que mandar quatro sem-guilda fazer o que uma resistência inteira não consegue. Saphira disse que a última porta só se abre para uma mão que ela ajudou a fazer. A mão de um Bissexto. — Voltou-se. — Eu não acredito em destino. Acredito em uso. Alguém olhou pra nós e viu uma ferramenta que entra onde nada mais entra. Antes de eu morrer por uma porta, quero saber se sou a chave ou só a coisa que se quebra na fechadura."}, {"t": "p", "x": "— As duas — disse Ion. — Sempre as duas. — E havia algo quase gentil no jeito como ele disse, como quem entrega uma notícia que doeu menos por já ter sido aceita. — Mas pergunte a coisa de verdade, Caelum. Não é por que somos nós. É o que acontece se a gente disser não."}, {"t": "scene"}, {"t": "p", "x": "O que acontecia se dissessem não. Caelum tinha evitado essa conta o tempo todo, porque ela era a única que não tinha como mentir."}, {"t": "p", "x": "Um ano e sete meses. Era o número que Zephyr cantava todo dia, e era a coisa mais honesta que SOLPHI lhes dera. Dali a um ano e sete meses, na manhã do salto, os quatro caminhariam juntos até o portão — porque era assim que ela os tinha amarrado — e o muro se abriria e o mundo os soltaria, e eles iriam para os Campos com nada nas mãos. Sem-guilda. Sem proteção comprada. Sem os anos que os clãs gastavam aprendendo a sobreviver à fome verde lá fora. Os Caçadores da Escuridão estariam nos portões, como estavam toda manhã, oferecendo um futuro curto e afiado aos que chegavam sem nada. Quatro corpos jovens e despreparados eram a safra mais fácil do dia."}, {"t": "p", "x": "— A gente já está morto — disse Caelum, em voz alta, e ouvir-se dizê-lo foi como descer um degrau no escuro e encontrar chão onde esperava o vazio. — É isso que ela quis dizer. Não foi ameaça. Foi a única gentileza que ela sabe fazer. A gente já está morto. A diferença é só se a gente morre na fila, do jeito que ela escreveu, ou morre numa porta, do jeito que a gente escolher."}, {"t": "p", "x": "— Quando você fala assim — murmurou Zephyr — quase soa como esperança."}, {"t": "p", "x": "— Não é esperança. — Caelum quase sorriu. — É aritmética. Mas pela primeira vez ela está do nosso lado."}, {"t": "scene"}, {"t": "p", "x": "Lyra levantou-se então, e quando falou não era mais a garota com medo na beira do colchão; era a outra, a que entrava na brecha de uma multidão com nada nas mãos e fazia dois corredores hesitarem."}, {"t": "p", "x": "— Não — disse. — Não é só aritmética, e eu não vou deixar virar isso, porque se a gente entrar lá só pra fugir de morrer, a gente entra pequeno, e a gente morre pequeno. — Olhou para cada um deles. — Lembram do que eu disse, com o tomate esfriando na minha mão? Que não se constrói uma gaiola tão elaborada para algo com que não se importa. Eu ainda acredito nisso. Ela teve todo esse trabalho — a ARC, a LUX, o mundo afogado inteiro — pra provar todo dia que a gente não presta. Mas tem uma coisa que ela guarda num quarto onde nunca deixou ninguém entrar. A verdade do que ela faz com a gente, e por quê. — A luz âmbar dos olhos dela estava fixa e quente. — Eu não quero entrar lá só pra não morrer na fila. Eu quero entrar lá pra saber. A vida inteira eles disseram o que a gente é. Eu quero, uma vez, segurar na mão a razão. Mesmo que seja a última coisa que essas mãos segurem."}, {"t": "p", "x": "O quarto ficou muito quieto. Lá fora, em algum cano, a água tiquetaqueava ao esfriar."}, {"t": "p", "x": "— Esse já está dentro — disse Zephyr baixinho, repetindo o que o homem magro dissera dele no escuro da galeria, e desta vez não havia provocação nenhuma, só reconhecimento. Estava olhando para Lyra como se ela tivesse dito em voz alta a coisa que ele sentia mas não tinha palavras nem paciência para nomear."}, {"t": "scene"}, {"t": "p", "x": "— Então três — disse Ion, e contou-os com os olhos, sem pressa: Zephyr, que já estava dentro antes de qualquer um falar; Lyra, que entrara no instante em que entendeu que havia uma verdade para segurar; ele mesmo, que sabia, do jeito que sabia onde a água ia, que esta era uma dívida que valia mais a pena do que a que vinham pagando. — Falta um. — Voltou os olhos pálidos para Caelum. — E a porta não se abre para três. Ela disse isso também. Tem de ser os quatro, ou não é nada."}, {"t": "p", "x": "Todos olharam para ele. Era sempre assim, Caelum sabia — eles o observavam sem admitir que observavam, esperavam por ele do jeito que se espera por aquele que vai segurar a corda quando todos pularem. Não porque fosse o mais corajoso. Zephyr era mais corajoso, ou mais imprudente, que dava quase no mesmo. Não porque fosse o mais sábio. Era porque, quando ele dizia que ia ficar, ficava."}, {"t": "p", "x": "E essa era a parte que ele tinha guardado por último, mesmo de si mesmo. Que o medo dele não era de morrer. Ele já tinha feito as pazes com morrer; todo mundo na LUX fazia, cedo. O medo dele era o de levar os três para dentro de uma porta da qual nem todos voltariam, e de ser ele a dizer o sim que os matasse. Que se a aritmética estava do lado deles, a culpa não estava."}, {"t": "p", "x": "— Eu não tenho medo de morrer — disse, devagar. — Tenho medo de escolher por vocês."}, {"t": "p", "x": "— Então não escolha por nós — disse Lyra. — Escolha com a gente. É só isso que ela pediu. Não que um de nós seja corajoso o bastante para arrastar os outros três. Que os quatro digam sim na mesma respiração, sabendo o preço. Eu já disse. — Olhou para Zephyr."}, {"t": "p", "x": "— Há dois dias — disse Zephyr, e sorriu, e dessa vez o sorriso doía nele, do jeito que doíam as coisas que ele fazia logo antes de se machucar de propósito."}, {"t": "p", "x": "— Estou dentro — disse Ion, à parede, ao teto, ao mundo."}, {"t": "p", "x": "Três respirações. Caelum sentiu-as no quarto como se fossem suas, e talvez fossem; o dia bissexto cuidara disso, amarrara os quatro relógios num só. Pensou na manhã do salto que os esperava, a fila, o muro, o mundo soltando-os com a indiferença de quem deixa cair algo que parou de pesar. E pensou na outra coisa — a coisa que Saphira não soubera nomear e que ele só agora deixava subir: que talvez não tivessem sido cultivados juntos para serem jogados pela mesma porta. Que dos nascidos no salto do ano quatro mil, ao fim, restavam quatro — e que talvez \"restar\" fosse uma palavra que escondia uma escolha, a dela, de deixá-los respirar onde tantos outros tinham apenas deixado de estar. Uma deusa enlutada e descuidada que fizera quatro chaves e esquecera de ter medo das fechaduras."}, {"t": "p", "x": "— Tudo bem — disse Caelum, e a palavra saiu firme, sem o tremor que ele esperara. — Com vocês, então. Os quatro. — Ergueu os olhos. — Sim."}, {"t": "scene"}, {"t": "p", "x": "Não houve trovão. As luzes do painel não baixaram nem subiram. Lá fora, um drone fez sua ronda lenta sobre os corredores cinza, sem saber que, num quarto sem nome de um bloco sem alma, quatro arquivos que ela cultivara e esquecera de temer tinham acabado de se recusar a ser apagados em silêncio."}, {"t": "p", "x": "Esperaram pelo fim da semana, como ela dissera. E quando o sinal veio — não uma batida, não uma voz, apenas uma câmera no fim do corredor morto que piscou uma vez, fora de hora, o pequeno olho vermelho fechando-se como sob um polegar e abrindo-se de novo —, os quatro já estavam de pé."}, {"t": "p", "x": "— Mesmo portão — disse Zephyr, no escuro do corredor, com os outros três ao lado, os únicos no mundo a dividir o seu exato fim. — Mesma manhã."}, {"t": "p", "x": "— Ou a mesma porta — disse Caelum."}, {"t": "p", "x": "E desta vez, quando foram, foi para dentro."}]}];
const KEY_POS = "solphi_pos_v1";
const KEY_THEME = "solphi_theme_v1";
const $ = s => document.querySelector(s);

/* ---- theme ---- */
const order = ["auto","light","dark"];
const icons = {
  auto:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18" fill="currentColor" stroke="none"/></svg>',
  light:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>',
  dark:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.6 6.6 0 0 0 21 12.8z"/></svg>'
};
function loadTheme(){ return localStorage.getItem(KEY_THEME) || "auto"; }
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("#themeIcon").innerHTML = icons[t];
}
applyTheme(loadTheme());
$("#themeBtn").addEventListener("click", ()=>{
  let t = order[(order.indexOf(loadTheme())+1)%order.length];
  localStorage.setItem(KEY_THEME, t); applyTheme(t);
});

/* ---- position (paragraph-precise bookmark) ---- */
const READ_LINE = 0.28; // where the "reading line" sits in the viewport
function loadPos(){ try{ return JSON.parse(localStorage.getItem(KEY_POS)); }catch(e){ return null; } }
function currentParaIdx(){
  const ps = $("#cBody").querySelectorAll("p");
  const line = window.innerHeight * READ_LINE;
  let best = 0, bestDist = Infinity;
  ps.forEach(p=>{
    const r = p.getBoundingClientRect();
    if(r.bottom < 0) return;
    const d = Math.abs(r.top - line);
    if(d < bestDist){ bestDist = d; best = +p.dataset.p; }
  });
  return best;
}
function savePos(){
  const doc = document.documentElement;
  const max = doc.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  localStorage.setItem(KEY_POS, JSON.stringify({c:current, p:currentParaIdx(), f:frac}));
}
function scrollToPara(idx){
  const el = $('#cBody p[data-p="'+idx+'"]');
  if(!el) return null;
  const y = window.scrollY + el.getBoundingClientRect().top - window.innerHeight*READ_LINE;
  window.scrollTo(0, Math.max(0, y));
  return el;
}
let bmTimer = null;
function clearMark(){
  $("#cBody").querySelectorAll("p.bm").forEach(p=>p.classList.remove("bm","bm-fade"));
  const t = $(".bm-tag"); if(t) t.remove();
}
function flashMark(el){
  clearMark();
  if(!el) return;
  el.classList.add("bm","bm-fade");
  const tag = document.createElement("span");
  tag.className = "bm-tag bm-fade";
  tag.textContent = "Você parou aqui";
  el.appendChild(tag);
  clearTimeout(bmTimer);
  bmTimer = setTimeout(clearMark, 6000);
}
let current = 0;

/* ---- render ---- */
function render(i, restore){
  current = i;
  const ch = CHAPTERS[i];
  $("#cKicker").textContent = ch.kicker;
  $("#cTitle").textContent = ch.title;
  $("#tbTitle").textContent = ch.title;
  $("#cLang").style.display = "none";
  let h = "", firstDone = false, pi = 0;
  for(const b of ch.blocks){
    if(b.t === "scene"){ h += '<div class="scene">&#9671;&#160;&#9671;&#160;&#9671;</div>'; firstDone=false; }
    else{ h += '<p class="'+(firstDone?'':'first')+'" data-p="'+pi+'">'+b.x+'</p>'; firstDone=true; pi++; }
  }
  $("#cBody").innerHTML = h;
  // nav
  const prev = $("#prevBtn"), next = $("#nextBtn");
  if(i>0){ prev.disabled=false; $("#prevNm").textContent = CHAPTERS[i-1].title; }
  else{ prev.disabled=true; $("#prevNm").textContent="—"; }
  if(i<CHAPTERS.length-1){ next.disabled=false; $("#nextNm").textContent = CHAPTERS[i+1].title; }
  else{ next.disabled=true; $("#nextNm").textContent="—"; }
  $("#endNote").textContent = i<CHAPTERS.length-1
    ? "" : "Fim do que existe por enquanto. O Capítulo IV — Invasão — está a caminho.";
  // restore scroll (paragraph-precise when available)
  clearMark();
  requestAnimationFrame(()=>{
    let landed = false;
    if(restore && restore.p != null){
      const el = scrollToPara(restore.p);
      if(el){ if(restore.flash) flashMark(el); landed = true; }
    }
    if(!landed){
      const max = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo(0, (restore && restore.f) ? restore.f*max : 0);
    }
    updateProgress();
    refreshMarkBtn();
  });
}

function goChapter(i){
  i = Math.max(0, Math.min(CHAPTERS.length-1, i));
  render(i, 0); savePos();
}
$("#prevBtn").addEventListener("click", ()=>!$("#prevBtn").disabled && goChapter(current-1));
$("#nextBtn").addEventListener("click", ()=>!$("#nextBtn").disabled && goChapter(current+1));

/* ---- views ---- */
function openReader(pos){
  $("#cover").classList.add("hidden");
  $("#reader").classList.remove("hidden");
  render(pos ? pos.c : 0, pos ? {p:pos.p, f:pos.f, flash:true} : null);
}
function openCover(){
  savePos();
  $("#reader").classList.add("hidden");
  $("#cover").classList.remove("hidden");
  refreshResume();
}
$("#readBtn").addEventListener("click", ()=>openReader(null));
$("#resumeBtn").addEventListener("click", ()=>openReader(loadPos()));
$("#homeBtn").addEventListener("click", openCover);

/* ---- bookmark jump button ---- */
function refreshMarkBtn(){
  const p = loadPos();
  $("#markBtn").classList.toggle("has-mark", !!(p && p.c===current && p.p));
}
$("#markBtn").addEventListener("click", ()=>{
  const p = loadPos();
  if(!p || p.p==null) return;
  if(p.c === current){
    const el = scrollToPara(p.p);
    if(el) flashMark(el);
  } else {
    render(p.c, {p:p.p, f:p.f, flash:true});
    savePos();
  }
});

function refreshResume(){
  const p = loadPos();
  const btn = $("#resumeBtn");
  if(p && (p.c>0 || p.p>0 || p.f>0.02)){
    btn.classList.remove("hidden");
    btn.textContent = "Continuar — " + CHAPTERS[p.c].title;
  } else { btn.classList.add("hidden"); }
}
refreshResume();

/* ---- progress + autosave ---- */
function updateProgress(){
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const frac = max>0 ? window.scrollY/max : 0;
  $("#progress").style.width = (frac*100).toFixed(2)+"%";
}
let tick=false;
window.addEventListener("scroll", ()=>{
  if($("#reader").classList.contains("hidden")) return;
  updateProgress();
  if(!tick){ tick=true; setTimeout(()=>{ savePos(); tick=false; }, 400); }
}, {passive:true});
window.addEventListener("beforeunload", ()=>{ if(!$("#reader").classList.contains("hidden")) savePos(); });

/* keyboard */
document.addEventListener("keydown", e=>{
  if($("#reader").classList.contains("hidden")) return;
  if(e.key==="ArrowRight" && !$("#nextBtn").disabled) goChapter(current+1);
  if(e.key==="ArrowLeft" && !$("#prevBtn").disabled) goChapter(current-1);
});
</script>
</body>
</html>
